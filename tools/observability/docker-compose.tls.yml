# Overlay for monitoring-server mode.
# Mounts Let's Encrypt certificates into the OTEL Collector container.
# The full /etc/letsencrypt tree is needed so that symlinks inside
# live/monitoring.bylins.su/ resolve correctly inside the container.

services:
  otel-collector:
    cap_add:
      - DAC_READ_SEARCH  # allow reading root-owned LE privkey.pem (600) without running as root
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
