name: Build

on:
  push:
    branches: [ master, world-load-refactoring ]
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    uses: ./.github/workflows/_linux.yml
    secrets: inherit

  windows:
    uses: ./.github/workflows/_windows.yml
    secrets: inherit

  macos:
    uses: ./.github/workflows/_macos.yml
    secrets: inherit

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [linux, windows, macos]
    if: always()
    steps:
      - name: Report results
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linux    | ${{ needs.linux.result }}   |" >> $GITHUB_STEP_SUMMARY
          echo "| Windows  | ${{ needs.windows.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS    | ${{ needs.macos.result }}   |" >> $GITHUB_STEP_SUMMARY