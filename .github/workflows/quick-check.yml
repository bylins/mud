name: Quick Check

on:
  push:
    branches: [ '**' ]  # Все ветки
  pull_request:

# Cancel previous runs if new push to same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-build:
    name: Quick Build (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clean empty subproject dirs
        run: find subprojects -type d -empty -delete

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/quick-check.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Install dependencies
        uses: ./.github/actions/install-linux-deps
        with:
          add-universe: 'true'
          extra-packages: ""

      - name: Configure meson
        run: meson setup build -Dbuild_profile=test -Dbuild_tests=false --unity=on -Dunity_size=45

      - name: Build
        run: meson compile -C build

      - name: Check binary
        run: |
          ls -lh build/circle
          file build/circle

  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for common issues
        run: |
          echo "Checking for tabs in makefiles..."
          # Add any syntax/style checks here
          echo "✅ Basic checks passed"
