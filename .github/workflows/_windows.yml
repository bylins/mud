name: Windows

on:
  workflow_call:

jobs:
  msvc:
    name: MSVC / Base
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\packages
          key: vcpkg-msvc-${{ hashFiles('.github/workflows/_windows.yml') }}
          restore-keys: vcpkg-msvc-

      - name: Install dependencies with vcpkg
        run: vcpkg install openssl:x64-windows curl:x64-windows expat:x64-windows gtest:x64-windows

      - name: Configure CMake
        run: |
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake ..

      - name: Build
        run: cd build && cmake --build . --config Test -j

      - name: Run tests
        run: |
          cd build
          ./tests/Test/tests.exe
          echo "Exit code: $LASTEXITCODE"
          exit $LASTEXITCODE

  clang:
    name: Clang / Base
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\packages
          key: vcpkg-clang-${{ hashFiles('.github/workflows/_windows.yml') }}
          restore-keys: vcpkg-clang-

      - name: Install dependencies with vcpkg
        run: vcpkg install openssl:x64-windows curl:x64-windows expat:x64-windows gtest:x64-windows

      - name: Configure CMake
        run: |
          mkdir build && cd build
          cmake -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ `
                -DCMAKE_BUILD_TYPE=Release `
                -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake ..

      - name: Build
        run: cd build && cmake --build . --config Release -j

      - name: Run tests
        run: |
          cd build
          ./tests/Release/tests.exe
          echo "Exit code: $LASTEXITCODE"
          exit $LASTEXITCODE

  mingw:
    name: MinGW / Base
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            git
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-openssl
            mingw-w64-x86_64-curl
            mingw-w64-x86_64-expat

      - name: Configure CMake
        shell: msys2 {0}
        run: mkdir -p build && cd build && cmake -G Ninja -DCMAKE_BUILD_TYPE=Test -DBUILD_TESTS=OFF ..

      - name: Build
        shell: msys2 {0}
        run: cd build && ninja -j$(nproc)

  cygwin:
    name: Cygwin / GCC / ${{ matrix.config.name }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        config:
          - name: "Base"
            cmake_flags: "-DCMAKE_BUILD_TYPE=Release"
            with_yaml: false
            cache_key: "cygwin-gtest-1.14.0"

          - name: "YAML"
            cmake_flags: "-DCMAKE_BUILD_TYPE=Release -DHAVE_YAML=ON"
            with_yaml: true
            cache_key: "cygwin-gtest-1.14.0-yaml-0.7.0"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: cygwin/cygwin-install-action@v6
        with:
          packages: >-
            gcc-g++ gcc-core make cmake
            libssl-devel libcurl-devel libexpat1-devel
            libcrypt-devel gettext-devel unzip git wget

      - name: Cache Cygwin libraries
        id: cache-cygwin-libs
        uses: actions/cache@v4
        with:
          path: C:\cygwin\usr\local
          key: ${{ matrix.config.cache_key }}

      - name: Build and install googletest
        if: steps.cache-cygwin-libs.outputs.cache-hit != 'true'
        shell: C:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'
        run: |
          cd /tmp
          wget https://github.com/google/googletest/archive/refs/tags/v1.14.0.tar.gz
          tar xzf v1.14.0.tar.gz
          cd googletest-1.14.0 && mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release .. && make -j$(nproc) && make install

      - name: Build and install yaml-cpp
        if: matrix.config.with_yaml && steps.cache-cygwin-libs.outputs.cache-hit != 'true'
        shell: C:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'
        run: |
          cd /tmp
          wget https://github.com/jbeder/yaml-cpp/archive/refs/tags/yaml-cpp-0.7.0.tar.gz
          tar xzf yaml-cpp-0.7.0.tar.gz
          cd yaml-cpp-yaml-cpp-0.7.0 && mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DYAML_BUILD_SHARED_LIBS=ON -DCMAKE_POLICY_VERSION_MINIMUM=3.5 ..
          make -j$(nproc) && make install

      - name: Configure CMake
        shell: C:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'
        run: |
          cd "$GITHUB_WORKSPACE" && mkdir -p build && cd build
          cmake ${{ matrix.config.cmake_flags }} ..

      - name: Build
        shell: C:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'
        run: |
          git config --global --add safe.directory '*'
          cd "$GITHUB_WORKSPACE/build" && make tests -j$(nproc)

      - name: Run tests
        shell: C:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'
        run: cd "$GITHUB_WORKSPACE/build" && ./tests/tests

  wsl:
    name: WSL / GCC / ${{ matrix.config.name }}
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        config:
          - name: "Base"
            cmake_flags: "-DCMAKE_BUILD_TYPE=Release"
            extra_packages: ""

          - name: "YAML"
            cmake_flags: "-DCMAKE_BUILD_TYPE=Release -DHAVE_YAML=ON"
            extra_packages: "libyaml-cpp-dev"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: Vampire/setup-wsl@v3
        with:
          distribution: Ubuntu-24.04

      - name: Install dependencies
        shell: wsl-bash {0}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential make libssl-dev libcurl4-gnutls-dev \
            libexpat1-dev gettext unzip cmake gdb \
            libgtest-dev zlib1g-dev libcrypt-dev \
            ${{ matrix.config.extra_packages }}

      - name: Configure CMake
        shell: wsl-bash {0}
        run: mkdir -p build && cd build && cmake ${{ matrix.config.cmake_flags }} ..

      - name: Build
        shell: wsl-bash {0}
        run: cd build && make tests -j$(nproc)

      - name: Run tests
        shell: wsl-bash {0}
        run: cd build && ./tests/tests