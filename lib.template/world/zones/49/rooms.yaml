# Rooms for zone 49

# Room #4900
0:
  name: Чисто поле
  description: |2
       Ты стоишь на небольшой полянке посреди глухого леса, на севере - холмик
    небольшой, а в нем - вот диво! - дверка резная, дубовая, настежь открытая.
    За дверкой комната в полумраке. Видно, там-то и есть та самая школа, там-
    то тебе и помогут во всем разобраться.
  sector: kInside
  flags:
    - kPeaceful
    - kNoTeleportIn
    - kNoSummonOut
    - kNoTeleportOut

