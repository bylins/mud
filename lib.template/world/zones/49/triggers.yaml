# Triggers for zone 49

# Trigger #4900
0:
  name: Кто в теремочке живет?
  attach_type: kMobTrigger
  narg: 100
  arglist: '*'
  trigger_types:
    - kSpeech
  script: |-2
    *лоад проводника
    if !%actor.iname%
      halt
    end
    if !(%speech.contains(кто)% && %speech.contains(терем)% && %speech.contains(жив)%)
      halt
    end
    set tmp 1
    while (%tmp% < 6)
      if !%exist.mob(490%tmp%)%
        set vnumlist %vnumlist% 490%tmp%
      end
      eval tmp %tmp%+1
    done
    if (%vnumlist.words% == 0)
      *свободных проводников нет, отправляем в зад
      wait 1s
      %send% %actor% Похоже, никого нет дома, придется зайти попозже.
      %send% %actor% Внезапно поднявшийся ветер подхватил вас и понес неведомо куда.
      %echoaround% %actor% Внезапно поднявшийся ветер подхватил %actor.vname% и понес неведомо куда.
      %send% %actor% Очнулись вы уже в комнатах отдыха...
      %teleport% %actor% %actor.loadroom%
      %echoaround% %actor% %actor.iname% свалил%actor.u% сюда невесть откуда.
      halt
    end
    *выбрали одного из незанятых проводника
    eval hlpr %vnumlist.words(%random.num(%vnumlist.words%)%)%
    *%echo% %vnumlist%
    *%echo% %hlpr%
    %load% mob %hlpr%
    calcuid helper %hlpr% mob
    if %helper%
      wait 3
      %send% %actor% Как только вы произнесли эти слова...
      %echo% Из теремочка выскочил%helper.g% %helper.iname%.
      eval pupil %actor%
      remote pupil %helper%
      attach 4901 %helper%
      exec 4901 %helper%
    end

# Trigger #4901
1:
  name: Вошли к проводнику
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kAuto
  script: |-2
    if !%pupil.name%
      wait 3
      %echo% %self.iname% поглядел%self.g% по сторонам, пожал%self.g% плечами и забежал%self.g% обратно в теремок.
      %purge% %self%
      halt
    end
    %send% %pupil% %self.iname% сказал%self.g% : 'Здравствуй, %actor.iname%!'
    %send% %pupil% %self.iname% сказал%self.g% : 'Я буду сопровождать твое обучение'
    %send% %pupil% %self.iname% сказал%self.g% : 'Давай же скорее пройдем в дом и начнем'
    %send% %pupil% С этими словами %self.iname% схватил%self.g% вас за руку и резво потащил%self.g% в терем.
    %teleport% %self% 4901
    %teleport% %pupil% 4901
    eval tmp %pupil.wait(1)%
    wait 1s
    %send% %pupil% %self.iname% сказал%self.g% : 'Начнем, пожалуй, с передвижений...'
    %send% %pupil% %self.iname% сказал%self.g% : 'Наш мир состоит из отдельных "комнат", большинство которых'
    %send% %pupil% %self.iname% сказал%self.g% : 'связаны между собой выходами. В этой комнате, например, есть'
    %send% %pupil% %self.iname% сказал%self.g% : 'выход на север. Чтобы пройти в этом направлении, достаточно'
    %send% %pupil% %self.iname% сказал%self.g% : 'ввести команду &Rсевер&n, вот так...'
    north
    eval tmp %pupil.setquest(4900 1)%
    detach 4901 %self%

