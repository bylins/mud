# Triggers for zone 26

# Trigger #2600
0:
  name: Малый наградной свиток безграничного опыта
  attach_type: kObjTrigger
  narg: 3
  arglist: разорвать
  trigger_types:
    - kCommand
  script: |-2
    wait 1
    if !%arg.contains(свиток)%
      osend %actor% Что вы хотите разорвать?
      halt
    end
    if %actor.AffectedBy(чары,*множитель.опыта)% > 2
      %send% %actor% Вы и так уже достаточно восприимчивы.
      halt
    end
    if %actor.AffectedBy(чары,*дополнительный.бонус.опыта)% > 99
      %send% %actor% Вы и так уже достаточно восприимчивы.
      halt
    end
    log %actor.iname% получил награду %self.name% под номером %self.vnum%
    osend %actor% Вы разорвали свиток, который рассыпался мириадами разноцветных искр, наполнивших вас магической силой!
    osend %actor% Магическая сила свитка усилила вашу восприимчивость, теперь вы готовы извлечь максимум опыта из любой ситуации!
    echoaround %actor% %actor.iname% разорвал%actor.g% свиток, который рассыпался мириадами разноцветных искр!
    dgaffect %actor% *множитель  2 5 0
    opurge %self%

