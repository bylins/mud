# Trigger #2624
24:
  name: свиток слава-гривны
  attach_type: kObjTrigger
  narg: 3
  arglist: разорвать
  trigger_types:
    - kCommand
  script: |-2
    wait 1
    if !%arg.contains(свиток)%
      osend %actor% Что вы хотите разорвать?
      halt
    end
    osend %actor% Вы разорвали свиток, который рассыпался мириадами разноцветных искр, воодушивив вас непостижимыми подвигами!
    echoaround %actor% %actor.iname% разорвал%actor.g% свиток, который рассыпался мириадами разноцветных искр!
    eval qhryvn 1000+%actor.hryvn%
    if %qhryvn% >= 1500
      eval plushryvn 1500-%actor.hryvn%
    else
      eval plushryvn 1000
    end
    if %plushryvn% > 0
      osend %actor% _Вы заслужили %plushryvn% гривен.
      log %actor.iname% зачитал%actor.g% свиток &Cнепостижимых подвигов&n и получил%actor.g% %plushryvn% гривен.
      eval hryvna %actor.AddCurrency(kCopperGrivna, +%plushryvn%)%
    else
      osend %actor% _И ничего не произошло.
    end
    opurge %self%

