    prepositional: огромном камне
  short_desc: Огромный Камень, исписанный зловещими рунами, лежит тут
  type: kFountain
  extra_flags:
  - kGlow
  - kHum
  material: 12  # драгоценный камень
  values:
  - '999'
  - '999'
  - '1'
