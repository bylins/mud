  extra_descriptions:
  - keywords: камень
    description: |2

      Эпиграф: 'Прежде чем выбрать имя своего персонажа - подумайте: а не
      окажется ли он в Комнате Имени...'
      1.) Не забывайте, что сей мир создан и продолжает существовать благодаря
      мудрым бессмертным. Поэтому если они посчитали, что Ваше имя не подходит
      этому миру - значит так оно и есть. И спорить с Этим не нужно.
      2.) На что должно быть похоже имя персонажа? На любое старославянское имя
      (читайте историческую литературу), которое могло существовать во времена
      Киевской Руси, и производные от него. Например: Ольга, Оленька, Олюшка,
      Оля, Ольгуша - это более-менее. Но вот ОлИнька - уже хуже, это уже скорее
      неграмотно. И так далее. Мужских имен вообще крайне много. Была бы
      фантазия. Яросвет, Ярополк, Яробор, Яромир, Ярогор, Ярослав - это
      навскидку так называемые 'однокоренные' имена. В общем, как говорится,
      немного фантазии и мысли - и все получится. 3.) На что НЕ ДОЛЖНО быть
      похоже имя персонажа? На имена Богов религий, мифологий и эпосов (любых),
      на современные русские и (особенно) иностранные фамилии, на иностранные
      (читайте - неславянские) имена, на имена персонажей литературы стиля 
      фэнтези, на названия единиц измерения чего-либо, названия существовавших, 
      существующих или вымыленных рас или национальностей, на иностранные 
      (интернациональные) слова, на существительные, являющиеся неодушевленными 
      предметами, на имена очень известные имена собственные (названия газет, 
      журналов), и конечно на наименования МОБОВ и НПЧ (продавцов и проч.) 
      Также имена не должны быть откровенно грубыми или вызывающими. Примеры 
      неправильных имен: Ра, Анубис, Кришна, Кузнецов, Джонсон, Джон, Гастелло, 
      Гарольд, Хуан, Мерлин, Ланселот, Ритор, Ахмед, Фунтик, Тонночка, Метрик, 
      Дюймичек, Паскаленыш, Халфлинг, Эльфочка, Немчура, Негроид, Грузинчик, 
      Испэшл, Вумен, Драйвер, Менеджер, Провайдер, Рюмочка, Досочка, Доскамир, 
      Доскасвет, Лодчик, Бутик, Хлебомир, Хлебослав, Некрофил, Алкоголь, Кук, 
      Черчилль, Горби, Сахара, Нэнси, ИванушкИ (последняя буква), Пятачок, 
      Косми, Вогги, Гамер, Ламер, Хакер, Инетер, Факер, Мазафакер, Мудокрякер, и т.п.
      Также следует понимать, что ИМЯ ДОЛЖНО ИМЕТЬ СМЫСЛ. Хоть какой-то. То
      есть, не должно быть имен Вуглускр, Трепидимикир, и прочее. :) Также как и
      Эйворкгоу, Тралявал, Супрогор, Супермир, Фрокстич, Кропсмак, ну и так
      далее. Каждый должен перед тем как выбрать имя подумать, как он сможет
      объяснить свое появление.
      4.) Если Вы сомневаетесь в имени своем - спросите дружеского совета у Богов
      или у опытных игроков хотя бы. Чтобы потом 'не было мучительно больно за
      прожитые годы'. Если имя одобрено любым Богом уровня 'старший Бог'
      (справка боги) - считайте, что можно играть. 5. Если Вы на страх и риск
      свой создали персонажа с именем на свой вкус - не удивляйтесь что вы
      оказались в комнате имени и не устраивайте истерик по этому поводу. Оттуда
      дорога обратная только одна: переименование. На это могут расчитывать
      персонажи 15+ уровня, причем после долгого и упорного (и слезного)
      вымаливания процедуры переименования (вероятность что Старшие Боги на это
      пойдут - порядка 10%)
      Если у вас проблемы с выбором имени, вы можете воспользоваться этими ссылками:
      http://all-names.narod.ru/
      http://arc.novgorod.ru/asgard/libri.php3?cont= sl-name
      http://www.xpomo.com/ruskolan/liter/slavnames.htm
      http://www.devichnik.ru/9810/imia.html
      http://arc.novgorod.ru/asgard/libri.php3?cont= sl-name
      http://paganism.msk.ru/name/name.htm
      http://www.nasled.org/vera/Muzh imena.htm
      http://www.nasled.org/vera/Zhen imena.htm
      http://boyan.narod.ru/slav name.html
      http://slavjanstvo.org/,?,=103
      http://ru.narod.ru/imn/mujskie.htm
      http://ru.narod.ru/imn/jenskie.htm
      При некоторой осмотрительности в выборе, можете попытаться взять скандинавское имя:
      http://www.perumov.rus.net/vo/vonames.html
      http://soviduplo.narod.ru/saga/names.htm
      ________
      Внимание: то, что имя взято с указанных сайтов НЕ ГАРАНТИРУЕТ его одобрения!
