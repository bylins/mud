      description: |2
        Эпиграф: 'Прежде чем выбрать имя своего персонажа - подумайте: а не
        окажется ли он в Комнате Имени...'
        1) Не забывайте, что сей мир создан и продолжает существовать благодаря
        мудрым бессмертным. Поэтому если они посчитали, что Ваше имя не подходит
        этому миру - значит так оно и есть. И сильно спорить с этим не нужно.
        2) Какие имена брать не следует?
        - Имена богов религий и мифологий. (Сварог, Иегова, Гермес, Вотан, Дагда)
        - Схожие до степени смешения с именами активно играющих персонажей.
        (Славомир - Словомир).
        - Имена, написанные с ошибками. (Егнат вместо Игнат)
        - Слова, не являющиеся именами. (Валенок, Топор, Коленвал)
        - Явно не вписывающиеся в антураж мира Древней Руси. (Мбванга, Иоситоси,
          Джон, Джамалугма)
        - Являющиеся ласкательными и уменьшительными формами имен. (Олежек, Мишенька,
          Мариночка, Леха)
        - Имена слишком известных персонажей (реальных и вымышленных), не связанных
          с миром Древней Руси. (Гэндальф, Гермиона, Ушаков)
        - Имена, являющиеся бессмысленным набором букв. (Ырыны, Грпрнк)
        - Грубые, нецензурные и двусмысленные имена. (Примеры придумайте сами)
        3) Каким же имя должно быть чтобы его одобрили?
        Идеальный выбор - не противоречащее правилам славянское имя. При некоторой
        осмотрительности можно выбрать скандинавское, западнославянское или греческое
        имя.
        4) Если Вы сомневаетесь в имени своем - спросите дружеского совета у Богов
        (воззвать текст) или у опытных игроков хотя бы. Чтобы потом 'не было мучительно
        больно за прожитые годы'.
        5) Если у вас проблемы с выбором имени, вы можете воспользоваться этими ссылками:
        http://all-names.narod.ru/
        http://www.xpomo.com/ruskolan/liter/slavnames.htm
        http://www.devichnik.ru/9810/imia.html
        http://paganism.msk.ru/name/name.htm
        http://www.nasled.org/vera/Muzh_imena.htm (нижнее подчеркивание вместо пробела)
        http://www.nasled.org/vera/Zhen_imena.htm (нижнее подчеркивание вместо пробела)
        http://boyan.narod.ru/slav_name.html
        http://ru.narod.ru/imn/mujskie.htm
        http://ru.narod.ru/imn/jenskie.htm
        http://soviduplo.narod.ru/saga/names.htm
        ________
        Внимание: то, что имя взято с указанных сайтов НЕ ГАРАНТИРУЕТ его одобрения!
