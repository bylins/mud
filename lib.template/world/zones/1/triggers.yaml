# Trigger #110
10:
  name: зеленый самоцвет
  attach_type: kMobTrigger
  narg: 100
  arglist: зеленый самоцвет
  trigger_types:
    - kSpeech
  script: |-2
    wait 1s
    echo  Дряхлый старец покряхтел поудобнее устраиваясь на завалинке и начал  вещать.
    wait 1s
    echo -   Да, занятная эта сказка. Рассказал мне ее один пришлый купец по имени  Святорус,
    echo -  будто бывал он у самого Соловья-разбойника в услужении. Видел много разных  темных
    echo -  непотребств чинимых Соловьем и его дочерьми. Поведал купец что поймал  как то
    echo -  Соловей-разбойник волшебника одного, то ли Клестором то ли Нестором  его величали.
    echo -  Хитростью поймал знамо, ибо кто же против волшебника выстоит.
    echo -  Заточил как полагается в темницу и стал выведывать тайны волшебные. И сведал
    echo -  окоянный как волшебного петушка наколдовать...
    wait 1s
    echo -  "Петушок тот силой ворожбы наполнен и хранит дом, на котором сидит, от порчи да
    echo -  сглаза. Сказывал тот купец будто на том петушке самоцвет зеленый и видывал, и
    echo -  еще говорил что Соловей-разбойник иногда ходил к этому петушку и долго сидел
    echo -  с ним в обнимку. Купец сказал что тогда взгляд Соловья становился таким мудрым
    echo -  и умным что аж оторопь брала, это видать... от петушиной магии..... тожа-а-а....
    wait 1s
    echo  Дряхлый старик, говоривший все тише и тише, совсем замолчал и впал в дрему.

# Trigger #111
