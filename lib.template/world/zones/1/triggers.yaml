# Trigger #112
12:
  name: синь кафтан
  attach_type: kMobTrigger
  narg: 100
  arglist: синь кафтан
  trigger_types:
    - kSpeech
  script: |-2
    wait 1s
    echo  Дряхлый старец покряхтел поудобнее устраиваясь на завалинке и начал  вещать.
