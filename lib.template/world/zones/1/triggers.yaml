# Trigger #134
34:
  name: управление колесницей
  attach_type: kRoomTrigger
  narg: 100
  arglist: '*'
  trigger_types:
    - kCommand
  script: |-2
    eval cm %cmd.mudcommand%
    if %cm% == конец
      %send% %actor% Вы покинули место колесничьего.
      %teleport% %actor% 118
      %echoaround% %actor%   %actor.iname% покинул%actor.g% место водителя.
      halt
    end
    calcuid mob 119 mob
    calcuid realroom %mob.realroom% room
    if %cm% == север || %cm% == юг || %cm% == запад || %cm% == восток || %cm% == вверх || %cm% == вниз
      if %cm% == север
        eval dir north
        set msg_dir на север
      elseif %cm% == юг
        eval dir south
        set msg_dir на юг
      elseif %cm% == запад
        eval dir west
        set msg_dir на запад
      elseif %cm% == восток
        eval dir east
        set msg_dir на восток
      elseif %cm% == вверх
        eval dir up
        set msg_dir вверх
      elseif %cm% == вниз
        eval dir down
        set msg_dir вниз
      end
      if %realroom.direction(%dir%)% < 1
        %send% %actor% Вы не сможете сюда полететь...
      else
        detach 135 %mob%
        %echo% Вы полетели %msg_dir%.
        %at% 118 %echo% Вы полетели %msg_dir%.
        %actor.room(%realroom.direction(%dir%)%)%
        %force% %actor% look
        %actor.room(117)%
        %force% %mob% %cmd%
        attach 135 %mob%
        %door% 118 up room %mob.realroom%
      end
    elseif %cm% == смотреть || %cm% == выходы || %cm% == оглядеться
      %actor.room(%mob.realroom%)%
      %force% %actor% %cmd%
      %actor.room(117)%
    elseif %cm% == счет || %cm% == очки || %cm% == уровень
      %send% %actor% Прочность корпуса: %mob.hitp%/%mob.maxhitp%
    elseif %cm% == убить || %cm% == атаковать
      if !%arg%
        %send% %actor% Кого будем атаковать?
      else
        foreach i %mob.all%
          eval string %i.iname%
          if %string.contains(%arg%)% && %i% != %mob% && %i% != %actor%
            eval victim %i%
          break
        end
      done
      if !%victim%
        %send% %actor% Здесь такого не обнаружено.
      else
        eval dmg 1000
        %send% %actor% Вы поразили молнией %victim.vname% на %dmg% ущерба.
        %send% %victim% %mob.iname% поразил%mob.g% вас молнией.
        %echoaround% %victim% %mob.iname% поразил%mob.g%   %victim.vname% молнией.
        %at% %mob.realroom% %damage% %victim% %dmg%
        if %victim.position% > 0
          %send% %actor% Осталось прочности: %victim.hitp%/%victim.maxhitp%
        else
          %send% %actor% Цель уничтожена.
        end
      end
    end
    else
    %send% %actor% Эту команду еще не сделали, выполним от лица чара.
    return 0
    end

