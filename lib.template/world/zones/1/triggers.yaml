    echo -  Вот сдал он работу, примерил Соловей шелом, тот в пору пришелся
    echo -  и сидит как влитой. Нарушил Соловей слово, да и где это видано что бы он его держал,
    echo -  но тут сказал Феклудий слово тайное и ослеп Соловей. Забегал, запричитал, клясть
