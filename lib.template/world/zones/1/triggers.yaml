# Trigger #184
84:
  name: составляем список зон
  attach_type: kRoomTrigger
  narg: 1
  arglist: д н старт конец
  trigger_types:
    - kCommand
    - kAuto
  script: |-2
    context 1
    if %cmd% == старт
      set start 1
      global start
      set first %arg.words(1)%
      set last %arg.words(2)%
      global first
      global last
      set i %first%
      global i
      set zones0
      global zones0
      set zones1
      global zones1
      set zones2
      global zones2
      set zones3
      global zones3
      set zones4
      global zones4
      run 185 %self%
    elseif %cmd% == конец
      send %actor% проверьте переменные по stat room
      unset start
      unset first
      unset last
      unset i
      halt
    end
    if !%start%
      return 0
      halt
    end
    if %cmd% == д
      if %arg% == 1
        set zones1 %zones1% %i%
        set zones1 %zones1.trim%
        global zones1
      elseif %arg% == 2
        set zones2 %zones2% %i%
        set zones2 %zones2.trim%
        global zones2
      elseif %arg% == 3
        set zones3 %zones3% %i%
        set zones3 %zones3.trim%
        global zones3
      elseif %arg% == 4
        set zones4 %zones4% %i%
        set zones4 %zones4.trim%
        global zones4
      else
        set zones0 %zones0% %i%
        set zones0 %zones0.trim%
        global zones0
      end
    end
    set zones %zones% %i%
    set zones %zones.trim%
    global zones
    eval i %i%+1
    global i
    run 185 %self%

# Trigger #185
85:
  name: перебор зон
  attach_type: kRoomTrigger
  narg: 100
  trigger_types:
    - kAuto
  script: |-2
    context 1
    while %i% <= %last%
      set zone %world.zoneName(%i%)%
      if %zone%
        set i %i%
        global i
        send %actor% %i%: %zone%
        send %actor% Добавить в список зон?
        halt
      end
      eval i %i%+1
    done
    set cmd конец
    run 184 %self%

