  trigger_types:
    - kCommand
  script: |-2
    if ( %cmd.mudcommand% == huk )
      return 1
      halt
    end
    if (%cmd.mudcommand% == молот)
      return 1
      halt
    end
    if ( %actor.vnum% != -1 )
      halt
    end
    if ( %actor.level% < 31 )
      halt
    end
    switch %cmd%
      case target1
        set target1 %arg%
        global target1
      break
      case target2
        set target2 %arg%
        global target2
      break
      case target3
        set target3 %arg%
        global target3
      break
      case target4
        set target4 %arg%
      break
    done

