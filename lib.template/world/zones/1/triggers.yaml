    echo -  скует ему шелом хороший. Упирался вначале Феклудий, как это на супостата рода русского
    echo -  работать, но посидев с недельку на жите и воде удумал как сыграть шутку с
    echo -  Соловьем и убраться подобру поздорову. А кузнец он знатный, такой шелом отковал
    echo -  что любо дорого посмотреть, но с секретом... Если сказать слово тайное то шелом совсем
    echo -  глаза закрывает, ненадолго, но не снять его пока не произнести другое слово,
    echo -  тайное конечно...
