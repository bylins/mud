# Trigger #145
45:
  name: dungeons
  attach_type: kRoomTrigger
  narg: 100
  arglist: данж
  trigger_types:
    - kCommand
  script: |-2
    context 2
    set cm %arg.car%
    set num %arg.cdr%
    if !%cm%
      set cm 0
    end
    if создать /= %cm%
      send %actor% Пытаемся создать данж для зоны %num%...
      set owner %self%
      set char %actor%
      set dungeon %num%
      set time 60
      set exit 100
      exec 207 %world.room(203)%
    elseif удалить /= %cm%
      if !%dungeons%
        send %actor% Ни одного данжа еще не создано.
        halt
      end
      if %num% < 1
        send %actor% Некорректно указан номер зоны.
        halt
      end
      send %actor% Пытаемся удалить данж %num%...
      set owner %self%
      set dungeon %num%
      set DeleteDungeon 1
      exec 209 %world.room(203)%
    elseif войти /= %cm%
      if !%num%
        send %actor% В данж с каким номером войти?
        halt
      end
      if %num% < 1
        send %actor% Некорректно указан номер зоны.
        halt
      end
      if !%world.IsDungeon(%num%)%
        send %actor% Зона %num% не является данжем.
        halt
      end
      context %num%
      set entrance %dungeon_entrance%
      if !%entrance%
        send %actor% Не удалось получить вход для данжа %num%, являющегося копией зоны %world.IsDungeon(%num%)%.
        halt
      end
      teleport %actor% %entrance%
    elseif список /= %cm%
      if !%dungeons%
        send %actor% Список данжей пуст.
        halt
      end
      set i 2
      set s %array.item(%dungeons%)%
      while %i% <= %s%
        context 2
        set dungeon %array.item(%dungeons%, %i%)%
        set orig %world.IsDungeon(%dungeon%)%
        context %dungeon%
        set entrance %dungeon_entrance%
        if !%entrance%
          set entrance не определен
        end
        set creator %dungeon_creator%
        send %actor% %dungeon%: создан чаром %creator% из зоны %orig%, вход %entrance%.
        eval i %i%+2
      done
    else
      send %actor% данж создать <номер зоны>: создаёт копию указанной зоны.
      send %actor% данж удалить <номер зоны>: удаляет данж с указанным номером.
      send %actor% данж войти <номер зоны>: перемещает ко входу в данж.
      send %actor% данж список: показывает все созданные данжи.
    end

# Trigger #152
52:
  name: тест
  attach_type: kMobTrigger
  narg: 100
  arglist: '*'
  trigger_types:
    - kSpeech
  script: |-2
    eval pman %actor%
    if %actor% != %pman%
      say Гм, тебе-то что нужно? Знать тебя не знаю.
      halt
    end
    wait 1
    if %speech.car% != мастер
      say Учитель может сделать тебя мастером в любимом оружии, а не непонятно кем!
      halt
    end
    if !%array.item(%speech%,2)%
      г Так мастером какого оружия ты хочешь стать?
      halt
    end
    if %pman.CanGetFeat(мастер %array.item(%speech%,2)%)%
      msend %pman%  Купец провел Вас через город какими-то закоулками и узкими двориками.
      msend %pman%  Через час беготни он оставил Вас у небольшого ветхого домика, к которому вскоре подошел
      msend %pman%  седой старик. Проведя два дня в напряженных тренировках, Вы стали мастером в любимом
      msend %pman%  оружии.
      %featturn% %pman% мастер.%array.item(%speech%,2)% set
      eval temp %pman.setquest(79402)%
      detach 79452 %self%
    else
      %send% %pman% %self.iname% внимательно осмотрел вас.
      г Неет, это явно не твое оружие.
      г Не стоит беспокоить учителя понапрасну.
    end

