# Trigger #106
6:
  name: свиток на право на реморт
  attach_type: kObjTrigger
  narg: 2
  arglist: разорв
  trigger_types:
    - kCommand
  script: |-2
    if %actor.level% > 30
      %send% %actor% вы бессмертный, оно вам зачем?
      halt
    end
    log %actor.iname% использовал%actor.g% %self.vname% под номером %self.vnum%
    %send% %actor% вы разорвали %self.vname%, и неземное блаженство наполнило ваше тело.
    %echoaround% %actor%   %actor.iname% разорвал %self.vname%.
    while !(%actor.level% == 30 && %actor.tnlexp% == 1)
      set exp %actor.MaxGainExp%
      if %random.100% <= 70
        set str Божественный свиток подарил %actor.dname% %exp% опыта!
        set str2 Вы получили %exp% опыта!
        set exp +%exp%
      else
        set str Божественный свиток отнял у %actor.rname% %exp% опыта.
        set str2 Вы потеряли %exp% опыта...
        set exp -%exp%
      end
      if %random.100% <= 15
        send %actor% %str2%
      end
      if %random.100% <= 2
        *worldecho &R%str%&n
      end
      %actor.exp(%exp%)%
      wait 9
    done
    %purge% %self%

