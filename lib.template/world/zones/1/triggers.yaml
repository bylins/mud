# Trigger #114
14:
  name: шелом
  attach_type: kMobTrigger
  narg: 100
  arglist: шелом
  trigger_types:
    - kSpeech
  script: |-2
    wait 1s
    echo  Дряхлый старец покряхтел поудобнее устраиваясь на завалинке и начал  вещать.
    wait 1s
    echo -  А, стало быть понимаешь ты что быть голове на плечах пристало, так расскажу
    echo -  я тебе сказ про то какие Соловей-разбойник с этим беды имеет как рассказывал
    echo -  мне пришлый купец Святорус. Бывал он у самого Соловья-разбойника в услужении, вдоволь
    echo -  он про себя натешился когда Соловей шлем на свою непутевую голову подбирал.
    echo -  А голова у Соловья-разбойника что бочонок, сколько у него в оружной комнате ни
    echo -  хранилось шлемов побитых богатырей ни в один Соловей свою главу встрячь не мог.
    wait 1s
    echo -  Уж и так он пыхтел, и эдак, все одно или совсем мал или уши торчат. Разошелся
    echo -  тогда Соловей и давай своих разбойничков по соседним деревням гонять, что бы
    echo -  поймали ему кузнеца. И словили они кузнеца Феклудия, ох намял он им бока, но
