# Trigger #104
4:
  name: генерация лабиринта пошагово
  attach_type: kRoomTrigger
  narg: 100
  trigger_types:
    - kAct
  script: |-2
    if %self.north% > 0 || %self.south% > 0 || %self.west% > 0 || %self.east% > 0 || %self.up% > 0 || %self.down% > 0
      unset vnums
      unset dirs
      eval vnums %self.north% %self.south% %self.west% %self.east% %self.up% %self.down%
      eval vnums %vnums.trim%
      %door% %self.vnum% north purge
      %door% %self.vnum% south purge
      %door% %self.vnum% west purge
      %door% %self.vnum% east purge
      %door% %self.vnum% up purge
      %door% %self.vnum% down purge
      eval dirs
      eval words %array.item(%vnums%)%+1
      eval words2 1
      while %words% != %words2%
        while !%flag%
          unset list
          if !%northflag%
            eval list %list% north
          end
          if !%southflag%
            eval list %list% south
          end
          if !%westflag%
            eval list %list% west
          end
          if !%eastflag%
            eval list %list% east
          end
          if !%upflag%
            eval list %list% up
          end
          if !%downflag%
            eval list %list% down
          end
          eval list %list.trim%
          eval dir %array.item(%list%, %random.num(%array.item(%list%)%)%)%
          if %dir% == north
            eval dirs %dirs% north
            eval northflag 1
            eval words2 %words2%+1
          end
          if %dir% == south
            eval dirs %dirs% south
            eval southflag 1
            eval words2 %words2%+1
          end
          if %dir% == west
            eval dirs %dirs% west
            eval westflag 1
            eval words2 %words2%+1
          end
          if %dir% == east
            eval dirs %dirs% east
            eval eastflag 1
            eval words2 %words2%+1
          end
          if %dir% == up
            eval dirs %dirs% up
            eval upflag 1
            eval words2 %words2%+1
          end
          if %dir% == down
            eval dirs %dirs% down
            eval downflag 1
            eval words2 %words2%+1
          end
          if %words% == %words2%
            eval flag 1
          end
        done
        unset northflag
        unset southflag
        unset westflag
        unset eastflag
        unset upflag
        unset downflag
        unset flag
      done
      eval dirs %dirs.trim%
      eval words %words%-1
      eval count2 1
      while %count2% <= %words%
        %door% %self.vnum% %array.item(%dirs%, %count2%)% room %array.item(%vnums%, %count2%)%
        eval count2 %count2%+1
      done
    end

