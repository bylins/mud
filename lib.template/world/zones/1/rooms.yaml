16:
  # Room #116
  zone: 1
  name: Комната темной красавицы
  description: |2
       Вы вошли в маленькую комнату под самым небом, сюда могут входить тольео самые
    близкие люди великой колдуньи Морганы. По полкам стояли сосуды с мазями, сухими
    ягодами и разноцветными жидкостями. На тонких жердях, протянутых под потолком,
    висели коренья, пучки высохших трав и цветов. Много места занимает очаг из
    красного кирпича, в очаге горят березовые дрова, заставляя бурно кипеть варево
    в котле, из которого выползает длинный змеевик.
  flags:
  - kIndoors
  - kPeaceful
  - kNoMagic
  - kNoSummonOut
  - kNoWeather
  sector: kInside
  triggers:
  - 198

20:
  # Room #120
  zone: 1
  name: Зал мертвых
  description: |
    ___Огромный зал, словно вырубленный в скале. Гладкие колонны взмывают ввысь,
    теряясь в темноте. Кристаллики льда хрустят  под ногами, иногда взвиваясь
    вместе с поземкой аж до уровня груди. Дорожка из плотно пригнанных друг к другу
    плит приводит к небольшому возвышению, на котором стоит хрустальный трон.
    Абсолютное безмолвие с легким поскрипыванием льдинок заставляет Вас зябко
    кутаться в одежду и вжимать голову в плечи.
  flags:
  - kNoMagic
  sector: kInside
  exits:
  - direction: north
    description: |
      покои Морены
    keywords: дверь|дверь
    exit_flags: 1
    key: 0
    to_room: 121  # Покои Морены
    lock_complexity: 0
  triggers:
  - 198

21:
  # Room #121
  zone: 1
  name: Покои Морены
  description: |
    ___Огромный будуар Хозяйки Мертвых. Только тут горит огонь в камине,
    даря тепло хозяйке и гостям. Перед камином лежит шкура полярного барса.
    Огромная кровать в углу будуара, завалена шкурами песцов и черно-бурых лис.
    Мантия, подбитая горностаем, небрежно брошена на спинку кресла, стоящего около
    волшебного зеркала в серебряной оправе.
  flags:
  - kNoWeather
  sector: kInside
  exits:
  - direction: east
    exit_flags: 0
    key: 0
    to_room: 0
    lock_complexity: 0
  - direction: south
    description: |
      Зал Мертвых
    keywords: дверь|дверь
    exit_flags: 1
    key: 0
    to_room: 120  # Зал мертвых
    lock_complexity: 0
  triggers:
  - 198

25:
  # Room #125
  zone: 1
  name: '&cжилище Браги&n'
  description: |
    ___Вы в небольшой светлой комнате. На ее стенах висят большие зеркала.
    Пол грязный, судя по всему здесь давно не убирали. В дальнем углу комнаты
    лежат &cволшебные арфы&n, сваленные в кучу, как дрова.
  sector: kInside

30:
  # Room #130
  zone: 1
  name: Покои Сытиврата
  description: |
    ___Арбуз подвешенный к потолку наполняет комнату не только мягким светом,
    но и ярким запахом. К нему примешиваются запахи дынного окна, ковра из
    луговых цветов, свежего хлеба, лежащего на широкой ветке молодого деревца
    растущего из-под пола. Ветви его служат не только столом, но и кроватью,
    вешалкой, на которой гостеприимный хозяин оставляет свою широкополую шляпу.
    Комната переполнена запахами, у Вас начинает кружиться голова, заставляя
    присесть на удобно подвернувшийся мягкий корень. 
  flags:
  - kSoundproof
  - kGodsRoom
  - kHouse
  sector: kInside
  extra_descriptions:
  - keywords: комната отдых покой
    description: |
      Комната предназначена для спокойных дум бога Сытиврата.

31:
  # Room #131
  zone: 1
  name: Покои Милича
  description: |
    __Серый туман, окружающий вас со всех сторон, кажется пытается поглотить
    саму вашу сущность. Но немного привыкнув вы понимаете, что стена тумана
    вовсе не рядом, а достаточно далеко, и даже просто дойти до него вам
    не удастся. В этой серой пустоте, иногда проскальзывают какие-то всполыхи,
    материализуются чьи-то мысли, объекты. Вся эта мешанина образов давит на вас,
    вынуждая закрыть глаза, и пожелать оказаться в другом месте. Это не ваш мир.
  flags:
  - kForMages
  - kNoSummonOut
  - kNoTeleportOut
  sector: kInside
  exits:
  - direction: north
    exit_flags: 0
    key: 0
    to_room: 131  # Покои Милича
    lock_complexity: 0
  - direction: east
    exit_flags: 0
    key: 0
    to_room: 131  # Покои Милича
    lock_complexity: 0
  - direction: south
