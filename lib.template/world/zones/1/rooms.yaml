# Room #103
3:
  name: Комната для незарегистрированных игроков, играющих через прокси.
  description: |2
       Еще одна забава нынешних правителей. По словам очевидцев - есть у них
    комната, все выходы из которой зачарованы - куда бы ты ни пошел - обязательно
    возвращаешься сюда же. Немало народу полегло здесь, пока смилостившиеся хозяева
    не снизойдут до путника и не разорвут этот заколдованный круг.
    ___&RЕсли Вы здесь оказались - значит в игре уже есть персонаж с Вашего IP!&n
    Если Вы играете из клуба, сети, используете прокси, а так же не "мультите",
    то можете просить Богов зарегистрировать Вас.
    При этом полезно будет указать кто именно и почему находится с Вами с 1го адреса,
    Это значительно ускорит регистрацию.
    ___&WПросто так никто никого не регистрирует! Приятного времяпровождения!&n
  sector: kCity
  flags:
    - kPeaceful
    - kNoMagic
    - kNoTeleportIn
    - kNoSummonOut
    - kNoTeleportOut
    - kNoWeather
    - kNoRelocateIn
    - kNoBattle
    - kNoItem
  exits:
    - direction: north
      to_room: 103  # Комната для незарегистрированных игроков, играющих через прокси.
    - direction: east
      to_room: 103  # Комната для незарегистрированных игроков, играющих через прокси.
    - direction: south
      to_room: 103  # Комната для незарегистрированных игроков, играющих через прокси.
    - direction: west
      to_room: 103  # Комната для незарегистрированных игроков, играющих через прокси.
    - direction: up
      to_room: 103  # Комната для незарегистрированных игроков, играющих через прокси.
    - direction: down
      to_room: 103  # Комната для незарегистрированных игроков, играющих через прокси.
  triggers:
    - 100  # тестовый
    - 198  # подавление врат в аду

# Room #104
4:
