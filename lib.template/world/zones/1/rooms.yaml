# Room #116
16:
  name: Комната темной красавицы
  description: |2
       Вы вошли в маленькую комнату под самым небом, сюда могут входить тольео самые
    близкие люди великой колдуньи Морганы. По полкам стояли сосуды с мазями, сухими
    ягодами и разноцветными жидкостями. На тонких жердях, протянутых под потолком,
    висели коренья, пучки высохших трав и цветов. Много места занимает очаг из
    красного кирпича, в очаге горят березовые дрова, заставляя бурно кипеть варево
    в котле, из которого выползает длинный змеевик.
  sector: kInside
  flags:
    - kIndoors
    - kPeaceful
    - kNoMagic
    - kNoSummonOut
    - kNoWeather
  triggers:
    - 198  # подавление врат в аду

