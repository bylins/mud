# Rooms for zone 1

0:
  # Room #100
  zone: 1
  name: Тронный зал.
  description: |2
       Величественные мраморные колонны уходят ввысь, подпирая самое небо.  На стенах,
    отделанных редчайшими сортами мрамора красуются барельефы, изображающие бытие
    обитателей замка - охоту на Жар-Птицу, воскрешение Змея Горыныча, зверски
    изрубленного Ильей Муромцем после очередной попойки, пленение Змея Тугарина и
    многое другое. В центре зала - огромный дубовый стол, покрытый скатертью-самобранкой.
  flags:
  - kIndoors
  - kNoMagic
  - kArena
  - kNoTeleportOut
  - kNoWeather
  - kNoRelocateIn
  sector: kInside
  exits:
  - direction: north
    exit_flags: 0
    key: 0
    to_room: 185  # Комната смертной доски
    lock_complexity: 0
  - direction: east
    exit_flags: 0
    key: 0
    to_room: 1100
    lock_complexity: 0
  - direction: south
    exit_flags: 0
    key: 0
    to_room: 184  # Комната наказаний.
    lock_complexity: 0
  - direction: down
    exit_flags: 0
    key: 0
    to_room: 104  # Гостиная палата.
    lock_complexity: 0
  triggers:
  - 100
  - 198

1:
  # Room #101
  zone: 1
  name: Темница
  description: |2
       Угрюмые мрачные многометровые стены окружают тебя со всех сторон. У самого
    потолка кровью начертаны какие-то знаки. Приглядевшись повнимательнее, ты смог
    разобрать старинные буквы:
    ___&rОСТАВЬ НАДЕЖДУ, ВСЯК СЮДА ПОПАВШИЙ.&n
    ___&rЛюбые Пк действия в аду запрещены, наказуемы вплоть до фриза.

    ___&RПОТЕРЯ СВЯЗИ ПРИ ПРОВЕРКЕ НА МУЛЬТИНГ РАВНОСИЛЬНА ПРИЗНАНИЮ СВОЕЙ ВИНЫ!&n
    ____
  flags:
  - kNoEntryMob
  - kIndoors
  - kPeaceful
  - kSoundproof
  - kNoTrack
  - kNoMagic
  - kNoTeleportIn
  - kNoSummonOut
  - kNoTeleportOut
  - kNoWeather
  - kNoRelocateIn
  - kNoItem
  sector: kCity
  exits:
  - direction: up
    description: Решетка
    keywords: решетка|решетку
    exit_flags: 9
    key: 0
    to_room: 104  # Гостиная палата.
    lock_complexity: 0
  triggers:
  - 100
  - 198

