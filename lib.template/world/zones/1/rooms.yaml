  # Room #104
  zone: 1
  name: Гостиная палата.
  description: |2
       Длинная и просторная зала, в которой правители принимают простой люд,
    выслушивают жалобы, принимают челобитные, а порой вершат скорый суд над
    злодеями. В центре зала заметен отделанный крепким деревом люк, который по 
    словам ведет в глубокие княжеские темницы под замком.
