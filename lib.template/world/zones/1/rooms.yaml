# Rooms for zone 1

# Room #100
0:
  name: Тронный зал
  description: |2
    ___Величественные мраморные колонны уходят ввысь, подпирая самое небо. На
    стенах, отделанных редчайшими сортами мрамора красуются барельефы, изображающие
    бытие обитателей замка - охоту на Жар-Птицу, воскрешение Змея Горыныча, зверски
    изрубленного Ильей Муромцем после очередной попойки, пленение Змея Тугарина и
    многое другое. В центре зала - огромный дубовый стол, покрытый
    скатертью-самобранкой.  
  sector: kInside
  flags:
    - kIndoors
    - kArena
    - kNoTeleportOut
    - kNoWeather
    - kNoRelocateIn
    - kAlwaysLit
  exits:
    - direction: north
      to_room: 185  # Комната смертной доски
      key: 0
    - direction: east
      to_room: 1100  # Воздушная лазурная дорожка
      description: дверь
      keywords: дверь
      exit_flags: 1
      key: 0
    - direction: south
      to_room: 184  # Комната наказаний
      key: 0
    - direction: down
      to_room: 104  # Гостинная палата
      key: 0
  triggers:
    - 198  # подавление врат в аду
    - 100  # тестовый
    - 145  # dungeons
    - 143  # тест

# Room #101
1:
  name: Темница
  description: |2
       Угрюмые мрачные многометровые стены окружают тебя со всех сторон. У самого
    потолка кровью начертаны какие-то знаки. Приглядевшись повнимательнее, ты смог
    разобрать старинные буквы:
    ___&rОСТАВЬ НАДЕЖДУ, ВСЯК СЮДА ПОПАВШИЙ.&n
    ___&rЛюбые Пк действия в аду запрещены, наказуемы вплоть до фриза.
    ___&RПОТЕРЯ СВЯЗИ ПРИ ПРОВЕРКЕ НА МУЛЬТИНГ РАВНОСИЛЬНА ПРИЗНАНИЮ СВОЕЙ ВИНЫ!&n
    ____
  sector: kCity
  flags:
    - kNoEntryMob
    - kIndoors
    - kPeaceful
    - kSoundproof
    - kNoTrack
    - kNoMagic
    - kNoTeleportIn
    - kNoSummonOut
    - kNoTeleportOut
    - kNoWeather
    - kNoRelocateIn
    - kNoBattle
  exits:
    - direction: up
      to_room: 104  # Гостинная палата
      description: Решетка
      keywords: 'решетка|решетку'
      exit_flags: 15
      key: 0
  triggers:
    - 100  # тестовый
    - 198  # подавление врат в аду

