        &Mспустить&w, &Mподнять&w - создать/убрать (лестницу) вход на арену для зрителей из НК
        &Mвозврат&w - возвращает Вас с любой клетки залов подготовки в наблюдательскую
        &Mвещать &Cтекст &w- выдает соощение во все клетки обоих залов подготовки и зрителям&n
        &Mокончить &w- открываем проход с центра арены в комнату победителей
