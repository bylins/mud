# Object #1110
10:
  names:
    aliases: доска правилами турнира
    nominative: доска
    genitive: доски
    dative: доске
    accusative: доску
    instrumental: доской
    prepositional: доске
  short_desc: Доска с правилами турнира прибита здесь.
  type: kOther
  material: 9  # ПРОЧНОЕ.ДЕРЕВО
  values:
    - 0
    - 0
    - 0
    - 0
  weight: 500
  cost: 0
  rent_off: 0
  rent_on: 0
  max_durability: 1000
  cur_durability: 1000
  timer: 99999
  sex: kFemale
  max_in_world: 3
  extra_flags:
    - kGlow
    - kNorent
    - kNodonate
    - kNoinvis
    - kNosell
    - kNodecay
    - kSwimming
  extra_descriptions:
    - keywords: доска правилами турнира
      description: |+2
        Все персонажи, желающие учавствовать в турнире, должны в установленном
        --->&YПеред пентаграммой&n
        1) Все персонажи, желающие учавствовать в турнире должны в установленном
        порядке подать заявку проводящему турнир богу.
        2) Порядок проведения боев и состав групп определяется проводящим турнир богом.
        3) После объявления участников следующего боя они должны избавиться от
        всего шмота, напитков (втч всевидения, черных, зеленых бутылок, свитков возврата
        познания и т.д.)
        (разрешается складывать их в сумку, находящуюся в инвентаре), и заявить о
        своей готовности.
            Исключения :
            а) Волхвам следует позаботиться о комплекте рун (можно в собственной сумке,
               не дающей иных бонусов)
        ____б) Купцам следует позаботиться о небольшом количестве денег на руках(1-2к),
               на которые они могут нанять себе при желании последователя.
        4) &RЗапрещено&n использование любых вещей, кроме полученных на арене, как то -
        напитков, посохов, палочек, свитков и так далее. Запрещен обкаст, за исключением своего,
        или полученного от членов группы, учавствующей на турнире.
        5) &RЗапрещено&n увеличение жизни персонажа заклинаниями или от магических вещей, более чем
        он реально может выдержать.
        &W   ---- за нарушение этих двух правил участник может быть &Rдисквалифицирован.&n
        6) &WЗапрещено участие в боях персонажам, нахощимся в БД, может караться вплоть до &Rада.&n
        --->&YПодготовка к бою&n
        1) Все персонажи должны перед установкой пентаграммы заучить все необходимые заклинания,
           чтобы не приходилось этого делать на арене!
        2) Бог устанавливает на персонажа пентаграмму, и он оказывается в зале
        __распорядителя турниров, но &Rон не должен начинать подготовку &n(выходить из этой клетки в
        __Залы для подготовки - до специальной команды, запускающей обратный отсчет,
        __дабы соперники имели равное время на взять-оживить чармиса, обкаститься при помощи специальных мобов
        __в зале, раскидать заклинания увеличить жизнь, высосать жизнь - совершать эти действия можно &Rтолько&n
        __после специальной команды на начало подготовки, а по истечении
        __установленного времени (3 минуты) - все участники должны
        __вернуться в зал распорядителя, или ранее, заявив о своей готовности.
        __В таком случае поединок может быть начат досрочно. Не успевший явиться в установленный срок может быть &Rдисквалифицирован&n.
           
           &c (см план.зала)&n
        --->&YБой&n
        1) После того как бог откроет ворота арены - участникам будет сказано, какие
        именно клетки (всего 4,отмечены красным знаком) должны они занять перед началом поединка.
        2) После того как все участники займут положенные места - ворота закрываются, дается
        обратный отсчет и бой начинается.
        3) В течение боя разрешено использование любых умений, заклинаний, чармисов,
        которых сумеет раздобыть себе участник за время подготовки (запрещено использование
        всех вещей, находящихся в его сумке, а так же пентаграмм, призывов и прочего для
        связи с внешним миром)
        4) В любой момент участник может признать поражение и уйти с арены, не оставив
        останков - достаточно просто набрать &C"сдаться"&n.
        5) По окончании боя (убийстве всех противников, или же признании ими поражения)
        - оставшиеся на арене персонажи должны подняться на мост в центре арены
        где они могут получить награду за победу и/или вернуться домой.
        6) Уйти с турнирной арены участник может только двумя способами
        - концом, или бог, проводящий турнир отпустит его сам (возможно только из
        клетки зала распорядителя).
        7) Турнирные вещи рассыпятся автоматически, когда Вы покинете арену.
           &c (см план.арены)&n
        
        
        
        
        
