# Room #1118
18:
  name: Зал наемников
  description: |2
       В этом конце комнаты отдыха между удобных мягких кресел и диванов бродят наемники.
    Когда-то они все были великими воинами, а теперь вынуждены сражаться в полсилы, 
    чтобы не не мешать Вам проявить себя в полной мере. Самый восточный угол комнаты 
    скрыт под клубами черного дыма... Все присутствующие избегают заходить туда... 
    недобрая, темная волшба творится там...
  sector: kInside
  flags:
    - kIndoors
    - kPeaceful
    - kNoTeleportIn
    - kArena
    - kNoSummonOut
    - kNoTeleportOut
    - kNohorse
    - kNoWeather
  exits:
