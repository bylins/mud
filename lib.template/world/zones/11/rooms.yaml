    - direction: west
      to_room: 1102  # Оружейная
  triggers:
    - 198  # подавление врат в аду
    - 1134  # возврат с залов подготовки в наблюдательскую (возврат)

# Room #1120
20:
  name: Маленькая стойка
  description: |2
       Вы вплотную подошли к стойке, заставленной склянками, кипящими баночками,
    то и дело выпускающими на свободу струи разноцветного пара. Некоторые из них
    вдруг приобретают очертания сказочных существ, вот летит красно-зеленый Змей
    Горыныч, мерно помахивая крыльями, вот волшебная зеленая русалка... В полу Вы заметили
    люк, ведущий в бестиарий. Но чу, кажется, за стойкой кто-то шевелится!
  sector: kInside
  flags:
    - kIndoors
