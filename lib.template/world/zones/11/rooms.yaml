# Room #1119
19:
  name: Комната отдыха
  description: |2
       Вы стоите в большой уютной комнате, предназначенной для отдыха, медленного
    излечения или нудного заучивания заклинаний. Чуть восточнее видно какое-то движение,
    это турнирные помошники готовы служить Вам. В разных концах комнаты расположены
    символы противоборствующих религий - христианства и язычества - небольшая деревянная
    иконка и мрачный алтарь... Здесь Вы можете просить Богов о покровительстве. На
    юге расположена маленькая стойка, заставленная какими-то колбочками.
  sector: kInside
  flags:
