# Rooms for zone 11

# Room #1100
0:
  name: Воздушная лазурная дорожка
  description: |2
       Вы идете по мягко пружинящей под ногами воздушной дорожкой, отливающей чистой
    лазурью. У Вас под ногами - бренный мир, с его бесстыжей подлостью, коварством,
    и с его благородной верностью, любовью, дружбой. Если держаться севера - Вы попадете
    на турнирную арену.
  sector: kInside
  flags:
    - kNoEntryMob
    - kIndoors
    - kPeaceful
    - kNoTeleportIn
    - kArena
    - kNoSummonOut
    - kNoTeleportOut
    - kNohorse
    - kNoWeather
  exits:
    - direction: east
      to_room: 1157  # Высоко в горах
      key: 0
    - direction: south
      to_room: 1178  # Наблюдательная за подготовкой
      key: 0
    - direction: west
      to_room: 100  # Тронный зал
      key: 0
  triggers:
    - 1104  # только боги входят в руму
    - 198  # подавление врат в аду
    - 1007  # zone reset
    - 1144  # запуск проверки экипировки (проверка)
    - 1137  # reset зоны, пуржим руны

# Room #1101
1:
  name: Восточный зал распорядителя турниров
  description: |2
       Вы стоите в большом светлом зале с чистым свежим воздухом. Здесь нельзя определить,
    какое же сейчас время года, суток... какая на самом деле погода... есть только легкость,
    страстное предвкушение кровавых битв. Далеко на западе видна посыпаная песком арена.
  sector: kInside
  flags:
    - kIndoors
    - kPeaceful
    - kArena
    - kNoSummonOut
    - kNoTeleportOut
    - kNoWeather
  exits:
    - direction: north
      to_room: -1
      description: |2
        Врата
      exit_flags: 15
      key: 0
    - direction: east
      to_room: 1106  # Комнатка целителя
      description: |2
        решетка
      keywords: 'решетка|решетку'
      exit_flags: 15
      key: 0
    - direction: west
      to_room: 1103  # Полупрозрачный мостик над ареной
      description: |2
        Врата
      keywords: Врата
      exit_flags: 15
      key: 0
  triggers:
    - 198  # подавление врат в аду
    - 1109  # отпереть ворота арены (31+)
    - 1110  # запереть ворота арены (31+)
    - 1115  # запуск подготовки к бою на арене (подготовка)
    - 1116  # завершение подготовки к бою на арене (готовы)
    - 1128  # Телепортимся в соседний зал 1
    - 1135  # призыв игроков на подготовку зал ВОСТОК
    - 1134  # возврат с залов подготовки в наблюдательскую (возврат)

# Room #1102
2:
  name: Оружейная
  description: |2
    ___В другом конце огромного зала расположилась небольшая уютная оружейная. Из за
    стойки Вам мило улыбается израненный в бесконечных сражениях вояка, всегда
    готовый выдать Вам на бой необходимое снаряжение, чтоб были Вы равны в этом с
    соперником Вашим. Просто набери "&Cполучить&n" - и она твоя. На юге видна конюшня,
    где любой желающий может подобрать себе скакуна по душе.
  sector: kInside
  flags:
    - kIndoors
    - kPeaceful
    - kArena
    - kNoSummonOut
    - kNoTeleportOut
  exits:
    - direction: east
      to_room: 1119  # Комната отдыха
    - direction: south
      to_room: 1114  # Конюшня
    - direction: west
      to_room: 1106  # Комнатка целителя
  triggers:
    - 198  # подавление врат в аду
    - 1100  # зашел к оружейнику
    - 1134  # возврат с залов подготовки в наблюдательскую (возврат)

# Room #1103
3:
  name: Полупрозрачный мостик над ареной
  description: |2
       Вы стоите на небольшом мостике, перекинутым над покрытой песком ареной, чтоб
    доблестные участники турниров могли разойтись по разным углам арены. Мостик
    выглядит достаточно тонким и даже полупрозрачным, но он очень крепкий, Только
    Богам по силам создать подобное. На востоке расположены массивные врата, ведущие
    в залы для отдыха и подготовки.
  sector: kInside
  flags:
    - kIndoors
    - kPeaceful
    - kNoTeleportIn
    - kArena
    - kNoSummonOut
    - kNoTeleportOut
  exits:
    - direction: east
      to_room: 1101  # Восточный зал распорядителя турниров
      description: |2
        Врата
      keywords: Врата
      exit_flags: 9
      key: 0
    - direction: south
      to_room: -1
      description: |2
        Врата
      exit_flags: 15
      key: 0
    - direction: down
      to_room: 1139  # Вдоль восточной стены арены
      key: 0
  triggers:
    - 198  # подавление врат в аду
    - 1109  # отпереть ворота арены (31+)
    - 1110  # запереть ворота арены (31+)
    - 1111  # просить пощады (арг сдаться)
    - 1102  # чек крови
    - 1134  # возврат с залов подготовки в наблюдательскую (возврат)

