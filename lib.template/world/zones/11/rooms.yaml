  name: В клубах черного дыма
  description: |2
       Вы стоите в клубах черного дыма. он занял весь угол, и теперь Вы уже не можете
    точно сказать ни откуда вы пришли, ни как давно, все ваше сознание заполнено только
    этим жутким облаком. У Вас под ногами Вы находите... Да... Это похоже на трупы
    совсем недавно убитых животных...
  sector: kInside
