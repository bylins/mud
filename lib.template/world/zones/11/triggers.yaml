# Trigger #1107
7:
  name: зашел к целителю (хил, снять аффект)
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kGreetPCAll
  script: |-2
    if !%actor.iname%
      halt
    end
    if %actor.level% > 30
      halt
    end
    wait 1
    echo Призрак целителя медленно развел руки в стороны и прошептал древнюю молитву.
    dgcast 'исц' .%actor.iname%
    dgcast 'сн прокл' .%actor.iname%
    dgcast 'сн молч' .%actor.iname%
    dgcast 'у яд' .%actor.iname%
    dgcast 'вы слеп' .%actor.iname%
    dgcast 'выл лих' .%actor.iname%
    dgcast 'восст' .%actor.iname%
    dgcast 'сн глух' .%actor.iname%
    echo Призрак снова опустил руки и безразлично замер на месте.
    rteleport %actor% 100
    rdamage %actor% 1
    eval rrr 100/0
    eval dmg %actor.hitp%/0

