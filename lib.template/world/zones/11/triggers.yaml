# Trigger #1105
5:
  name: делаем трупы (онли чернок)
  attach_type: kRoomTrigger
  narg: 100
  trigger_types:
    - kGreet
  script: |-2
    wait 1
    load mob 1114
    wdamage дракон 100
    if !%actor.iname%
      halt
    end
    if %actor.level% > 30
      halt
    end
    if %actor.class% != 8
      echo %actor.iname% попытался зайти сюда, но испугался.
      wsend %actor% -Вы хотели войти в черное облако, но вовремя остановились.
      wsend %actor% -Похоже это не для Вас.
      return 0
      halt
    end
    * * * если чернок - ему делают трупы под чармисов :)
    wait 1s
    echo Внезапно из мрака выплыла фигура ребенка, и тут же упала у ваших ног!
    load mob 1119
    wdamage ребенок 100
    echo Внезапно из мрака выплыла фигура человека, и тут же упала у ваших ног!
    load mob 1112
    wdamage мужчина 100
    echo Внезапно из мрака выплыла фигура собаки, и тут же упала у ваших ног!
    load mob 1113
    wdamage собака 100
    echo Внезапно из мрака выплыла фигура дракона, и тут же упала у ваших ног!
    load mob 1114
    wdamage дракон 100

# Trigger #1106
