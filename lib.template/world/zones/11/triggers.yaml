# Trigger #1192
92:
  name: Рисуем красным маркером
  attach_type: kObjTrigger
  narg: 1
  arglist: рисовать
  trigger_types:
    - kCommand
  script: |-2
    set selfnum 0
    set num 0
    foreach i %self.pc%
      eval num %num%+1
    done
    set ranofself %random.num(%num%)%
    foreach n %self.pc%
      eval selfnum %selfnum%+1
      if %ranofself% == %selfnum%
        set char %n%
      break
    end
    done
    if ((%char.name% == Свентовит) && (%actor.sex% != 2))
      echo Свентовит разгневанно огляделся по сторонам и закричал : "Я те покажу Свентовит + %actor.iname%"
      odamage %actor% 50
      osend %actor% Свентовит шандарахнул молнией прямо по Вам!
      halt
    end
    if %char.name% == %actor.iname%
      osend %actor% Вы огляделись по сторонам в поисках жертвы ваших фантазий.
      osend %actor% Остановившись на себе любимом, Вы начали было вырисовывать &R%actor.iname% + %actor.iname% = Love...&R
      echoaround %actor% %actor.iname% начал%actor.g% было что-то чертить в воздухе &Rкрасным маркером&n, но похоже передумал%actor.g%...
      osend %actor% Но вовремя остановились, слишком уж неестественно как-то :).
    else
      osend %actor% Вы огляделись по сторонам в поисках жертвы ваших фантазий. Ага, кажется %char.name% - самое оно.
      echoaround %actor% %actor.iname% начал%actor.g% что-то рисовать прямо в воздухе &Rкрасным маркером&n.
      %actor.wait(2)%
      osend %actor% Вы начали что-то рисовать и неожиданно для самого себя выписали &R"%actor.iname% + %char.iname% = Love!"&n
      echoaround %actor% %actor.iname% наконец закончил%actor.g% своё творение...
      echo Надпись &R%actor.iname% + %char.iname% = Love!&n немного повисела в воздухе и потухла.
    end

