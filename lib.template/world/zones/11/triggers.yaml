# Triggers for zone 11

# Trigger #1100
0:
  name: зашел к оружейнику
  attach_type: kRoomTrigger
  narg: 100
  trigger_types:
    - kAct
  script: |-2
    if %actor.level% > 30
      halt
    end
    if !%actor.iname%
      halt
    end
    if %actor.rentable% == 0
      echo %actor.iname% попытался зайти сюда, но &Rкровь&n невинных жертв не стекла с него еще.
      wzoneecho 1101 %actor.iname% в &RКРОВИ&n, это противоречит правилам турнира! %actor.iname%, Покиньте Арену!
      wsend %actor% &RКровь&n с Вас еще не стекла чтоб в боях честных участвовать!
      return 0
      halt
    end
    eval maxhp %actor.maxhitp% + %actor.hitpadd%
    *убираем клич мощи
    if (%direction% == west)
      dgaffect %actor% макс.жизнь 0 0
    end
    *черноки могут дрынится
    if (%actor.class% == 8)
      eval maxhp %maxhp% + %maxhp% * %actor.level% / 10
      *клеры волхвы могут кидать покров
    elseif (%actor.class% == 0) || (%actor.class% == 13)
      eval maxhp %maxhp% + %maxhp% * 33 / 100
    end
    if %actor.hitp% > %maxhp%
      eval buffer %actor.hitp(%maxhp%)%
      wzoneecho 1101 &RПозор&W %actor.dname%, Пришедшему на арену со здоровьем раздутым магией, или вещами неположенными! &n
    end
    wait 1s
    echo - Добро пожаловать на нашу Арену.
    echo - Здесь сражаются лучшие среди лучших за самое первое место!
    echo - Если Вы хотите получить снаряжение на бой - я Вам его дам, просто наберите -
    echo - "&Rполучить&n"

