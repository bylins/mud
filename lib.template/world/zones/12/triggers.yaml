# Trigger #1222
22:
  name: Сет Невидимой Смерти(наемов-воров) (офф + 13шмоток)
  attach_type: kObjTrigger
  narg: 100
  trigger_types:
    - kRandom
  script: |-2
    wait 4s
    if %self.vnum% == 1243
      if !%self.WornBy%
        halt
      end
      set char %self.WornBy%
      set i 0
      set num 0
      while %i% < 18
        eval i %i%+1
        set item %char.eq(%i%)%
        if %item.vnum% > 1225  && %item.vnum% < 1247
          eval num %num%+1
        end
      done
      if %num%>13
        if %char.class% == 4 ||  %char.class% == 2
          otransform 1244
        end
      end
    else
      if %self.WornBy%
        set char %self.WornBy%
        set i 0
        set num 0
        while %i% < 18
          eval i %i%+1
          set item %char.eq(%i%)%
          if %item.vnum% > 1225  && %item.vnum% < 1247
            eval num %num%+1
          end
        done
        if %num%>13
          if %char.class% == 4 ||  %char.class% == 2
            halt
          end
        end
      end
      otransform 1243
    end

