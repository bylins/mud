# Trigger #1224
24:
  name: Сет Темной Власти(черноков-кудесов (пояс + 3 шмотки)
  attach_type: kObjTrigger
  narg: 100
  trigger_types:
    - kRandom
  script: |-2
    set wait 15+%random.15%
    wait %wait%s
    if !%self.WornBy%
      otransform 1251
      wait 30s
      halt
    end
    set char %self.WornBy%
    set qual 0
    set i 0
    while %i% < 18
      eval i %i%+1
      set item %char.eq(%i%)%
      if (%item.vnum% > 1246 && %item.vnum% < 1268) || (%item.vnum% > 1289 && %item.vnum% < 1296)
        eval qual %qual%+1
      end
    done
    if %self.vnum% == 1251
      if %qual% > 3
        if %char.class% == 6
          otransform 1252
        elseif %char.class% == 8
          otransform 1291
        end
      end
    end
    if %qual% < 4 || (%char.class% != 6 && %char.class% != 8)
      otransform 1251
    else
      if %char.class% == 6 && %self.vnum% != 1252
        otransform 1252
      elseif %char.class% == 8 && %self.vnum% != 1290
        otransform 1290
      end
    end

