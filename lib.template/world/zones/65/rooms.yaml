# Rooms for zone 65

# Room #6500
0:
  name: Небольшая полянка
  description: |2
       Только что Вы были в деревне и вот уже оказались посреди небольшой полянки. 
    Как же так, у Вас ведь столько дел было в деревне. А тут вдруг полянка, лес 
    какой-то глухой совсем. Еще и избушка стоит какая-то, покосившаяся вся, словно 
    ее медведь, зимой проснувшийся, шатал.
  sector: kField
  flags:
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: west
      to_room: 6501  # Избушка
      key: 0
  triggers:
    - 6500  # РЕСЕТ ЗОНЫ

# Room #6501
1:
  name: Избушка
  description: |2
    ___Зайдя в избушку, Вы сильно удивились - изнутри она выглядит гораздо более
    просторной. Небольшой деревянный стол, лавки, аккуратная каменная печурка с 
    полатями - вот и все убранство дома. Самое простое русское жилье, разве что 
    звериных шкур здесь побольше, чем в средней деревенской избе. 
  sector: kInside
  flags:
    - kIndoors
    - kPeaceful
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: east
      to_room: 6502  # Небольшая полянка
  triggers:
    - 6501  # Вошли в избушку

# Room #6502
2:
  name: Небольшая полянка
  description: |2
       Свежий воздух, лес светлый вокруг, небольшая цветочная полянка - хорошо на 
    природе. Полузаросшая тропинка уходит в чащу леса, приглашая проследовать за 
    ней. В таком лесу наверняка можно и дичью разжиться, и дровишек сухих в печь 
    насобирать, и ручей чистый отыскать, чтобы воды набрать.
  sector: kField
  flags:
    - kNoEntryMob
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: south
      to_room: 6503  # Полузаросшая тропинка
      key: 0
    - direction: west
      to_room: 6501  # Избушка
      key: 0

# Room #6503
3:
  name: Полузаросшая тропинка
  description: |2
       Двигаясь по тропинке в густом ельнике,  Вы никуда не можете свернуть, зато 
    условия для маскировки  здесь просто  замечательные.  Тихо ступая по мшистому 
    ковру леса, Вы способны уловить  малейшее движение в лесной гуще. Вот куропатка 
    вспорхнула - это Вы случайно наступили на сухую ветку, засмотревшись на деревья.
  sector: kRoad
  flags:
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: north
      to_room: 6502  # Небольшая полянка
      key: 0
    - direction: south
      to_room: 6504  # Под елкой
      key: 0

# Room #6504
4:
  name: Под елкой
  description: |2
       Немного вильнув в сторону,  тропинка проходит под  высокой старой елью. Лучи 
    солнца  едва  пробиваются  сквозь  могучие лапы дерева.  Постепенно Ваши глаза 
    привыкают к полумраку - Вы замечаете небольшой муравейник, возведенный у ствола 
    ели трудолюбивыми черными муравьями.
  sector: kRoad
  flags:
    - kDarked
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: north
      to_room: 6503  # Полузаросшая тропинка
      key: 0
    - direction: south
      to_room: 6505  # Вдоль звериной тропы
      key: 0
  triggers:
    - 6510  # Вход под елку

# Room #6505
5:
  name: Вдоль звериной тропы
  description: |2
       Лесная тропинка здесь  упирается в густые высокие кусты, за которыми Вы 
    замечаете множество звериных следов. Похоже, это звериная тропа на водопой. 
    Лес к западу от Вас кажется более редким,  тогда как на востоке деревья и 
    крупнее, и растут чаще - верный признак источника воды. 
  sector: kRoad
  flags:
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: north
      to_room: 6504  # Под елкой
      key: 0
    - direction: east
      to_room: 6508  # Вдоль кустов
      key: 0
    - direction: south
      to_room: 6506  # На звериной тропе
      exit_flags: 16
      key: 0
    - direction: west
      to_room: 6515  # Вдоль звериной тропы
      key: 0

# Room #6506
6:
  name: На звериной тропе
  description: |2
       Молодая кабаниха с выводком кабанят - три или четыре копытных малыша, 
    статный лось - небось повыше Вас будет даже без рогов, олениха с малышом - 
    похоже очень старая или просто хромая. Следы оленей Вам кажутся совсем 
    свежими - прошло не более часа с того времени как они здесь пробегали, 
    сначала на восток, к водопою, а потом обратно. 
  sector: kRoad
  flags:
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: north
      to_room: 6505  # Вдоль звериной тропы
      exit_flags: 16
      key: 0
    - direction: east
      to_room: 6507  # По звериной тропе
      key: 0
    - direction: west
      to_room: 6516  # Поваленное дерево
      key: 0

# Room #6507
7:
  name: По звериной тропе
  description: |2
       Все те же кабаньи, лосиные и оленьи следы с востока и на восток. Оторвавшись 
    от чтения  следов на тропе,  Вы замечаете,  что уже почти  подошли к широкому 
    оврагу. Видимо, ручей придется искать где-то за ним. Внезапно Вы замечаете клок 
    волчьей шерсти на ветке  кустарника. Похоже, иногда к этому  водопою ходят и 
    хищники.
  sector: kRoad
  flags:
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: north
      to_room: 6508  # Вдоль кустов
      exit_flags: 16
      key: 0
    - direction: east
      to_room: 6510  # На краю оврага
      key: 0
    - direction: west
      to_room: 6506  # На звериной тропе
      key: 0

# Room #6508
8:
  name: Вдоль кустов
  description: |2
       Странно, но  продвигаясь вдоль кустов,  Вы не слышите журчания  ручья и не 
    замечаете никаких  других признаков  его близости.  Зато вот меж деревьями на 
    востоке явно есть какое-то пространство - то ли пруд, то ли болотистая низина.
    Надо бы поосторожнее идти, неторопясь.
  sector: kInside
  flags:
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: east
      to_room: 6509  # У края оврага
      key: 0
    - direction: south
      to_room: 6507  # По звериной тропе
      exit_flags: 16
      key: 0
    - direction: west
      to_room: 6505  # Вдоль звериной тропы
      key: 0

# Room #6509
9:
  name: У края оврага
  description: |2
       Широкий, глубокий песчаный овраг раскинулся прямо у Ваших ног. Спускаться 
    в него было бы как минимум неразумно - сыпучие стены могут оказаться прекрасной 
    ловушкой не только для зверя, но и для человека. Как же звери ходят на водопой? 
    Уж не по канатной же дороге, наверное.
  sector: kHills
  flags:
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: south
      to_room: 6510  # На краю оврага
      key: 0
    - direction: west
      to_room: 6508  # Вдоль кустов
      key: 0

# Room #6510
10:
  name: На краю оврага
  description: |2
       Судя по следам, недавно пробежавшая пара оленей второпях сломала итак уже 
    трухлявое дерево, служившее единственной переправой на другую сторону оврага. 
    При этом сами олени явно  успели перебраться,  хотя изрытая копытами кромка 
    оврага говорит о том, что им это далось нелегко. Теперь придется искать иной 
    путь к роднику или делать свой собственный мост.
  sector: kHills
  flags:
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: north
      to_room: 6509  # У края оврага
      key: 0
    - direction: west
      to_room: 6507  # По звериной тропе
      key: 0

# Room #6511
11:
  name: На бревне
  description: |2
       Вы неторопясь, буквально по шажочку, продвигаетесь по поваленному бревну. 
    Зачем-то взглянув вниз, Вы замечаете трухлявое толстое дерево, рухнувшее на 
    дно оврага  совсем недавно.  Подняв глаза,  Вы сумели таки  вернуть себя в 
    вертикальное положение и не соскользнуть с бревна вниз. 
  sector: kStoneroad
  flags:
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: east
      to_room: 6512  # На краю оврага
      key: 0
    - direction: west
      to_room: 6510  # На краю оврага
      key: 0

# Room #6512
12:
  name: На краю оврага
  description: |2
       Широкий, глубокий песчаный  овраг раскинулся  прямо у Ваших ног. Спускаться 
    в него было бы как минимум неразумно - сыпучие стены могут оказаться прекрасной 
    ловушкой не только для зверя,  но и для человека.  От места, к которому раньше 
    вела переправа, продолжается звериная тропинка, уходя на северо-восток.
  sector: kHills
  flags:
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: north
      to_room: 6513  # Тропа у оврага
      key: 0
    - direction: west
      to_room: 6511  # На бревне
      key: 0

# Room #6513
13:
  name: Тропа у оврага
  description: |2
       Овраг остался неподалеку на западе, а тропинка все больше заворачивает к 
    востоку, подальше от него. Вот уже слышно стало журчание ручья - скоро можно 
    будет вдоволь напиться да набрать воды в дорогу. Все следы на тропе, кажется 
    свидетельствуют о нетерпении животных в предвкушении чистой прохладной воды. 
  sector: kRoad
  flags:
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: east
      to_room: 6514  # У водопоя
      key: 0
    - direction: south
      to_room: 6512  # На краю оврага
      key: 0

# Room #6514
14:
  name: У водопоя
  description: |2
       Наконец Вы вышли на  более или менее открытое место.  Среди звериных следов 
    здесь четко просматриваются волчьи лапы - похоже, до поры до времени он таился 
    за густым кустарником на юге. Следов кровопролития, однако, Вы здесь не видите - 
    значит, его жертва сумела спастись бегством.
  sector: kRoad
  flags:
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: west
      to_room: 6513  # Тропа у оврага
      key: 0

# Room #6515
15:
  name: Вдоль звериной тропы
  description: |2
       Двигаясь вдоль звериной тропы,  что к югу отсюда,  Вы наконец можете немного 
    расслабиться - стена кустов закроет Вас от любого зверя, если он вдруг появится 
    на тропе. Да и комаров по эту сторону кустов должно быть значительно меньше - 
    во-первых звери гораздо вкуснее людей, а во-вторых они все же бывают тут чаще, 
    чем те, кто на них охотится. 
  sector: kRoad
  flags:
    - kNoEntryMob
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: east
      to_room: 6505  # Вдоль звериной тропы
      key: 0
    - direction: south
      to_room: 6516  # Поваленное дерево
      exit_flags: 16
      key: 0
    - direction: west
      to_room: 6523  # Около кустов
      key: 0

# Room #6516
16:
  name: Поваленное дерево
  description: |2
       Могучий старый клен,  поваленный пару-тройку лет назад,  заставляет всех и 
    каждого кланяться,  проходя под его  широким стволом.  Пройдя под деревом, Вы 
    оказываетесь возле большой  поляны с ярко-зеленой сочной  травой. Наверняка это 
    место часто посещается различными травоядными животными, годными к употреблению 
    в пищу. 
  sector: kRoad
  flags:
    - kNoEntryMob
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: north
      to_room: 6515  # Вдоль звериной тропы
      exit_flags: 16
      key: 0
    - direction: east
      to_room: 6506  # На звериной тропе
      key: 0
    - direction: south
      to_room: 6530  # Дремучий лес
      key: 0
    - direction: west
      to_room: 6526  # Начало поляны
      key: 0

# Room #6517
17:
  name: Погребок
  description: |2
    ___Нечего Вам тут делать, служебное помещение, проваливайте!
  sector: kInside
  flags:
    - kIndoors
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: up
      to_room: 6501  # Избушка
      key: 0

# Room #6521
21:
  name: Северо-западный край поляны
  description: |2
       Просторная поляна с высокой травой окаймляется густым непролазным лесом. 
    Редкое квакание (с юга) и мерное жужжание пчел (с востока), дополняют друг 
    друга, образуя прелестную песню, разносящуюся по поляне. Ветер подпевает 
    им, шелестя травами и качая скрипучие старые деревья в лесу. 
  sector: kField
  flags:
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: east
      to_room: 6522  # Улей
      key: 0
    - direction: south
      to_room: 6524  # Возле пруда
      key: 0

# Room #6522
22:
  name: Улей
  description: |2
       Проходя по поляне вдоль стены густого леса, Вы замечаете небольшой пчелиный 
    улей, гнездящийся в дупле  старого кряжистого дуба.  Видимо, обилие цветов на 
    поляне привлекает сюда не только травоядных животных. Мерное жужжание, исходящее 
    от улея, подсказывает, что тревожить его не стоит - тут и спрятаться-то от пчел 
    некуда. 
  sector: kField
  flags:
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: east
      to_room: 6523  # Около кустов
      key: 0
    - direction: south
      to_room: 6525  # В центре поляны
      key: 0
    - direction: west
      to_room: 6521  # Северо-западный край поляны
      key: 0

# Room #6523
23:
  name: Около кустов
  description: |2
       Вы вышли на широкую поляну, окруженную темным густым лесом. На восток уходит 
    еле заметная охотничья тропинка, проходящая вдоль звериной тропы за кустами.
    Нужно держать лук наготове - множество свежих следов выдают присутствие на 
    этой поляне как минимум двух оленей и одного волка. 
  sector: kField
  flags:
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: east
      to_room: 6515  # Вдоль звериной тропы
      exit_flags: 16
      key: 0
    - direction: south
      to_room: 6526  # Начало поляны
      key: 0
    - direction: west
      to_room: 6522  # Улей
      key: 0

# Room #6524
24:
  name: Возле пруда
  description: |2
       Небольшой пруд в этой  части поляны является  жилищем для  множества мелких 
    лягушек и стрекоз. Невысокий камыш растет по краям пруда, мешая крупным зверям 
    вмешиваться в спокойную обстановку пруда. Пожалуй, и Вам не стоит соваться в 
    этот пруд - вода в нем явно не родниковая. 
  sector: kField
  flags:
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: north
      to_room: 6521  # Северо-западный край поляны
      key: 0
    - direction: east
      to_room: 6525  # В центре поляны
      key: 0
    - direction: south
      to_room: 6527  # В углу поляны
      key: 0

# Room #6525
25:
  name: В центре поляны
  description: |2
       Щебетание птиц, жужжание насекомых, шум леса, окружающего поляну со всех 
    сторон. Все эти звуки успокаивают Вас, создают неповторимую уютную атмосферу 
    родных лесов. Хочется  завалиться в траву и  позабыть обо всем. Лишь обилие 
    следов животных на поляне  заставляет Вас оставаться на  чеку - добыча уже 
    где-то рядом. 
  sector: kField
  flags:
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: north
      to_room: 6522  # Улей
      key: 0
    - direction: east
      to_room: 6526  # Начало поляны
      key: 0
    - direction: south
      to_room: 6528  # В тени леса
      key: 0
    - direction: west
      to_room: 6524  # Возле пруда
      key: 0

# Room #6526
26:
  name: Начало поляны
  description: |2
       Вы вышли на широкую поляну, окруженную темным густым лесом. На восток уходит 
    широкая, кишащая гнусом звериная тропа, ведущая на водопой. В центре поляны Вы 
    замечаете какое-то движение. Необходимо действовать очень аккуратно, чтобы не 
    спугнуть добычу. 
  sector: kField
  flags:
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: north
      to_room: 6523  # Около кустов
      key: 0
    - direction: east
      to_room: 6516  # Поваленное дерево
      key: 0
    - direction: south
      to_room: 6529  # Изрытая полянка
      key: 0
    - direction: west
      to_room: 6525  # В центре поляны
      key: 0

# Room #6527
27:
  name: В углу поляны
  description: |2
       Первое что бросается в глаза в этой части поляны - множество мошек и комаров. 
    Вам приходится  одной рукой  отмахиваться от  этого множества,  в то время как 
    другая Ваша  рука занята  потиранием глаз,  в которые это  множество постоянно 
    лезет. Видимо,  небольшой пруд с  камышами на севере  да тень от леса создают 
    замечательные условия для этих плотоядных стай насекомых. 
  sector: kField
  flags:
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: north
      to_room: 6524  # Возле пруда
      key: 0
    - direction: east
      to_room: 6528  # В тени леса
      key: 0

# Room #6528
28:
  name: В тени леса
  description: |2
       Здесь, у южного края поляны, солнце бывает нечасто. Густой лес отбрасывает 
    широкую тень,  лишь изредка позволяя  отдельным снопам лучей ласкать здешние 
    травы да цветы. Зато в знойные летние дни здесь всегда можно укрыться от жары. 
  sector: kField
  flags:
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: north
      to_room: 6525  # В центре поляны
      key: 0
    - direction: east
      to_room: 6529  # Изрытая полянка
      key: 0
    - direction: west
      to_room: 6527  # В углу поляны
      key: 0

# Room #6529
29:
  name: Изрытая полянка
  description: |2
       Просторная поляна с высокой травой окаймляется густым непролазным лесом. 
    Небольшие змеиные (или кротовьи) норки, уходящие под землю, виднеются то тут, 
    то там. Некоторые из земляных наверший нор затоптаны, судя по всему, оленьими 
    копытами - видимо, оленихе здесь было не до осторожности.
  sector: kField
  flags:
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: north
      to_room: 6526  # Начало поляны
      key: 0
    - direction: west
      to_room: 6528  # В тени леса
      key: 0

# Room #6530
30:
  name: Дремучий лес
  description: |2
       Множество деревьев  растет вокруг Вас,  но не каждое из них  подойдет для 
    небольшого охотничьего топорика. Назойливые насекомые так и норовят забраться 
    к Вам за шиворот - приходится постоянно отмахиваться. Неужели было не выбрать 
    лес пореже? 
  sector: kForest
  flags:
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: north
      to_room: 6516  # Поваленное дерево
      key: 0
    - direction: east
      to_room: 6531  # В чаще
      key: 0
    - direction: south
      to_room: 6533  # В глубине леса
      key: 0

# Room #6531
31:
  name: В чаще
  description: |2
       Массивный кустарник на севере напрочь закрывает путь к звериной тропе. 
    Велик соблазн срубить первое попавшееся молодое деревце, но ведь тогда лес 
    не будет обновляться, состарится, а может и вовсе погибнуть. Да и дрова то 
    из молодых деревьев не шибко хорошие - сырые больно. 
  sector: kForest
  flags:
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: east
      to_room: 6532  # В гуще леса
      key: 0
    - direction: south
      to_room: 6534  # В глуши
      key: 0
    - direction: west
      to_room: 6530  # Дремучий лес
      key: 0

# Room #6532
32:
  name: В гуще леса
  description: |2
       Ну вот Вы и нагулялись, упершись в глухой завал из деревьев. Никуда отсюда 
    пройти не получится - нужно возвращаться обратно в чащу леса, пока комарье не 
    обглодало кожу до костей.  Побыстрее бы нарубить  пару-тройку охапок дров и 
    вылезти из этого недружелюбного местечка. 
  sector: kForest
  flags:
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: west
      to_room: 6531  # В чаще
      key: 0

# Room #6533
33:
  name: В глубине леса
  description: |2
       Вы вышли на небольшое открытое место в лесу. Идти дальше в глубину леса было 
    бы как минимум неразумно.  Лучше пройтись вдоль звериной  тропки - найти ручей, 
    о котором говорил  старичок. Да и требу  хозяину леса в такой  глуши, явно, не 
    оставишь - во век не сыщет.
  sector: kForest
  flags:
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: north
      to_room: 6530  # Дремучий лес
      key: 0
    - direction: east
      to_room: 6534  # В глуши
      key: 0

# Room #6534
34:
  name: В глуши
  description: |2
       Стоило ли забираться так глубоко в лес? Пожалуй, в незнакомом лесу лучше 
    долго не бродить  -  можно ведь и заблуждать с непривычки. Быстренько рубим 
    нужное количество деревьев и улепетываем отсюда  -  куда-нибудь на полянку, 
    где ветерок сдувает хотя бы большие тучи кусачих насекомых. 
  sector: kForest
  flags:
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: north
      to_room: 6531  # В чаще
      key: 0
    - direction: west
      to_room: 6533  # В глубине леса
      key: 0
