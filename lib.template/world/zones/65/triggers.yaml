# Trigger #6511
11:
  name: Проверка миниквеста оленихи
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kAuto
  script: |-2
    *проверка миниквеста оленихи | Mobiles | Auto | 100
