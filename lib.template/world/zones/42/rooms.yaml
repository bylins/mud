18:
  name: Густой кустарник
  description: |2
       Под ногами трещит сухой хворост. А вокруг раскинулись заросли орешника.
    Толстые стволы чередуются с молодой, в палец толщиной, порослью. На востоке,
    спрятавшись подальше от нескромного взгляда, поблескивает гладь лесного озера.
  sector: kField
  flags:
