# Room #4231
31:
  name: Дубовая роща
  description: |2
    ___С вечного дуба смотрит владыка Огня и Жизни. Бог, который для плодородия Земли
    золотыми бичами гоняет в небе черных коров, однажды громовым копьем бросил себя
    на священное с того дня дерево. Это было давно-давно, при пращурах или при
    более дальних предках, для которых по древности лет нет обозначения степени
    родства. Бог сломил-разбил вершину дуба и, уйдя назад от оплодотворенной земли
