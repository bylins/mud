# Room #4220
20:
  name: Лесное озеро
  description: |2
       Небольшое озеро, спрятавшееся среди зарослей кустарника, кажется бездонным
    из-за отражающегося в недвижимой поверхности неба. На востоке виднеется
    златоверхий терем, ярко выделяющийся среди темной массы деревьев. Отсюда видна
    только золоченая кровля с золотыми репьями. Пышные резные мотивы покрывают
    оконные наличники: тут и травные узоры и птицы и звери. Верхние ярусы терема
    украшают многоцветные изразцы.  
  sector: kWaterSwim
  flags:
    - kBfsMark
  exits:
    - direction: north
      to_room: 4243  # Спуск к озеру
    - direction: east
      to_room: 24200  # Высокий терем
      key: 0
    - direction: south
      to_room: 4221  # Поляна у озера
    - direction: west
      to_room: 4218  # Густой кустарник

