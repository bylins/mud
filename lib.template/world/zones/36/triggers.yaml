# Trigger #3666
66:
  name: Именной шмот - Бергер
  attach_type: kObjTrigger
  narg: 100
  trigger_types:
    - kGreet
    - kReceive
    - kDamage
  script: |-2
    if (%actor.level% > 30 ) && (%actor.vnum% == -1 )
      halt
    end
    if (%actor.iname% != Бергер)
      osend %actor% Вы попробовали поднять &rжелудок&n, но это оказалось Вам не под силу.
      return 0
      halt
    else
      wait 1
      osend %actor% Вы начали трогать свой &rжелудок&n и пихать в него все подряд.
      echoaround %actor% %actor.iname% начал%actor.g% трогать свой &rжелудок&n и пихать в него все подряд.
