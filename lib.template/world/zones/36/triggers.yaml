# Triggers for zone 36

# Trigger #3600
0:
  name: Именной шмот - Майя
  attach_type: kObjTrigger
  narg: 100
  trigger_types:
    - kGreet
    - kReceive
    - kDamage
  script: |-2
    if (%actor.level% > 30 ) && (%actor.vnum% == -1 )
      halt
    end
    if ((%actor.iname% != Майя ) && (%actor.clan% != БУ ))
      otransform 3614
      osend %actor% ___&KРука невероятных размеров&n показалась из &Rжелудочка&n и скрутила вам фигуру из трех пальцев. &RДоступ не разрешен!&n
      echoaround %actor% ___&KНевероятных размеров рука&n показалась из &Rжелудочка&n и скрутила %actor.iname% фигуру из трех пальцев
      return 0
      halt
    else
      wait 1
      osend %actor% ___&KЧеловечий&n &Rжелудочек&n заглотил вашу руку по самый локоть. Ну и мерзость!
      echoaround %actor% ___&KЧеловечий&n &Rжелудочек&n быстро заглотил руку Майи по самый локоть и стал ее переваривать. Ну и вонища!
    end

