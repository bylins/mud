  sector: kInside
  flags:
    - kDarked
  exits:
    - direction: north
      to_room: 6326  # Винный погреб
    - direction: south
      to_room: 6330  # Погреб

# Room #6328
28:
  name: 'Склады '
  description: |2
    ___Вы попали в склады с едой, точнее, с тем, что от нее осталось. Вокруг валяются
    куски мешков из-под зерна или муки. Здесь стоят ящики, в которых хранились продукты,
