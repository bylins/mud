# Rooms for zone 63

# Room #6300
0:
  name: Заросшая тропинка
  description: |2
       Едва заметная тропинка ведет вас сквозь кусты можжевельника. Вокруг 
    сплошной бурелом, вам постоянно приходится перешагивать через выпирающие
    корни деревьев. Под вашими ногами трещат ломающиеся сучки и ветки.
  sector: kInside
  flags:
    - kNoEntryMob
  exits:
    - direction: north
      to_room: 6341  # Заросшая тропинка
    - direction: east
      to_room: 6030  # Сторожевая дорога

# Room #6301
1:
  name: В башне
  description: |2
       Огромная куча мусора вызывает запах затхлости и не очень приятные ощущения.  
    Над ней огромная дыра в потолке, при дожде сюда попадает вода, поэтому тут все
    и гниет. В куче копошатся разные мелкие твари и насекомые, ищущие себе
    пропитание из себе подобных или всякой требухи.    
  sector: kInside
  exits:
    - direction: north
      to_room: 6318  # В башне
    - direction: east
      to_room: 6320  # В башне
    - direction: down
      to_room: 6322  # Погреб
      exit_flags: 16

# Room #6302
2:
  name: Коридор
  description: |2
    ___Вы попали в довольно узкий коридор, в который пробивается свет сквозь дыру
    в крыше. На полу груды обломков всевозможных размеров, упавшие со стен и
    потолка. Странно, но даже в этой разрухе есть своя красота. Глядя на эту 
    разруху, вы понимаете, что это может произойти в любое время с остальными 
    пограничными сторожками.
  sector: kInside
  exits:
    - direction: east
      to_room: 6306  # Коридор
    - direction: west
      to_room: 6303  # Внутри сторожки

# Room #6303
3:
  name: Внутри сторожки
  description: |2
       Вы стоите внутри сторожки. Окружающие стены заросли плющом, дерево
    подгнило, кое-где сквозь стены пробивается наружный свет. Явно сюда давно
    никто не заглядывал, ничего не прибирали. Повсюду пыль и грязь, на полу 
    валяются лохмотья - призрак прошлого.
  sector: kInside
  flags:
    - kNohorse
  exits:
    - direction: east
      to_room: 6302  # Коридор
    - direction: west
      to_room: 6344  # Перед входом в башню

# Room #6304
4:
  name: Коридор
  description: |2
    ___В этом длинном коридоре раньше на стенах висели гобелены и оружие,
    напоминавшие всем о силе и могуществе Руси. В останках окон, или,
    вернее, бойниц, виднеются кусты, выросшие с тех пор, как погибли
    жившие тут защитники.
  sector: kInside
  exits:
    - direction: north
      to_room: 6309  # Коридор
    - direction: south
      to_room: 6306  # Коридор

# Room #6305
5:
  name: Коридор
  description: |2
    ___Повернув сюда, вы понимаете, что здание было разрушено очень давно, так 
    как часть крыши упала, и отсюда видно небо. При взгляде на стены понятно,
    что и они через год или два осыпятся, хотя - сколько лет они уже стоят в
    таком виде?
    <winterday>R___На полу валяется снег. И снежинки спускаются прямо на вас. Повсюду гуляют сквозняки,
    которые пробирают вас своим холодом до самых костей.<winterday>
    <winternight>R___На полу валяется снег. И снежинки спускаются прямо на вас. Повсюду гуляют сквозняки,
    которые пробирают вас своим холодом до самых костей.<winternight>
  sector: kInside
  exits:
    - direction: north
      to_room: 6346  # Столовая
    - direction: east
      to_room: 6309  # Коридор
    - direction: west
      to_room: 6307  # Развилка коридора

# Room #6306
6:
  name: Коридор
  description: |2
    ___Тут очень тихо, и почти ничто не мешает вам предаться своим мыслям. 
    По-видимому, вам это что-то напоминает. Вероятно, байки, которые вам 
    рассказывал ваш дед или отец.
  sector: kInside
  exits:
    - direction: north
      to_room: 6304  # Коридор
    - direction: south
      to_room: 6311  # Комнатушка
    - direction: west
      to_room: 6302  # Коридор

# Room #6307
7:
  name: Развилка коридора
  description: |2
       В этом месте коридор разветвляется на запад и на север. С запада слышны
    какие-то скребущие звуки. Вокруг кружится пыль, поднимаемая легким ветерком,
    задувающим сюда через щели и дыры в стенах и в потолке.
  sector: kInside
  exits:
    - direction: east
      to_room: 6305  # Коридор
    - direction: west
      to_room: 6308  # Подъем

# Room #6308
8:
  name: Подъем
  description: |2
    ___В углу здесь висят обломки лестницы, ведущей на второй ярус башни. Вроде
    похоже на то, что ею все-таки можно воспользоваться. Где-то высоко завывает
    ветер среди заброшенных стен.
  sector: kInside
  flags:
    - kNoEntryMob
  exits:
    - direction: east
      to_room: 6307  # Развилка коридора
    - direction: up
      to_room: 6348  # Коридор во втором ярусе

# Room #6309
9:
  name: Коридор
  description: |2
    ___Как только вы вошли сюда, вы сразу почувствовали какой-то неприятный 
    запах. Видимо, его выделяют те, кто тут обитает. На стенах висят держатели
    для факелов, в некоторые воткнуты сами факелы, но при прикосновении они 
    раcсыпаются в труху.
  sector: kInside
  exits:
    - direction: south
      to_room: 6304  # Коридор
    - direction: west
      to_room: 6305  # Коридор

# Room #6310
10:
  name: Коридор во втором ярусе
  description: |2
    ___Здесь коридор сужается, даже два крупных воина не смогут поместиться рядом.
    Видно, это сделано специально, чтобы было легче обороняться, если ворвутся
    в сторожку и займут первый ярус. Судя по разрушениям, так и произошло:
    короткий бой внизу и длительная оборона последующих ярусов.
  sector: kInside
  exits:
    - direction: north
      to_room: 6348  # Коридор во втором ярусе
    - direction: south
      to_room: 6312  # Коридор во втором ярусе

# Room #6311
11:
  name: Комнатушка
  description: |2
    ___Эта комнатушка была, видимо, предназначена для одного человека, так что 
    он сидел и охранял вход в подвалы сторожки, в которых хранились запасы 
    пищи, воды и вина. Комната сделана так, что ее легко может оборонять один
    человек против большой группы.
  sector: kInside
  exits:
    - direction: north
      to_room: 6306  # Коридор
    - direction: east
      to_room: 6313  # Кладовка 

# Room #6312
12:
  name: Коридор во втором ярусе
  description: |2
       Сильные разрушения вокруг, каждый сантиметр стен просто исполосован
    выбоинами, что могут оставлять только мечи и копья. Видно, здесь шел долгий
    и кровавый бой.
  sector: kInside
  exits:
    - direction: north
      to_room: 6310  # Коридор во втором ярусе
    - direction: east
      to_room: 6317  # Коридор во втором ярусе

# Room #6313
13:
  name: 'Кладовка '
  description: |2
       Вы попали в кладовку, в которой хранилось запасное обмундирование солдат.
    Но ее еще тогда всю разворовали, поэтому тут вряд ли можно что-нибудь найти.
    Из подвала идет прохладный воздух, благодаря которому вещи не ела моль и 
    прочая нечисть.
  sector: kInside
  exits:
    - direction: west
      to_room: 6311  # Комнатушка

# Room #6314
14:
  name: Коридор во втором ярусе
  description: |2
       Коридор или галерея внутри сторожевой башни сделан так, что каждый шаг
    назад выводил защитника все выше и выше, и можно легко обстреливать тех, кто
    поднимался ниже и укрываться за поручнями из толстого дерева.
  sector: kInside
  exits:
    - direction: north
      to_room: 6345  # Коридор
    - direction: south
      to_room: 6319  # Коридор во втором ярусе

# Room #6315
15:
  name: Лестница на втором ярусе
  description: |2
       Второй ярус закончился, вот лестница, ведущая выше, в дозорную башню.
    Где-то над самой головой слышен ветер, раскачивающий остатки крыши, 
    его вой раздается, как унылая погребальная песня всем, кто погиб здесь.
  sector: kInside
  exits:
    - direction: east
      to_room: 6345  # Коридор
    - direction: up
      to_room: 6316  # В башне

# Room #6316
16:
  name: В башне
  description: |2
       Вы вышли на дозорную башню. Бойницы со всех четырех сторон шире обычных,
    оно и понятно - отсюда в первую очередь надо наблюдать за приближающимся врагом
    и подать сигнал.
  sector: kInside
  exits:
    - direction: west
      to_room: 6318  # В башне
    - direction: down
      to_room: 6315  # Лестница на втором ярусе

# Room #6317
17:
  name: Коридор во втором ярусе
  description: |2
    ___В этом коридоре зияют огромные дыры в стенах, как будто снаружи метали
    в башню огромные камни. Что за машины или колдовство здесь применялось?
    В относительно сохранившемся углу из собранных камней сложена могилка
    неизвестному бойцу.
  sector: kInside
  exits:
    - direction: east
      to_room: 6319  # Коридор во втором ярусе
    - direction: south
      to_room: 6349  # Небольшая комната
    - direction: west
      to_room: 6312  # Коридор во втором ярусе

# Room #6318
18:
  name: В башне
  description: |2
    ___Когда-то крепкая башня сейчас выглядит совсем слабой, вот-вот развалится.
    Но она все такая же высокая и открывает отличный вид вокруг. Огромное количество
    помета говорит о том, что здесь обживаются многие пернатые. В одном из углов
    видно большое гнездо.
  sector: kInside
  flags:
    - kNoEntryMob
  exits:
    - direction: east
      to_room: 6316  # В башне
    - direction: south
      to_room: 6301  # В башне

# Room #6319
19:
  name: Коридор во втором ярусе
  description: |2
    ___Развалины, пробитые стены, сломанные перекрытия крыши - все это указывает
    на то, что бой был ожесточенным, и на то, сколько лет прошло со времен этого
    боя. Посередине валяется огромный камень, на нем виднеются остатки старой фрески.
  sector: kInside
  exits:
    - direction: north
      to_room: 6314  # Коридор во втором ярусе
    - direction: west
      to_room: 6317  # Коридор во втором ярусе

# Room #6320
20:
  name: В башне
  description: |2
    ___Осторожно ступая, вы прошли дальше по старому полу и уперлись в большое
    гнездо. Похоже, огромной птице понравилось это высокое и защищенное место.
    Немного веток и сухой травы - вот и получилось великолепное гнездо.
  sector: kInside
  exits:
    - direction: west
      to_room: 6301  # В башне
    - direction: down
      to_room: 6329  # Погреб
      exit_flags: 16

# Room #6321
21:
  name: У лестницы
  description: |2
    ___Вы поднялись на второй этаж сторожки. В стенах сделаны бойницы, чтобы легче
    было обороняться. По краям лестницы поручни, чтобы не свалиться, если нахлебаешься
    медовухи или самогона.
  sector: kInside
  exits:
    - direction: east
      to_room: 6334  # Бойницы
    - direction: down
      to_room: 6349  # Небольшая комната

# Room #6322
22:
  name: Погреб
  description: |2
    ___Вы спустились в погреб. Сюда еще проникает свет через люк. Это небольшая и
    уже достаточно темная комната, ее стены сложены из аккуратно обтесанных камней.
    Погреб укреплен до самого основания, видимо, для того, чтобы держать осаду еще
    и под землей.    
  sector: kInside
  exits:
    - direction: east
      to_room: 6329  # Погреб
    - direction: up
      to_room: 6301  # В башне

# Room #6323
23:
  name: 'Склады '
  description: |2
    ___Здесь находились запасы еды на случай штурма. Но все, что от них осталось,
    сейчас валяется на земле или давно съедено мышами и насекомыми. Тихие звуки
    капающей воды доносятся до вас с юга.
  sector: kInside
  flags:
    - kDarked
  exits:
    - direction: north
      to_room: 6328  # Склады 
    - direction: east
      to_room: 6333  # Склады
    - direction: south
      to_room: 6332  # Родник

# Room #6324
24:
  name: Винный погреб
  description: |2
    ___Вы попали  в  самый дальний угол погреба. Похоже, что здесь начальник
    сторожки держал свое любимое вино. На стенах резные полки дорогой работы,
    но настолько тяжелые и крепкие, что никто не смог унести их или сломать.
  sector: kInside
  flags:
    - kDarked
  exits:
    - direction: south
      to_room: 6326  # Винный погреб

# Room #6325
25:
  name: Винный погреб
  description: |2
    ___В этом закутке стояли бочонки с самогоном - запах от них чувствуется
    до сих пор. Большая бочка с брагой стоит здесь, занимая почти все пространство.
    'Вот бы сюда попасть в то время' - размышляете вы, осматривая бочку.
  sector: kInside
  flags:
    - kDarked
  exits:
    - direction: east
      to_room: 6326  # Винный погреб

# Room #6326
26:
  name: Винный погреб
  description: |2
    ___Вы проходите комнату за комнатой, в которых повсюду видны бутылки на
    стеллажах и бочонки под ними. Битые бутылки указывают на то, что здесь
