42:
  name: Перед сторожевой башней
  description: |2
    ___Старая сторожевая башня когда-то была наблюдательным пунктом, где сидела
    передовая застава и следила за появлением врага. Башней ее можно назвать 
    условно, это касается только центральной круглой части, когда-то построенной,
    но впоследствии обнесенной невысокой стеной. Получилась маленькая крепость,
    где можно спрятать лошадей и какое-то время сдерживать врагов. Сейчас вид
    вокруг совсем плохой, все заброшено, но вход закрывают остатки массивных 
    дубовых ворот, висящие на ржавых петлях.
  sector: kField
  exits:
    - direction: north
      to_room: 6340  # Перед старой сторожевой башней
    - direction: south
      to_room: 6341  # Заросшая тропинка

