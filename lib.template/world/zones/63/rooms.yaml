  sector: kInside
  flags:
    - kDarked
  exits:
    - direction: east
      to_room: 6331  # Погреб
    - direction: west
      to_room: 6322  # Погреб
    - direction: up
      to_room: 6320  # В башне

# Room #6330
30:
  name: Погреб
  description: |2
    ___Вы проходите мимо полок, выстроенных вдоль стен. Здесь только одна полка,
    и та небольшая, так как из других стен ведут туннели в разные стороны. Пыль
