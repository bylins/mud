  sector: kInside
  flags:
    - kDarked
  exits:
    - direction: north
      to_room: 6324  # Винный погреб
    - direction: south
      to_room: 6327  # Винный погреб
    - direction: west
      to_room: 6325  # Винный погреб

# Room #6327
27:
  name: Винный погреб
  description: |2
    ___Вы вошли в винный погреб. Повсюду видны бутылки на стеллажах и бочонки под
    ними. Здесь хранились запасы вина и самогона. Издавна известно, что воин
