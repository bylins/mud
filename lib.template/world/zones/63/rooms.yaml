  sector: kInside
  flags:
    - kDarked
  exits:
    - direction: south
      to_room: 6323  # Склады 
    - direction: west
      to_room: 6330  # Погреб

# Room #6329
29:
  name: Погреб
  description: |2
       Вы проходите мимо полок, выстроенных вдоль стен. Они расставлены так, чтобы
    не мешать проходу одного или двух человек. Сделаны они из корней, выловленных
