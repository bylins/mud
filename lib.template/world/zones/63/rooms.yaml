  sector: kInside
  flags:
    - kDarked
  exits:
    - direction: north
      to_room: 6323  # Склады 
    - direction: up
      to_room: 6347  # Большая комната

# Room #6333
33:
  name: Склады
  description: |2
    ___Огромная бочка в пять обхватов стоит посреди этой пещеры на огромной тумбе,
    небольшой краник приделан внизу бочки для того, чтобы можно было легко налить
    воду. Здесь находились запасы воды на случай, если что-нибудь произойдет с
    родником.
  sector: kInside
  flags:
    - kDarked
  exits:
    - direction: west
      to_room: 6323  # Склады 

# Room #6334
34:
  name: Бойницы
  description: |2
    ___Вы стоите в нешироком коридоре. В стенах сделаны бойницы таким образом,
    чтобы боец, находящийся за ними, видел, что происходит снизу, но при этом
    его было бы сложно ранить из лука.
  sector: kInside
  exits:
    - direction: east
      to_room: 6336  # Бойницы
    - direction: west
      to_room: 6321  # У лестницы

# Room #6335
35:
  name: Коридор
  description: |2
       Коридор, ведущий в другой корпус и к бойницам. В нем почти не пострадали стены 
    и пол. Гораздо хуже с потолком - он почти целиком обвалился, и остатки грозят
    упасть вам на голову и тем самым передать привет из прошлого.
  sector: kInside
  exits:
    - direction: north
