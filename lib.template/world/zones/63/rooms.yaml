  sector: kInside
  flags:
    - kDarked
  exits:
    - direction: north
      to_room: 6327  # Винный погреб
    - direction: east
      to_room: 6328  # Склады 
    - direction: west
      to_room: 6331  # Погреб

# Room #6331
31:
  name: Погреб
  description: |2
    ___Вы проходите мимо полок, выстроенных вдоль стен. Вокруг висит паутина, которая
    попадает вам на лицо. Битые бутылки указывают на то, что здесь было сражение
    или кто-то мародерствовал после ухода солдат из сторожки.
  sector: kInside
  flags:
    - kDarked
  exits:
    - direction: east
      to_room: 6330  # Погреб
    - direction: west
      to_room: 6329  # Погреб

# Room #6332
32:
  name: Родник
  description: |2
    ___Здесь, видимо, должны были брать воду во время осады. Тихо капает вода в ямку,
    которую пробил родник за все то время, которое он шел из земли сюда. Звуки
