      description: |2
        Свиток украшен изображением скрещенных лука, самострела и пучка стрел.
        ___________________
        Здесь написано:
        ____________
        Для изготовления лука требуется, обычно, тетива и основа лука.
        Основой самых простых и слабых луков является обычная древесина подходящего
        дерева, обработанная надлежащим образом. Тетива же может быть сделана из пеньки,
        кожи, может быть также пропитана воском и жиром, для защиты от сырости.
        ____________
        Основы сильных луков клееные - сделанные из двух разных пород дерева, скрепленных
        между собой при помощи рыбьего клея и, иногда, бычьих жил. Тетива для такого лука 
        обычно кожаная.
        __________
        Еще более сильный лук можно получить, если усилить основу лука стальными или роговыми
        пластинами, такие луки в ходу у степняков - у них же можно разжиться необходимой для
        их изготволения справой - покуда наши кузнецы своим умом до ее выделки не дошли.
        _________
        Наиболее же сильные луки, наделенные множеством свойств, в том числе и волшебных,
        изготавляются из костей, перьев, усов и прочих частей тел чудищ и нечисти, в коей по
        Руси-матушке недостатка не ощущается. Может также на такой лук сгодится и ветка дуба 
        священного или же заморского дерева.
        ________
        Помимо основы и тетивы, к любому луку может подойти какая-нибудь оплетка или украшение:
        вощеная береста, змеиная кожа, кусочки меха или же вольчи клыки.
