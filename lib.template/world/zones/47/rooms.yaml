      to_room: 4760  # Волчье логово
      key: 0
    - direction: south
      to_room: 4762  # В глубине норы
      key: 0

# Room #4762
62:
  name: В глубине норы
  description: |2
    ___В глубине темной норы устроена круглая камора, заваленная обглоданными
    костями, клочьями шерсти и сухими листьями. Здесь довольно просторно - можно
    даже выпрямиться, но резкий, тяжелый запах заставляет слезиться глаза. Судя по
    всему, это логово уже давно служит прибежищем волчьему семейству.  
  sector: kInside
