    просветов. 
  sector: kMountain
  flags:
    - kNohorse
  exits:
    - direction: south
      to_room: 4752  # Овраг

# Room #4754
54:
  name: Одинокий хутор
  description: |2
    ___Длинная полутемная комната, в которую из сеней ведет низкая - поневоле
    нагнешься дверь. Топят здесь по-черному - поддерживающие кровлю слеги все
    покрыты толстым слоем копоти. На широких полицах-сыпухах вдоль стен скопились
    горки осыпавшейся с потолка сажи. Сложенная из речного камня и обмазанная
    глиной печь расположилась у северной стены. По стенам развешана всякая
    крестьянская утварь, среди которой вам попался на глаза лук - и не простенький
    крестьянский, из которого разве что сшибать мелкую птицу, а настоящий, боевой,
    который далеко не всякий обхватит в ладони, да удержит на весу на вытянутой
    руке.  
  sector: kInside
  flags:
    - kNoEntryMob
    - kPeaceful
    - kNoTrack
    - kNoMagic
    - kNoTeleportIn
    - kNohorse
    - kNoWeather
  exits:
    - direction: south
      to_room: 4755  # На дворе
      description: Дверь
      keywords: дверь
      exit_flags: 3
      key: 0
  triggers:
    - 4705  # Репоп зоны "среди холмов"

# Room #4755
55:
  name: На дворе
  description: |2
       Широкий ровный двор со всех сторон огорожен крепким тыном.  На  юге  видна
    конюшня на одну-две лошади и загон для овец. На востоке - что-то вроде кузницы,
    где горн и наковальня защищены от ветра с дождем лишь высоким тыном и навесом.
    На севере же тын взбирается на крутой склон холма, в который наполовину вросла
    низкая, крытая дерном избушка.
  sector: kField
  flags:
    - kNoEntryMob
  exits:
    - direction: north
      to_room: 4754  # Одинокий хутор
      description: Дверь
      keywords: дверь
      exit_flags: 3
      key: 0
    - direction: west
      to_room: 4730  # На берегу реки
      description: Ворота
      keywords: ворота
      exit_flags: 3
      key: 0

# Room #4756
56:
  name: Овраг
  description: |2
    ___Склоны оврага становятся все круче, они наглухо заросли стеной темных, колючих
    кустов. Под ноги то и дело подвертывается нанесенный сюда ветром и весенними
    ручьями сор - всякого рода гнилые ветви, просто сушняк, спутанные клубки сухой
    прошлогодней травы. Среди всего этого вы заметили обглоданные кости лосенка.
  sector: kHills
  exits:
    - direction: north
      to_room: 4749  # Овраг
      key: 0
    - direction: south
      to_room: 4757  # Глубокий овраг
      key: 0

# Room #4757
57:
  name: Глубокий овраг
  description: |2
    ___Склоны оврага становятся все круче, они наглухо заросли стеной темных, колючих
    кустов. Под ноги то и дело подвертывается нанесенный сюда ветром и весенними
    ручьями сор - всякого рода гнилые ветви, просто сушняк, спутанные клубки сухой
    прошлогодней травы. Часто вам на глаза попадаются звериные следы - особенно
    много волчьих. На востоке виден полузаросший проход в лощину.  
  sector: kHills
  exits:
    - direction: north
      to_room: 4756  # Овраг
      key: 0
    - direction: east
      to_room: 4759  # Лощина
      key: 0
    - direction: south
      to_room: 4758  # Тупик
      key: 0

# Room #4758
58:
  name: Тупик
  description: |2
    ___Узкий проход между сближающимися склонами оврага уткнулся в крутую каменную
    осыпь, сильно размытую дождями и талой водой. При попытке взобраться по ней
    из-под ног и на голову начинают сыпаться камни, и приходится отскакивать в
    сторону, чтобы не быть засыпаным с головой. Пожалуй, здесь выбраться наверх не
    выйдет - надо искать другой путь.  
  sector: kHills
  exits:
    - direction: north
      to_room: 4757  # Глубокий овраг
      key: 0

# Room #4759
59:
  name: Лощина
  description: |2
    ___Стены оврага, оставаясь по прежнему очень высокими, резко расступаются в
    стороны, оставляя нa дне достаточно места не только для вездесущего колючего
    кустарника, но и для небольшой можжевеловой рощи, среди которой белеют три
    стройные молодые березы. Наверное, летом яркое солнце прогревает эту лощину и
    в воздухе стоит тяжелый, одуряющий аромат перегретого цветущего травостоя, ну а
    зимой здесь нет ничего, кроме полузанесенных снегом кустов, часть из которых, у
    восточного края поляны, выглядит так, словно через них частенько продирается
    какой-то крупный зверь.  
  sector: kHills
  exits:
    - direction: east
      to_room: 4760  # Волчье логово
      exit_flags: 16
      key: 0
    - direction: west
      to_room: 4757  # Глубокий овраг
      key: 0

# Room #4760
60:
  name: Волчье логово
  description: |2
    ___Укромная прогалина, точнее даже просто просвет в зарослях кустарника, шириной
    едва ли более нескольких шагов. На земле повсюду валяются обглоданные кости,
    обрывки шерсти и шкур. Ваше внимание привлек совсем свежий обрывок овечьей
    шкуры, забрызганный алой кровью. Тяжелый звериный запах и множество волчьих
    следов не дают усомниться в принадлежности этого логова.  
  sector: kHills
  exits:
    - direction: south
      to_room: 4761  # Узкая нора
      exit_flags: 16
      key: 0
    - direction: west
      to_room: 4759  # Лощина
      key: 0

# Room #4761
61:
  name: Узкая нора
  description: |2
    ___Узкая нора прокопана в глинистом склоне оврага. Отовсюду торчат корни
    растений, за шиворот сыплется глиняная крошка и земля, под колени и локти
    постоянно подвертываются острые камни. Из глубины норы тянет резким звериным
    запахом.  
  sector: kMountain
  flags:
    - kDarked
    - kNoEntryMob
    - kIndoors
    - kTunnel
    - kHouseEntry
    - kNohorse
    - kNoWeather
  exits:
