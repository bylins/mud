# Room #3907
7:
  name: Склад припасов
  description: |2
       В темноте вы с трудом различаете несколько бочек с водой и прочими припасами.
    Кажется, рабы судна достаточно запуганы, чтобы не пытаться воровать еду своих
    владельцев - бочки не особо крепко закрыты. Пытаясь разглядеть бочки получше, вы
    вдруг замечаете смотрящего на вас охранника, сидящего между бочками.
  sector: kInside
