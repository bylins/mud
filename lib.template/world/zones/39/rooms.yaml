# Rooms for zone 39

# Room #3900
0:
  name: На носу корабля
  description: |2
       Взойдя на борт, вам сразу захотелось побыстрее убраться отсюда. Кажется, эта
    посудина держится на плаву исключительно стараниями богов. Впрочем, не
    исключено, что и рабский труд вкупе с крепким кнутом надсмотрщиков помогают ему
    не потонуть.
  sector: kInside
  flags:
    - kPeaceful
    - kBfsMark
    - kNoWeather
  exits:
    - direction: south
      to_room: 3901  # Палуба
    - direction: down
      to_room: 3903  # Лестница
  triggers:
    - 3802  # Очистка второго корабля 3900-3908

# Room #3901
1:
  name: Палуба
  description: |2
       На крепких сундуках, расставленных вдоль палубы, разложен заморский товар.
    Есть из чего выбирать, хотя окружающая вас грязь и вонь не располагает к
    покупкам. Надсмотрщики то и дело отвлекают вас от дум щелчками хлыстов.
  sector: kInside
  flags:
    - kPeaceful
    - kBfsMark
    - kNoWeather
  exits:
    - direction: north
      to_room: 3900  # На носу корабля
    - direction: south
      to_room: 3902  # Полуют
    - direction: west
      to_room: 67602  # На Киевской пристани
  triggers:
    - 3802  # Очистка второго корабля 3900-3908

# Room #3902
2:
  name: Полуют
  description: |2
       Находясь на возвышенной части кормы корабля, вы наконец можете вдохнуть
    свежий воздух. Наверное рабов в эту часть корабля пускают только чтобы
    чистить палубы. Может стоит сойти с корабля прямо в реку? Не возвращаться же
    к этой вони опять!
  sector: kInside
  flags:
    - kPeaceful
    - kBfsMark
    - kNoWeather
  exits:
    - direction: north
      to_room: 3901  # Палуба
  triggers:
    - 3802  # Очистка второго корабля 3900-3908

# Room #3903
3:
  name: Лестница
  description: |2
       Лестница с крутыми ступеньками скрипит под вашими ногами. Как бы не
    провалиться сквозь нее. На минуту вам показалось, что откуда-то снизу послышался
    писк крысы. Неужели даже на таком корабле они могут найти себе пищу?
  sector: kInside
  flags:
    - kPeaceful
    - kNoWeather
  exits:
    - direction: east
      to_room: 3908  # Торговый уголок
    - direction: south
      to_room: 3904  # Торговый уголок
    - direction: up
      to_room: 3900  # На носу корабля
  triggers:
    - 3802  # Очистка второго корабля 3900-3908

