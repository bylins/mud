  sector: kInside
  flags:
    - kPeaceful
    - kNoWeather
  exits:
    - direction: east
      to_room: 3806  # Под лестницей
    - direction: south
      to_room: 3804  # В носовой части трюма
  triggers:
    - 3801  # Очистка первого корабля 3800-3808

# Room #3806
6:
  name: Под лестницей
  description: |2
       В этом укромном уголке свалены различные морские принадлежности - крюки,
    бухты снастей и тросов, пластыри и запасной парус. Запаянные смолой бочки, судя
    по запаху, содержат в себе что-то горючее или горячительное.
  sector: kInside
  flags:
    - kPeaceful
    - kNoWeather
  exits:
    - direction: east
      to_room: 3807  # Полки с товарами
    - direction: south
      to_room: 3803  # В трюме
    - direction: west
      to_room: 3805  # В носовой части трюма
  triggers:
    - 3801  # Очистка первого корабля 3800-3808

# Room #3807
7:
  name: Полки с товарами
  description: |2
       Яркий свет медной лампы освещает множество полок и стеллажей в этой части
    трюма. Подойдя к полкам Вы сразу теряетесь в обилии различных ярких и красивых
    товаров. Начищенный блестящий метал и ослепительно сияющие драгоценные камни
    мешают Вам сосредоточиться и выбрать что-то действительно нужное.
  sector: kInside
  flags:
    - kIndoors
    - kPeaceful
    - kNoWeather
  exits:
    - direction: south
      to_room: 3808  # Полки с товарами
    - direction: west
      to_room: 3806  # Под лестницей
  triggers:
    - 3801  # Очистка первого корабля 3800-3808

