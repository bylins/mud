# Rooms for zone 38

# Room #3800
0:
  name: На баке
  description: |2
       Оружие и броня со всех уголков мира собраны на этом неповоротливом торговом
    судне. Корабль выглядит довольно старым, но в то же время готовым в любой
    момент отправиться в плавание.
  sector: kInside
  flags:
    - kPeaceful
    - kBfsMark
    - kNoWeather
  exits:
    - direction: east
      to_room: 3801  # На палубе
  triggers:
    - 3801  # Очистка первого корабля 3800-3808

# Room #3801
1:
  name: На палубе
  description: |2
       На каждый борт корабля приходится по десятку вёсел, позволяющих кораблю
    не терять время при отсутствии попутного ветра. Аккуратная узкая лестница
    приглашает спуститься в трюм корабля.
  sector: kInside
  flags:
    - kPeaceful
    - kBfsMark
    - kNoWeather
  exits:
    - direction: east
      to_room: 3802  # На корме
      key: 0
    - direction: west
      to_room: 3800  # На баке
      key: 0
    - direction: down
      to_room: 3803  # В трюме
  triggers:
    - 3801  # Очистка первого корабля 3800-3808

# Room #3802
2:
  name: На корме
  description: |2
       Этот тип транспортных кораблей прозвали "круглыми" из-за довольно широкого
    корпуса. В отличие от военных галер, такой корабль спокойно переживает любой
    шторм, однако является довольно неповоротливым ввиду примитивного парусного
    вооружения.
  sector: kInside
  flags:
    - kPeaceful
    - kNoWeather
  exits:
    - direction: west
      to_room: 3801  # На палубе
  triggers:
    - 3801  # Очистка первого корабля 3800-3808

# Room #3803
3:
  name: В трюме
  description: |2
       Запахи кожи и металла царствуют в этом тёмном помещении. Основная часть
    товаров размещена в кормовой части трюма на стеллажах и полках. В носовой же
    части Вы видите несколько пустых гамаков, предназначенных, по-видимому, для
    отдыха команды корабля.
  sector: kInside
  flags:
    - kPeaceful
    - kNoWeather
  exits:
    - direction: north
      to_room: 3806  # Под лестницей
    - direction: east
      to_room: 3808  # Полки с товарами
    - direction: west
      to_room: 3804  # В носовой части трюма
    - direction: up
      to_room: 3801  # На палубе
  triggers:
    - 3801  # Очистка первого корабля 3800-3808

# Room #3804
4:
  name: В носовой части трюма
  description: |2
       Данная часть судна предназначена для отдыха команды. Пустые гамаки натянуты
    здесь между балками. Несколько бочек с запасами пресной воды и съестных запасов
    накрыты большим куском прочной ткани.
  sector: kInside
  flags:
    - kPeaceful
    - kNoWeather
  exits:
    - direction: north
      to_room: 3805  # В носовой части трюма
    - direction: east
      to_room: 3803  # В трюме
  triggers:
    - 3801  # Очистка первого корабля 3800-3808

# Room #3805
5:
  name: В носовой части трюма
  description: |2
       Данная часть судна предназначена для отдыха команды. Пустые гамаки натянуты
    здесь между балками. Несколько бочек с запасами пресной воды и съестных запасов
