# Room #3898
98:
  name: Control room
  description: |2
    ___Здесь полутемно, отовсюду торчат маслянные поршни и шестеренки. Слышится 
    гул и пощелкивание механизмов триггеров. Смертным тут делать явно нечего.
  sector: kInside
  flags:
    - kNoEntryMob
    - kIndoors
    - kNoTeleportIn
    - kNoTeleportOut
    - kNoWeather
    - kNoRelocateIn
  triggers:
    - 3800  # Запуск движения кораблей
    - 3803  # Стоянка первого корабля
    - 3804  # Стоянка второго корабля
    - 3805  # Перемещение первого корабля по маршруту
    - 3806  # Перемещение второго корабля по маршруту
    - 3809  # Управление движением кораблей
