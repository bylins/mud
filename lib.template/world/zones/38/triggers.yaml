# Trigger #3807
7:
  name: Сообщение о прибытии корабля и лоад сходни
  attach_type: kRoomTrigger
  narg: 100
  trigger_types:
    - kAuto
  script: |-2
    eval one %speak%/100
    eval two %self.vnum%/100
    if (%one% != %two%)
      wzoneecho %speak% _&Y"К пристани причалил купеческий корабль!" -- прокричал наблюдатель на стене.&n
    end
    wzoneecho %self.vnum% _&Y"К пристани причалил купеческий корабль!" -- прокричал наблюдатель на стене.&n
    load obj 3899

# Trigger #3808
8:
  name: Удаление сходни
  attach_type: kRoomTrigger
  narg: 100
  trigger_types:
    - kAuto
  script: |-2
    foreach item %self.objects%
      if (%item.vnum% == 3899)
        wpurge %item%
        echo &YНесколько крепких корабелов сноровисто втащили сходню на лодью.&n
      break
    end
    done

# Trigger #3809
9:
  name: Управление движением кораблей
  attach_type: kRoomTrigger
  narg: 0
  arglist: управление
  trigger_types:
    - kCommand
  script: |-2
    wait 1
    if (%actor.level% < 32)
      wsend %actor% _Ты еще кто такое?
      halt
    end
    if %arg.contains(стоп)%
      echo _&G * * * ОСТАНАВЛИВАЕМ ДВИЖЕНИЕ КОРАБЛЕЙ * * *&n
      set stop 1
      global stop
      halt
    end
    if %arg.contains(старт)%
      echo _&R * * * ЗАПУСКАЕМ ДВИЖЕНИЕ КОРАБЛЕЙ, В СТВОРЕ НЕ СТОЯТЬ! * * *&n
      set stop 0
      global stop
      halt
    end
    if %arg.contains(перезапуск)%
      echo _&Y * * * ПЕРЕЗАПУСК ДВИЖЕНИЯ КОРАБЛЕЙ * * *&n
      echo _&Y __________* остановка кораблей *&n
      set stop 1
      global stop
      detach 3800 %self%
      detach 3805 %self%
      detach 3806 %self%
      echo _&Y __________* очистка выходов *&n
      set m %shiprooms1.words%
      set i 1
      while (%i% <= %m%)
        set shiproom %shiprooms1.words(%i%)%
        set dir %dirs1.words(%i%)%
        set rdir %rdirs1.words(%i%)%
        set whard %whardes1.words(%i%)%
        wdoor %shiproom% %dir% purge
        wdoor %whard% %rdir% purge
        eval i %i%+1
      done
      wait 1s
      set m %shiprooms2.words%
      set i 1
      while (%i% <= %m%)
        set shiproom %shiprooms2.words(%i%)%
        set dir %dirs2.words(%i%)%
        set rdir %rdirs2.words(%i%)%
        set whard %whardes2.words(%i%)%
        wdoor %shiproom% %dir% purge
        wdoor %whard% %rdir% purge
        eval i %i%+1
      done
      wait 1s
      echo _&Y __________* подключение триггеров *&n
      attach 3800 %self%
      attach 3805 %self%
      attach 3806 %self%
      set stop 0
      global stop
      %world.zreset(38)%
      echo _&Y __________* корабли перезапущены *&n
      halt
    end
    wsend %actor% Возможные команды: "стоп", "старт" и "перезапуск".

# Trigger #3810
10:
  name: Информация о местоположении кораблей
  attach_type: kObjTrigger
  narg: 4
  arglist: рассмотреть
  trigger_types:
    - kCommand
  script: |-2
    if !%arg.contains(записку)%
      %send% %actor% Чего рассматривать будем?
      halt
    end
    calcuid control 3898 room
    attach 3811 %control%
    exec 3811 %control%

# Trigger #3811
11:
  name: Табличка сработала
  attach_type: kRoomTrigger
  narg: 100
  trigger_types:
    - kAuto
  script: |-2
    %send% %actor% Вы внимательно присмотрелись к табличке, пытаясь разобрать текст на записке.
    set message1 "Светлый" корабль артели
    if (%cond1% <= 1)
      set message1 %message1% вот-вот отправится в плавание:
      %send% %actor% %message1%
      eval temp %point1%-1
      if (%temp% < 1)
        set temp %array.item(%whardes1%)%
      end
      set message1 покидает %array.item(%cities1%,%temp%)%, направляется в
    elseif (%cond1% == 2)
      set message1 %message1% уже в пути, направляется в
    else
      set message1 %message1% пришвартован к пристани, обирает
      eval point1 %point1%-1
      if (%point1% < 1)
        set point1 %array.item(%whardes1%)%
      end
    end
    set message1 %message1% %array.item(%cities1%,%point1%)%.
    %send% %actor% %message1%
    set message2 "Тёмный" корабль артели
    if (%cond2% <= 1)
      set message2 %message2% вот-вот отправится в плавание:
      %send% %actor% %message2%
      eval temp %point2%-1
      if (%temp% < 1)
        set temp %array.item(%whardes2%)%
      end
      set message2 покидает %array.item(%cities2%,%temp%)%, направляется в
    elseif (%cond2% == 2)
      set message2 %message2% уже в пути, направляется в
    else
      set message2 %message2% пришвартован к пристани, обирает
      eval point2 %point2%-1
      if (%point2% < 1)
        set point2 %array.item(%whardes2%)%
      end
    end
    set message2 %message2% %array.item(%cities2%,%point2%)%.
    %send% %actor% %message2%
    *log &W%actor.iname% - %actor.realroom%&g
    %actor.wait(1)%

# Trigger #3898
98:
  name: Dummy trig
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kGreet
  script: |-2
    wait 1
    say Что вы здесь делаете? Проваливайте пока не поздно!
