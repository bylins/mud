# Trigger #3805
5:
  name: Перемещение первого корабля по маршруту
  attach_type: kRoomTrigger
  narg: 100
  trigger_types:
    - kAuto
  script: |-2
    *если счетчик точек равен числу точек, значит маршрут пройден, начинаем с начала
    if %point1% > %array.item(%cities1%)%
      set point1 1
      global point1
    end
    *запоминаем следующий город
    set city %array.item(%cities1%,%point1%)%
    global city
    *выдаем сообщение на корабле
    wzoneecho %ship1%  Корабелы засуетились, поднимая сходню
    wzoneecho %ship1%  "Шевелитесь!" - прикрикнул на них купец - "Отправляемся в %city%!"
    set cond1 1
    global cond1
    wait 30s
    wzoneecho %ship1%  Корабелы налегли на весла, и корабль, покачиваясь, отвалил от пристани.
    *убираем сходню
    eval ratchet %world.room(%whard%)%
    if %ratchet%
      attach 3808 %ratchet%
      exec 3808 %ratchet%
    end
    *удаляем вход на корабль
    if %dir% && %rdir%
      wdoor %shiproom% %dir% purge
      wdoor %whard% %rdir% purge
    end
    set cond1 2
    global cond1
    *запоминаем новую точку причаливания
    set shiproom %array.item(%shiprooms1%,%point1%)%
    set dir %array.item(%dirs1%,%point1%)%
    set rdir %array.item(%rdirs1%,%point1%)%
    set whard %array.item(%whardes1%,%point1%)%
    global shiproom
    global dir
    global rdir
    global whard
    *выдаем антуражные сообщения в комнату и ждем.
    set i 0
    while (%i% < 24)
      switch %random.20%
        case 1
          set msg Густой лес покрывает берега реки.
        break
        case 2
          set msg Несколько всадников пронеслись по берегу, махая вам руками.
        break
        case 3
          set msg Сгустились тучи, и холодные струи дождя заколотили по палубе.
        break
        case 4
          set msg Густой туман поднялся над рекой.
        break
        case 5
          set msg Чешуйчатая спина невиданного чудища поднялась из воды и снова скрылась.
        break
        case 6
          set msg Ватага ушкуйников на челнах вылетела было из протоки, но, оценив размеры корабля, ретировалась.
        break
        case 7
          set msg Несколько корабелов устроились на носу и громко горланят песни.
        break
        case 8
          set msg Сильные порывы ветра поднимают тучи брызг и раскачивают корабль.
        break
        case 9
          set msg Что-то проскребло по днищу корабля, заставив его качнуться.
        break
        case 10
          set msg Усатый корабел закинул за борт кожаное ведро на веревке и окатил палубу водой.
        break
        case 11
          set msg Кормчий качнул корабль, и палубу обдало веером брызг.
        break
        case 12
          set msg Большое селение показалось на берегу.
        break
        case 13
          set msg Берег гол и пустынен -- одни скалы и неприветливые холмы.
        break
        case 14
          set msg Маковое поле простирается по левую руку на берегу.
        break
        case 15
          set msg Низкие заболоченные берега переходят в трясину, из которой раздаются странные звуки.
        break
        case 16
          set msg Парочка корабелов устроилась под навесом и играет в зернь.
        break
        case 17
          set msg Грозовая туча закрыла небо, и кормчий то и дело озабоченно поглядывает вверх.
        break
        case 18
          set msg На берегу показался разбитый и истлевший остов корабля.
        break
        case 19
          set msg Крупный град заколотил по палубе, заставив всех укрыться под кожаными навесами.
        break
        case 20
          set msg Протянувшиеся над водой ветви столетнего дерева скребнули по борту.
        break
      done
      eval i %i%+1
      wait 10s
      wzoneecho %ship1% %msg%
    done
    *причаливаем
    if %shiproom%
      wdoor %shiproom% %dir% room %whard%
    end
    if %whard%
      wdoor %whard% %rdir% room %shiproom%
    end
    eval ratchet %world.room(%whard%)%
    attach 3807 %ratchet%
    set speak %array.item(%speaker1%,%point1%)%
    remote speak %ratchet%
    exec 3807 %ratchet%
    eval point1 %point1%+1
    global point1
    wzoneecho %ship1%  Наконец вы прибыли в %city%!
    set cond1 3
    global cond1
    *запускаем таймер стоянки
    exec 3803 %self%
    halt

