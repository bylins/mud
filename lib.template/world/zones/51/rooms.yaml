# Rooms for zone 51

# Room #5100
0:
  name: На крыльце
  description: |2
       Покосившееся крыльцо скрипит под ногами. Дерево почернело и облупилось, но
    сохранило крепость. Хоть и можно здесь постоять, но Вас больше интересует сам
    заброшенный дом. Хочется зайти, но холодок в груди заставляет подумать над
    этим шагом. 
  sector: kCity
  flags:
    - kNohorse
    - kNoWeather
  exits:
    - direction: east
      to_room: 5023  # Заброшенный дом
    - direction: west
      to_room: 5101  # В сенях

