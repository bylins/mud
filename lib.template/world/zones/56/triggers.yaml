# Trigger #5606
6:
  name: дал что-нить рыбаку
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kReceive
  script: |-2
    if  %object.vnum% == 5600
      say  Ну это может и пригодиться..
      wait 1
      mpurge %object%
    else
      say Зачем мне это?
    end

