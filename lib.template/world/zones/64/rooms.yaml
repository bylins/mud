# Room #6418
18:
  name: Мостик
  description: |2
       Вы стоите посередине аккуратного горбатого мостика. Если посмотреть
    вниз, в ручеек, можно увидеть, как пятнистые рыбки выныривают из воды и
    перепрыгивают через камешки и обломанные ветки деревьев. Нееет, не может
    быть, что это форель...
  sector: kCity
  flags:
    - kNoEntryMob
  exits:
    - direction: east
      to_room: 6417  # Перед мостом
    - direction: west
      to_room: 6420  # За мостом

# Room #6419
19:
  name: На мусорной куче
  description: |2
       Вскарабкавшись на вершину огромной кучи мусора, Вы измазали грязью всю
    одежду и больно укололи ладонь ржавым гвоздем. Если оглядеться, можно увидеть
    маленький горбатый мостик на юго-востоке и край пустыря на юге.
  sector: kHills
  flags:
    - kNohorse
  exits:
    - direction: south
      to_room: 6420  # За мостом

# Room #6420
20:
  name: За мостом
  description: |2
       Перейдя через мост, Вы очутились на небольшой полянке. На севере
    возвышается огромная гора мусора и оттуда доносятся громкие крики чаек.
    На юге весело журчит ручеек.
  sector: kCity
  exits:
    - direction: north
      to_room: 6419  # На мусорной куче
    - direction: east
      to_room: 6418  # Мостик
    - direction: south
      to_room: 6421  # У ручейка
    - direction: west
      to_room: 6422  # На краю пустыря

# Room #6421
21:
  name: У ручейка
  description: |2
       Берега ручейка густо поросли травой и редкими цветами.  Порхают разноцветные
    бабочки, птичий хор, доносящийся откуда-то с севера, издает приятные трели...
    Как же приятно просто посидеть на замшелом валуне и посмотреть на то, как
    солнце блестит в журчащей струе воды...  Наверное, во всем мире нет места
    красивее...  <winterday>RХлопья снега медленно падают Вам на плечи...  Все
    вокруг покрыто снежным саваном.  Только быстрый ручеек не замерзает, и зимнее
    солнце плещется в его водах и обдает Вас брызгами солнечных зайчиков.
    <winterday> <winternight>RХлопья снега медленно падают Вам на плечи...  Все
    вокруг покрыто снежным саваном.  Только быстрый ручеек не
    замерзает<winternight> <autumnday>RБерега ручейка покрыты желтеющей травой и
    поздними цветами.  Птичий хор, доносящийся откуда-то с севера, издает
    приятные трели...  Как же приятно просто посидеть на замшелом валуне и
    посмотреть на то, как солнце блестит в журчащей струе воды...  Наверное, во
    всем мире нет места красивее...  <autumnday>
  sector: kField
  exits:
    - direction: north
      to_room: 6420  # За мостом
    - direction: west
      to_room: 6424  # На краю пустыря

