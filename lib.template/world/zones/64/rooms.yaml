  description: |2
       Вы подошли к концу пустыря. Завалы мусора мешают Вам идти дальше.
    Остается только повернуть назад, к дому, или попытаться разрыть эти
    завалы руками. Из-под земли слышны странные звуки.
  sector: kField
  flags:
    - kNoEntryMob
  exits:
