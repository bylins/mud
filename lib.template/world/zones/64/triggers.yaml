# Trigger #6410
10:
  name: парня нашли
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kGreetPCAll
  script: |-2
    wait 1s
    : удивился вашему появлению, потянулся с хрустом.
    wait 2s
    г Поспал неплохо, правда печи нет, холодно, да и ладно.
    wait 1s
    г Притомился я здесь бродить. Угораздило меня стрельнуть из лука куда-то в этом направлении.
    г И должен я эту стрелу найти, не найду - позор мне, не вернусь из леса пока не сыщу.

# Trigger #6411
11:
  name: дали стрелу парню
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kReceive
  script: |-2
    wait 1
    if (%object.vnum% != 6404)
      брос все
      halt
    end
    wait 1
    mpurge %object%
    if (%world.curobjs(6408)% < 1)
      wait 1s
      г Здорово. Где ты ее нашел?
      wait 1s
      г У лягушки с короной. И говорит, что я жениться на ней должен?
      вздох
      wait 2s
      г Ну что же делать, пойду к ней, значит судьба у меня такая.
      г Спасибо тебе за все, передай весточку отцу моему старому, вдруг не увижусь больше с ним.
      wait 2s
      load obj 6408
      дать записка %actor.iname%
    else
      г Так дело не пойдет - по-моему стрела поддельная.
      хму
    end
    echo Парень убежал куда-то в кусты.
    mpurge %self%

# Trigger #6412
12:
  name: дали записку старику
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kReceive
  script: |-2
    wait 1
    if (%object.vnum% != 6408)
      брос все
      halt
    end
    wait 1s
    mpurge %object%
    echo Старик прочитал записку и сморщился..
    wait 1s
    г Ладно, нашел ты его - весточку принес, дело сделано.
    %self.gold(+100)%
    %actor.questbodrich(7)%
    дать 100 кун %actor.iname%
    wait 1s
    г А я лучше, пойду к дому, другим сыновьям расскажу.
    echo Старик ушел.
    mpurge %self%

# Trigger #6413
13:
  name: разрыть
  attach_type: kRoomTrigger
  narg: 1
  arglist: разрыть
  trigger_types:
    - kCommand
  script: |-2
    if !%arg.contains(завал)% && !%arg.contains(разрыть)%
      return 0
      halt
    end
    wait 1
    wdoor 6422 north room 6425
    wsend %actor% Вы разрыли завал и открылся вход в нору.
    echoaround %actor% %actor.iname% разрыл%actor.q% завал и открылся вход в нору.
    detach 6413 %self%

# Trigger #6414
14:
  name: пуржевыход
  attach_type: kRoomTrigger
  narg: 100
  trigger_types:
    - kDeath
  script: |-2
    echo Разрытая земля обвалилась и закрыла завал.
    if %self.north%
      wdoor 6422 north purge
    end
    *wdoor 6422 north purge
    detach 6413 %self%
    attach 6413 %self%
