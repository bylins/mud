# Triggers for zone 64

# Trigger #6400
0:
  name: лягушка приветствует
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kGreetPCAll
  script: |-2
    if %actor.sex%==1
      wait 1s
      : чуть не околела от счастья при виде Вас и начала прыгать около Ваших ног
      wait 1s
      г Ой, я так долго тебя ждала, так ждала!!!
      __г Ты даже не представляешь как я тебя ждала!!!
      wait 1s
      __г Это, наверное, твоя стрела прилетела ко мне?
      : показала каленую стрелу
      г Попала прямо в меня, ранила. Рана неглубокая, но как настоящий мужчина, ты должен на мне жениться.
      wait 2s
      г Ну поцелуйте же меня и мы будем жить вместе долго и счастливо!
      wait 1s
      г А потом умрем в один день
      wait 1s
      : вытягивает губы трубочкой для поцелуя
    else
      вздох
    end

# Trigger #6401
1:
  name: рассказоцаревне
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kGreetPCAll
  script: |-2
    wait 1s
    say %actor.iname%, как ты смог%actor.q% попасть сюда? Это моя территория!
    say Раз прош%actor.y%, давай расскажу одну историю, не часто бывает у меня нормальный собеседник
    wait 1s
    г Так вот жила была на свете царевна. Ничего себе такая, вся из себя и вообще.
    г Но считала она себя самой красивой и фыркала, когда видела некрасивых людей.
    г Например навроде меня.
    хих
    wait 1s
    г Задело это меня, изучил я много наук, много земель обошел, но нашел одно средство и...
    хих
    wait 1s
    г Однажды, превратилась царевна как-то в земноводное не очень приятной наружности.
    г В народе лягушками или жабами кличут.
    wait 1s
    г Правда за это мне тоже пришлось заплатить.
    г Но за это я теперь могу питаться только жабами и лягушками.
    г За каждую жабу буду платить 50 монет, за лягушку 25.

# Trigger #6402
2:
  name: поцелуй
  attach_type: kMobTrigger
  narg: 1
  arglist: поцеловать
  trigger_types:
    - kCommand
  script: |-2
    if !%arg.contains(лягушку)% && !%arg.contains(царевну)%
      return 0
      halt
    end
    wait 1
    if %actor.sex%==1
      msend %actor% Вы закрыли от ужаса глаза и коснулись губами склизкой кожи.
      echoaround %actor% %actor.iname% наверное рехнулся, раз уж стал целовать лягушку
      echo  Если бы лягушка не была зеленой, то покраснела бы со стыда.
      wait 1s
      г Ну на Вас управы уже никакой нет! Распустились совсем! Обнаглели!!!
      г Ходят по лесу маньяки к честным лягушкам пристают...
      г Много Вас тут таких с поцелуями... Зоофилы чертовы!
      wait 1s
      г Что Вы обо мне думаете такое? Я девушка честная! Я не позволю...
      красн
      wait 1s
      г Хоть бы кто догадался подарок сделать... нет ведь сразу целоваться лезут!
      if %world.curobjs(6404)% < 1
        load obj 6404
        дать стрела %actor.iname%
        г И забери эту стрелу - что мне все время ее теперь держать.
      end
    else
      msend %actor% Ай-ай, заморскими пакостями заниматься, поищи лягушкек-царевичей мужеского полу.
    end

# Trigger #6403
3:
  name: дали подарок лягушке
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kReceive
  script: |-2
    wait 1
    if (%object.vnum% != 6402)
      брос все
      halt
    end
    wait 1
    mpurge %object%
    wait 1
    г О! Вот это другое дело! А то сразу целоваться лезут! Давно бы так...
    wait 1s
    г Знаешь, ты конечно очень даже ничего, но вот замуж за тебя я не выйду!
    г Стрела-то не твоя была, обманул ты меня, не мой ты жених!
    г Но подарок ты принес мне непростой, теперь если жених настоящий найдется, то расколдует он меня.
    wait 1s
    г А чтоб утешить тебя... возьми на память обо мне вот это.
    if (%world.curobjs(6405)% < 10) && (%random.4%==1)
      load obj 6405
      дать перстень %actor.iname%
    else
      эмоц покраснела.
      wait 2s
      %self.gold(+300)%
      дать 300 кун %actor.iname%
    end
    echo Лягушка прыгнула в болото и спряталась от Вас.
    mpurge %self%

# Trigger #6404
4:
  name: встречастарик
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kGreetPCAll
  script: |-2
    wait 1
    msend %actor% Старик оторвался от рассматривания округ и повернулся к Вам.
    msend %actor% Привет, помоги старику несчастному.
    вздох
    msend %actor% Сына непутевого найти не могу. Одно несчастье, не даром Иван-Дурак все кличут.
    msend %actor% Как нормального вывел с остальными сыновьями по нашему обычаю выбирать невест.
    msend %actor% На чей двор стрела попадет - там невеста и живет.
    wait 1
    msend %actor% Старшие не дураки - прицелились и один в купеческий двор попал, другой в боярский.
    msend %actor% А этот в болото запустил, да ведь не близко, силища то огромная.
    wait 1
    msend %actor% Вот жду его с болота. Помоги старому, зрение никчемное, ничего не вижу.
    msend %actor% Хожу еле-еле, приведи сынка, отблагодарю как положено.

