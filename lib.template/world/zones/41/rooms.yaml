       Степь и степь... Как моря синь, как неоглядная голубень июньского неба, 
    равнинная степь. Хоть бы лесная опушка, кустик ли - кругом голым-голо.
     Куда не кинь взор - всюду смыкающееся с небом равнинное безмолвие.
    <night>   Кругом царит полное безмолвие и тяжкая ночь.
    <night>
    <summerday>   Сеют овес, ячмень - без них нет силы у лошади. Сеют просо,  оно дает большой 
    приплод даже в  сушь.  Еще сеют сурожь. Приставка "су" означает смесь. 
    Суглинок - смесь глины и песка, в которой больше глины.  Супесь -  такая  же  
    смесь  с  преобладанием песка. Сурожь -  рожь с пшеницей.  Рожь крепче, 
    неприхотливее, ржаная солома выше пшеничной. Поднявшись от смеси семян выше 
    пшеницы, рожь защищает сестру от засушливых ветров, от чрезмерности зноя, и 
    пшеница просит меньше влаги для своей соломы, лучше наливает зерно.
    <summerday>
    <summernight>   После знойного дня земля отдает свое тепло.
    <summernight>
    <autumnday>   Нивы сжаты, земля отдыхает до следующего лета.
    <autumnday>
    <autumnnight>   Нивы сжаты, земля отдыхает до следующего лета.
    <autumnnight>
  sector: kField
  exits:
    - direction: north
      to_room: 4116  # Посыльная дорога
    - direction: east
      to_room: 4107  # Посыльная дорога
    - direction: south
      to_room: 4136  # Пашня
    - direction: west
      to_room: 4121  # Пашня

