# Room #4105
5:
  name: Пожня
  description: |2
       Степь и степь... Как моря синь, как неоглядная голубень июньского неба, 
    равнинная степь. Хоть бы лесная опушка, кустик ли - кругом голым-голо. Куда не
    кинь взор - всюду смыкающееся с небом равнинное безмолвие.
    <night>   Кругом царит полное безмолвие и тяжкая ночь.
    <night>
    <summerday>   Никлый, устоявшийся ковыль, распустив сизые усы, переливается от шалого
    ветра лиловыми барашками.
    <summerday>
  sector: kField
  exits:
    - direction: north
      to_room: 4123  # Пожня
    - direction: east
      to_room: 4125  # Пожня
    - direction: south
      to_room: 4106  # Посыльная дорога
    - direction: west
      to_room: 4104  # Посыльная дорога

