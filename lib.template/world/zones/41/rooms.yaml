    смесь  с  преобладанием песка. Сурожь -  рожь с пшеницей.  Рожь крепче, 
    неприхотливее, ржаная солома выше пшеничной. Поднявшись от смеси семян выше 
    пшеницы, рожь защищает сестру от засушливых ветров, от чрезмерности зноя, и 
    пшеница просит меньше влаги для своей соломы, лучше наливает зерно.
