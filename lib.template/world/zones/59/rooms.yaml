# Rooms for zone 59

# Room #5900
0:
  name: Возле башни
  description: |2
    ___Вы оказались в центре большой поляны, окруженной дремучим лесом. Небо
    затянуто тяжелыми тучами, которые полностью скрывают небесные светила.
    Высокая каменная башня в центре поляны напоминает Вам мост между землей и 
    небом. Среди мрака внутри башни вы различаете винтовую лестницу, ведущую
    наверх. Вас неудержимо тянет войти туда.
  sector: kField
  flags:
    - kNoTeleportIn
    - kNoWeather
  exits:
    - direction: north
      to_room: 5947  # К северу от башни
      key: 0
    - direction: east
      to_room: 5905  # К востоку от башни
      key: 0
    - direction: south
      to_room: 5928  # К югу от башни
      key: 0
    - direction: west
      to_room: 5939  # К западу от башни
      key: 0
    - direction: up
      to_room: 5901  # Первый этаж
      key: 0

# Room #5901
1:
  name: Первый этаж
  description: |2
    ___В кромешной темноте зала Вы замечаете небольшое окошко с южной стороны
    здания. В оконце видна лишь темная поляна. Под окном белеет небольшая кучка
    костей. Деревянная винтовая лестница поскрипывает от Ваших шагов, заманивая
    Вас дальше наверх.
  sector: kInside
  flags:
