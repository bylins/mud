    - kNoTeleportIn
    - kNohorse
  exits:
    - direction: up
      to_room: 5902  # Второй этаж
      key: 0
    - direction: down
      to_room: 5900  # Возле башни
      key: 0

# Room #5902
2:
  name: Второй этаж
  description: |2
    ___Здесь вы замечаете окошко с западной стороны здания. За окном виден лишь
    бескрайний дремучий лес, окружающий поляну. Возле окна лежит груда костей,
    увенчанная черепом ни то собаки, ни то волка. На секунду Вам кажется, что
    сверху доносятся какие-то звуки. Вы замираете, но не слышите ровным счетом
    ничего. Лишь скрип лестницы нарушает тишину, царящую в башне.
  sector: kInside
  flags:
    - kDarked
    - kIndoors
    - kNoTeleportIn
  exits:
    - direction: up
      to_room: 5903  # Третий этаж
      key: 0
    - direction: down
      to_room: 5901  # Первый этаж
      key: 0

# Room #5903
3:
  name: Третий этаж
  description: |2
       На этот раз, как Вы и ожидали, окошко выходит с северной стороны башни.
    В окно Вы видите все тот же лес, идущий до самой границы неба и земли. Небо
    наглухо затянуто тучами. Вы замечаете, что на верхнем этаже не так темно 
    как в остальной части башни. Шум, доносящийся оттуда убеждает в том, что 
    именно туда Вам надо.
  sector: kInside
  flags:
    - kDarked
    - kIndoors
    - kNoTeleportIn
  exits:
    - direction: up
      to_room: 5904  # Вершина башни
      key: 0
    - direction: down
      to_room: 5902  # Второй этаж
      key: 0

# Room #5904
4:
  name: Вершина башни
  description: |2
    ___Здесь винтовая лестница заканчивается, выводя Вас в просторный зал с 
    большим окном на восточной стороне. В окне вы замечаете нечто, выделяющееся
    из общей картины - небольшое заброшенное кладбище, находящееся к востоку от
    поляны. Посередине комнаты стоит стол, заваленный различными свитками и
    книгами. Небольшая свеча, стоящая среди книг, слабо освещает помещение.
  sector: kInside
  flags:
    - kIndoors
    - kPeaceful
    - kNoTeleportIn
  exits:
    - direction: down
      to_room: 5903  # Третий этаж
      key: 0

