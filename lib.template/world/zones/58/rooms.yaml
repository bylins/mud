# Rooms for zone 58

# Room #5800
0:
  name: Перед темным лесом
  description: |2
    ___Сойдя с дороги, вы сразу углубились в темный лес. Состоящий из больших
    деревьев с густой кроной лес пропускает на землю так мало света, что
    здесь постоянно сумрачно. Высоко над головой качаются ветки, в глубине леса
    раздаются странные звуки.
  sector: kForest
  exits:
    - direction: north
      to_room: 5803  # В начале леса
    - direction: east
      to_room: 5802  # Перед темным лесом
    - direction: south
      to_room: 5812  # На дороге

# Room #5801
1:
  name: Убежище
  description: |2
       Огромные деревья расправили свои ветки во все небо, не позволяя ни одному
    лучику света проникнуть вниз. Корявые корни деревьев вылезли из-под земли и
    с трудом позволяют пройти. У ближайшего большущего дерева вы заметили
    небольшое углубление, позволяющее человеку, небольшого роста поместится в нем
    и укрыться от непогоды и зверей.
  sector: kInside
  flags:
    - kNoEntryMob
    - kIndoors
  exits:
    - direction: south
      to_room: 5810  # В темном лесу

# Room #5802
2:
  name: Перед темным лесом
  description: |2
       Резкий переход от широкой дороги к лесу, от светлого пустого пространства
    к затемненной лесной чаще не совсем приятен. На стволе одного из деревьев
    вы заметили свежую глубокую зарубку. Интересно, кто и зачем пометил
    здесь себе место.
  sector: kForest
  exits:
    - direction: north
      to_room: 5804  # В начале леса
    - direction: south
      to_room: 5811  # На дороге
    - direction: west
      to_room: 5800  # Перед темным лесом

# Room #5803
3:
  name: В начале леса
  description: |2
       Вокруг раскинулся густой лес с большими, даже вернее сказать огромными
    деревьями. Где-то высоко-высоко над головой ветки деревьев сошлись, закрывая
    землю от солнечным лучей. Потому здесь всегда сумрак и редко заметишь какую
    из лесных зверушек обычного светлого леса.
  sector: kForest
  exits:
    - direction: north
      to_room: 5806  # В темном лесу
    - direction: east
      to_room: 5804  # В начале леса
    - direction: south
      to_room: 5800  # Перед темным лесом

# Room #5804
4:
  name: В начале леса
  description: |2
       Толстые корни деревьев сильно затрудняют движение по лесу. Долго приходится
    искать место для того, чтобы поставить ногу. Да и выбрав место надо аккуратно
    почувствовать твердую опору, не то не ровен час попадется гнилая и можно
    расквасить нос. А упадешь, тоже неизвестно как приземлишься, можно и еще
    что повредить.
  sector: kForest
  exits:
    - direction: north
      to_room: 5809  # В темном лесу
    - direction: south
      to_room: 5802  # Перед темным лесом
    - direction: west
      to_room: 5803  # В начале леса

# Room #5805
5:
  name: В темном лесу
  description: |2
       С трудом вы пробираетесь среди лесного завала по узкой не сказать дорожке,
    не сказать тропинке, а скажем просвету среди поваленных деревьев и густых
    зарослей кустарника. Сверху то и дело раздается шум пробирающихся по кронам
    деревьев животных и птиц. Вроде бы в середине леса, но так тесно от окружающих
    препятствий, как в какой-то конуре.
  sector: kForest
  flags:
    - kTunnel
  exits:
    - direction: east
      to_room: 5806  # В темном лесу
    - direction: west
      to_room: 5823  # Лесной завал

# Room #5806
6:
  name: В темном лесу
  description: |2
       Не зря говорят, чем дальше в лес, тем больше дров. Дров здесь просто
    завались, деревья не только растут, но и много поваленных, перегородивших
    все что только возможно. Найти проход между такими завалами очень непросто.
    Часто приходится забираться по поваленным деревьям и идти по узким стволам. 
  sector: kForest
  exits:
    - direction: north
      to_room: 5807  # Граница леса
    - direction: east
      to_room: 5809  # В темном лесу
    - direction: south
      to_room: 5803  # В начале леса
    - direction: west
      to_room: 5805  # В темном лесу

# Room #5807
7:
  name: Граница леса
  description: |2
       Все дальше вглубь леса идти невозможно. К северу лес уплотнился и кроме
    высоких деревьев пошел плотный колючий кустарник. Да и что там дальше может
    быть, кроме таких же деревьев. Этот лес идет, небось, до самого Новгорода.
  sector: kForest
  exits:
    - direction: east
      to_room: 5808  # Граница леса
    - direction: south
      to_room: 5806  # В темном лесу

# Room #5808
8:
  name: Граница леса
  description: |2
       Все дальше вглубь леса идти невозможно. К северу лес уплотнился и кроме
    высоких деревьев пошел плотный колючий кустарник. Только на восток и запад
    можно пройти посмотреть что там. Но маловероятно, что будет что-то кроме
    деревьев и кустов. У одного из деревьев вы заметили зарубку как ту, что вы
    выдели при входе в лес.
  sector: kForest
  exits:
    - direction: east
      to_room: 5810  # В темном лесу
    - direction: south
      to_room: 5809  # В темном лесу
    - direction: west
      to_room: 5807  # Граница леса

# Room #5809
9:
  name: В темном лесу
  description: |2
    ___Вы дальше прошли внутрь темного леса, с трудом разбирая дорогу среди толстых
    кривых корней деревьев. Вдруг сверху раздался резкий вскрик, от звука которого
    похолодело в душе. Резко подняв голову, в поисках источника звука, вы не заметили
    очередного корня и распластались на земле. А что или кто так резко вскрикнул, так и
    непонятно. Филин наверно, они любят такие шутки, пугая забредших путников.
  sector: kForest
  exits:
    - direction: north
      to_room: 5808  # Граница леса
    - direction: south
      to_room: 5804  # В начале леса
    - direction: west
      to_room: 5806  # В темном лесу

# Room #5810
10:
  name: В темном лесу
  description: |2
    ___Дальше в лес вы пробираетесь уже скорее по привычке, не ожидая ничего нового
    и интересного. По скудным признакам становится понятно, что до вас здесь уже кто-то
    не так давно проходил, старательно выбирая дорогу и откидывая со своего пути
    все препятствия. Может попробовать догнать незнакомого путника, узнать,
    что это за лес, какие в нем есть тайны.
  sector: kForest
  exits:
    - direction: north
      to_room: 5801  # Убежище
    - direction: west
      to_room: 5808  # Граница леса

# Room #5811
11:
  name: На дороге
  description: |2
    ___Дорога, как дорога. Прижимаемая лесом, размываемая дождями, засыпаемая снегом,
    дорога петляет, теряясь из глаз за поворотом. Бывает по дороге месяцами
    никто не проезжает, а в сезон базаров и ярмарок воз за возом так и идут друг за другом.
    Изредка дружина проезжает проверить порядок внутри княжества.
  sector: kField
  flags:
    - kNoEntryMob
  exits:
    - direction: north
      to_room: 5802  # Перед темным лесом
    - direction: east
      to_room: 5813  # Застава на дороге
    - direction: west
      to_room: 5812  # На дороге

# Room #5812
12:
  name: На дороге
  description: |2
    ___Дорога, как дорога. Прижимаемая лесом, размываемая дождями, засыпаемая снегом,
    дорога петляет, теряясь из глаз за поворотом. Бывает по дороге месяцами
    никто не проезжает, а в сезон базаров и ярмарок воз за возом так и идут друг за другом.
    Изредка дружина проезжает проверить порядок внутри княжества.
  sector: kField
  flags:
    - kNoEntryMob
  exits:
    - direction: north
      to_room: 5800  # Перед темным лесом
    - direction: east
      to_room: 5811  # На дороге
    - direction: south
      to_room: 5839  # На дороге

# Room #5813
13:
  name: Застава на дороге
  description: |2
       Невысокий тын в человеческий рост перекрыл здесь дорогу от леса до леса.
    В тыну сделаны ворота, которые охраняются дружинниками. Это и есть застава,
    сделанная для контроля за проезжающим по княжеству люду, учету товара и
    особенно вражеских лазутчиков.
  sector: kCity
  exits:
    - direction: east
      to_room: 5814  # Застава на дороге
      keywords: ворота
      exit_flags: 15
      key: 5807
    - direction: west
      to_room: 5811  # На дороге
  triggers:
    - 5800  # встречатолстыйстражник

# Room #5814
14:
  name: Застава на дороге
  description: |2
    ___Деревянное возвышение, окруженное со всех сторон тыном, с площадками для
    лучников, застава служит для поддержания порядка на дороге. Будет где
    встретить лихого человека, да и отбить нападение группы разбойников. Да и
    границы надо держать все время на замке, если вдруг враг нападет, быстро
    вешники бегут от заставы к заставе, сообщая новость, готовя дружину и княже к
    отпору. На западе видны ворота. Как правило они всегда закрыты.  
  sector: kInside
  flags:
    - kNoEntryMob
  exits:
    - direction: north
      to_room: 5815  # По дороге
    - direction: east
      to_room: 5829  # Яма у дороги
    - direction: west
      to_room: 5813  # Застава на дороге
      keywords: ворота
      exit_flags: 15
      key: 5807
  triggers:
    - 5808  # постучать

# Room #5815
15:
  name: По дороге
  description: |2
    ___После заставы, оставшейся на юге, дорога медленно петляет в лесу.
    Вот и сейчас немного под уклон дорога постепенно теряется среди деревьев.
    После крепкой с вооруженными дружинниками заставы идти по
    незнакомой дороге совершенно не хочется.
  sector: kField
  exits:
    - direction: east
      to_room: 5816  # По дороге
    - direction: south
      to_room: 5814  # Застава на дороге

# Room #5816
16:
  name: По дороге
  description: |2
       Дорога петляет, то направо, то налево, то налево, то направо. Говорят
    давно ехал здесь князь хмельной немного, а за ним вся его дружина. Так как
    князь ехал первым и себя контролировал относительно, а дружина следовала
    ему по пятам, вот и получилась такая дорога.
  sector: kInside
  exits:
    - direction: north
      to_room: 5830  # Кустарник вдоль дороги
    - direction: east
      to_room: 5817  # По дороге
    - direction: south
      to_room: 5829  # Яма у дороги
    - direction: west
      to_room: 5815  # По дороге

# Room #5817
17:
  name: По дороге
  description: |2
    ___Среди темного леса по дороге бредете вы своим путем. Но далеко здесь
    до ближайшего жилища и надо держать ухо востро, а то не ровен час, можно
    зверя лютого встретить, а то и лихих людей.
  sector: kInside
  exits:
    - direction: north
      to_room: 5818  # По дороге
    - direction: west
      to_room: 5816  # По дороге

# Room #5818
18:
  name: По дороге
  description: |2
       Среди темного леса по дороге бредете вы своим путем. Но далеко здесь до
    ближайшего жилища и надо держать ухо востро, а то неровен час, можно зверя
    лютого встретить, а то и лихих людей.
  sector: kInside
  exits:
    - direction: east
      to_room: 5819  # По дороге
    - direction: south
      to_room: 5817  # По дороге
    - direction: west
      to_room: 5830  # Кустарник вдоль дороги

# Room #5819
19:
  name: По дороге
  description: |2
       Дорога неожиданно вынырнула из темного леса и устремилась прямо на север.
    По обочине тянется густой кустарник, а деревья, как будто испугавшись чего-то,
    остались позади. Вдруг вы почувствовали, что будто кто-то за вами следит,
    взгляд неприятный и злобный. Осмотревшись вокруг, вы поняли, что только с востока,
    из-за кустов можно подглядывать за дорогой. Но там никого вроде нет, может
    все показалось.
  sector: kInside
  exits:
    - direction: north
      to_room: 5820  # По дороге
    - direction: east
      to_room: 5834  # Кустарник
    - direction: west
      to_room: 5818  # По дороге

# Room #5820
20:
  name: По дороге
  description: |2
       Да далеко остался позади родимый дом, вот и дорога длинная все тянется
    и тянется. Это же надо же какая Русь большая, если первой дороге все нет и
    нет конца. Вы немного пригорюнились, но вспомнили, что никто вас не принуждал
    пускаться в это путешествие, что вы сами решили попытать счастья вне дома.
    Семи смертям не бывать.
  sector: kInside
  exits:
    - direction: north
      to_room: 5821  # По дороге
    - direction: east
      to_room: 5832  # Кустарник у дороги
    - direction: south
      to_room: 5819  # По дороге

# Room #5821
21:
  name: По дороге
  description: |2
       Следы от колес телег и лошадей на дороге стали попадаться чаще, что
    определенно указывает на близость жилища. Вдоль дороги уже если и есть
    кустарник, то только непосредственно вдоль дороги, а дальше в основном
    луга. Удобные места для выпаса домашней скотины.
  sector: kInside
  exits:
    - direction: north
      to_room: 5822  # По дороге
    - direction: south
      to_room: 5820  # По дороге
    - direction: west
      to_room: 5828  # Вдоль дороги

# Room #5822
22:
  name: По дороге
  description: |2
    ___Дорога плавно поднимается на север к холму, полностью закрывшему вид
    в ту сторону. Вдоль дороги от дождей, стекающих с холма, образовались маленькие
    овраги. Пешему их можно в принципе перелезть, а вот конному вряд ли.
    Без коня останешься, да и голову сломать можно.
  sector: kInside
  flags:
    - kNoEntryMob
  exits:
    - direction: north
      to_room: 5831  # Дорога
    - direction: south
      to_room: 5821  # По дороге

# Room #5823
23:
  name: Лесной завал
  description: |2
       Поваленные деревья загородили все вокруг. Сильный ветер повалил огромные
    деревья, обнажив жуткие корни. Некоторые были размеров в 3-4 человеческих
    роста, все в черной земле сверкали белизной своих уже высохших корней. Долго
    осматривая столь грозное сооружение, вы заметили небольшой лаз, ведущий на
    север.
  sector: kForest
  exits:
    - direction: east
      to_room: 5805  # В темном лесу
  triggers:
    - 5806  # лезтьсевер

# Room #5824
24:
  name: Из лаза
  description: |2
    ___Протиснувшись в лаз, вы вылезли на ничем не отличающийся от уже пройденных
    участков леса, за исключением того, что назад придется теперь снова пробираться
    сквозь завал. Какого лешего я сюда забрался, в очередной раз пришла вам в
    голову чудесная мысль, которую вы и огласили окружающему безгласому лесу.
    Будто в ответ на крик, что-то быстро пробежало за деревьями и скрылось.
    На юге остался лаз.
  sector: kForest
  exits:
    - direction: west
      to_room: 5825  # Среди дубов
  triggers:
    - 5807  # лезтьюг

# Room #5825
25:
  name: Среди дубов
  description: |2
       Совершенно неожиданно стало идти значительно легче, деревья поредели,
    под ногами стало попадаться меньше препятствий в виде корней и кустов.
    Подняв голову и оглянувшись вокруг, вы заметили, что окружены дубовой рощей.
    Здесь и молодые дубки и вековые колоссальные великаны вытеснили другие
    деревья, заполоняя все возможное пространство. Но как неисправимые индивидуалисты
    дубы стоят далеко друг от друга, давая вам легко пройти.
  sector: kForest
  exits:
    - direction: north
      to_room: 5826  # Среди дубов
    - direction: east
      to_room: 5824  # Из лаза

# Room #5826
26:
  name: Среди дубов
  description: |2
    ___Оглядывая каждый встречный дуб, все с большим и большим удивлением, вы прошли
    дальше в рощу. Это же как такое дерево можно срубить - попадаются экземпляры
    в десять обхватов, все коряжистые, видно крепчайшего состава. Тут же не один
    топор не справится. Да и у кого поднимется поднять руку на таких красавцев,
    стоят как богатыри, гордо смотря в лицо небу и солнцу.
  sector: kForest
  exits:
    - direction: east
      to_room: 5827  # У огромного дуба
    - direction: south
      to_room: 5825  # Среди дубов

# Room #5827
27:
  name: У огромного дуба
  description: |2
    ___Дубовая роща будто расступилась перед самым большим своим представителем. 
    Огромный дуб накрыл своей кроной все в округе, кроной, в которой могла бы
    разместится небольшая деревня. Сколько же такому гиганту лет, он же наверно
    старше любого дерева в лесу, а известно, что средние дубы живут по восемьсот
    лет. Его мог ведь посадить и сам бог земли Дажьбог, как первый росток леса,
    как прародитель всей лесной растительности.  
  sector: kForest
  exits:
    - direction: west
      to_room: 5826  # Среди дубов

# Room #5828
28:
  name: Вдоль дороги
  description: |2
       Вдоль дороги молодая поросль деревьев и кустарника дружно заняли все
    возможное пространство. Здесь чтобы сделать шаг, приходится продираться
    сквозь колючие и хлесткие ветки. Жалко обмундирование, много потом придется
    заплатить за его ремонт.
  sector: kField
  flags:
    - kNoEntryMob
  exits:
