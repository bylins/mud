# Room #5831
31:
  name: Дорога
  description: |2
       Дорога наконец-то достигла холма. Уже мочи нет все идти вверх и вверх.
    Зато теперь можно обернуться и посмотреть на пройденный путь, дорогу
    теряющуюся в темном высоком лесу. Где-то там остался родимый дом. Сколько
    пришлось перенести, чтобы преодолеть эту с виду спокойную дорогу. С боков
