# Room #5829
29:
  name: Яма у дороги
  description: |2
       Похоже, здесь годами летние дожди и весенние паводки полностью вымывали
    землю, и теперь образовалась яма с абсолютно ровными стенками. Как вы ни
    старались взобраться по стенке ямы, песок предательски осыпался из под рук
    и вы снова падали в яму. Вот незадача, как выбраться-то?
  sector: kInside
  flags:
    - kNoEntryMob

# Room #5830
30:
  name: Кустарник вдоль дороги
  description: |2
    ___Сойдя с дороги, вы вошли в небольшой кустарник. Немного белый от пыли,
    постоянно попадающей сюда с дороги, плотные кусты заполонили все окружающее
    пространство. На кустах изредка попадаются клочья шерсти животных и
