# Trigger #5806
6:
  name: лезтьсевер
  attach_type: kRoomTrigger
  narg: 100
  arglist: лезть
  trigger_types:
    - kCommand
  script: |-2
    if %cmd%==лезть
      wait 1
      echoaround %actor% %actor.iname% пролез между веток на север.
      wsend %actor% Вы с трудом пролезли между веток.
      wteleport %actor% 5824
      wat 5824 echoaround %actor% %actor.iname% появился отряхиваясь от веток.
      wsend %actor.iname% Вы вылезли из лаза, встали на ноги и отряхнулись от веток.
    end

