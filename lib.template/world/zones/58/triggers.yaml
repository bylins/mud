# Triggers for zone 58

# Trigger #5800
0:
  name: встречатолстыйстражник
  attach_type: kRoomTrigger
  narg: 100
  trigger_types:
    - kAct
  script: |-2
    if %direction% == west && %world.curmobs(5801)%==1
      wait 1
      wsend %actor.iname% Толстый десятник посмотрел на вас.
      wsend %actor.iname%  Толстый десятник сказал: Эй, мелюзга, куда собрался?
      wsend %actor.iname%  Толстый десятник сказал: В город, героем стать?
      wsend %actor.iname%  Толстый обошел вас со всех сторон, делая мерзкие замечания в ваш адрес.
      wsend %actor.iname%  Толстый десятник сказал: Мы тут дорогу сторожим, от опасностей очищаем.
      wsend %actor.iname%  Толстый десятник сказал: Так что проход платный, особенно для таких как ты.
      wsend %actor.iname%  Толстый десятник расхохотался.
      wsend %actor.iname%  Толстый десятник сказал: Давай 2000 кун, может и пропустим!
    end

# Trigger #5801
1:
  name: датьденьгидесятник
  attach_type: kMobTrigger
  narg: 1
  trigger_types:
    - kBribe
  script: |-2
    if %amount% > 1999
      wait 1
      tell %actor.iname% Ух ты, у тебя такие деньги есть.
      tell %actor.iname% Ладно, проходи, да побыстрей.
      отпер ворот
      откры ворот
      wait 5 s
      закр ворот
      запер ворот
    else
      wait 1
      msend %actor.iname% Куда мне твоя мелочь, проваливай пока не накостыляли.
      дать %amount% кун %actor.iname%
    end

# Trigger #5802
2:
  name: встречастарик
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kGreetPCAll
  script: |-2
    wait 1
    tell %actor.iname% Добрый путник!
    msend %actor% Помоги старому слепому беспомощному старику.
    msend %actor% Где-то здесь я оступился и выронил свою палку. Без нее
    msend %actor% я только смог дойти ощупью до этой щели в дереве и
    msend %actor% спрятаться от лесных чудовищ.
    msend %actor% Я ничего не вижу, но чувствую где-то здесь ходят странные
    msend %actor% существа, так что будь осторожен. И вполне возможно моя
    msend %actor% палка у них.

# Trigger #5803
3:
  name: датьжелудьборов
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kReceive
  script: |-2
    if %object.vnum% == 5801
      wait 1
      echo Вепрь увидел брошенную вами связку желудей и стал их жадно есть.
      echo При этом он абсолютно забыл про вас.
      echo Не дай бог так оголодать!
      echo Но успев только проглотить желуди, вепрь вдруг захрипел,
      echo зашатался и упал. Потом вдруг раздался хлопок и пропал даже его труп.
      echo Вот это желуди.
      mpurge %object%
      mpurge %self%
    end

