# Rooms for zone 54

# Room #5400
0:
  name: Заросли
  description: |2
       Дорога в охотничий удел явно не такая гладкая и утоптанная, как лесная, здесь
    проходят только охотники, старающиеся не создавать лишний шум и оставлять после
    себя следов.
  sector: kForest
  flags:
    - kNoEntryMob
  exits:
    - direction: east
      to_room: 5208  # По лесной дороге
    - direction: south
      to_room: 5401  # На тропе

# Room #5401
1:
  name: На тропе
  description: |2
       Охотничья тропка ведет в охотничий птичий удел. На крупную или мелкую
    птицу сюда со всей округи приходят охотники или те, кто не прочь заготовить
    дичи.
  sector: kField
  exits:
    - direction: north
      to_room: 5400  # Заросли
    - direction: south
      to_room: 5402  # Указатель

# Room #5402
2:
  name: Указатель
  description: |2
       Неприметная тропа ведет вглубь леса. На дереве видна зарубка, указывающая
    направление на запад.
  sector: kField
  exits:
    - direction: north
      to_room: 5401  # На тропе
    - direction: west
      to_room: 5403  # Развилка

# Room #5403
3:
  name: Развилка
  description: |2
    ___Здесь тропа разделилась на два направления. Южная выглядит утоптанной,
    как будто ведет к какому-то пристанищу.
  sector: kField
  exits:
    - direction: east
      to_room: 5402  # Указатель
    - direction: south
      to_room: 5441  # Охотничий шалаш
    - direction: west
      to_room: 5404  # Глубже в лес

# Room #5404
4:
  name: Глубже в лес
  description: |2
       Чем глубже в лес, тем сильнее звуки лесной жизни. Слышно как птицы
    переговариваются в кронах деревьев и с шумом перелетают с дерева на
    дерево. То вдруг из-под ног кто-то быстро убегает в ближайший кустарник
    в поисках убежища.
  sector: kField
  exits:
    - direction: north
      to_room: 5405  # Глубже в лес
    - direction: east
      to_room: 5403  # Развилка

# Room #5405
5:
  name: Глубже в лес
  description: |2
       Прислушавшись к звукам птиц вы различили голоса кукушек, перепев перепелов
    и рябчиков, звуки больших птиц при перелете ломающих ветки деревья. Хороший
    лес для умелого охотника, можно вернуться с добычей.
  sector: kField
  exits:
    - direction: north
      to_room: 5406  # Сквозь заросли
    - direction: south
      to_room: 5404  # Глубже в лес

# Room #5406
6:
  name: Сквозь заросли
  description: |2
       Тропа уперлась в плотные заросли кустарника и непонятно как дальше
    пробиваться сквозь нее. Только в одном месте имеется небольшой не проход,
    а больше похожий на лаз в кустарнике, ведущий на восток. Остается только
    крепче привязать свою амуницию и попробовать пролезть.
  sector: kField
  exits:
    - direction: east
      to_room: 5407  # Из лаза
    - direction: south
      to_room: 5405  # Глубже в лес

# Room #5407
7:
  name: Из лаза
  description: |2
       Выбравшись из лаза в кустарнике, и отряхнувшись от колючек и листьев,
    Вы поняли, что пробились в птичий лес. Вокруг разреженный лес из берез, осин
    и ив. Вдалеке на юге заметен небольшой сосновый лесок, на восток лес
    понижается в небольшую низину.
  sector: kField
  flags:
    - kNoEntryMob
  exits:
    - direction: north
      to_room: 5442  # Кустарник
    - direction: south
      to_room: 5408  # Птичий лес
    - direction: west
      to_room: 5406  # Сквозь заросли

# Room #5408
8:
  name: Птичий лес
  description: |2
       Сквозь густую листву прорываются солнечные лучи. Теплый ветер шелестит над
    головой. Пахнет грибами, ягодами, повсюду слышны голоса пташек. Вот над головой
    пролетела какая-то птичка, и что-то испачкало вам шапку.
  sector: kField
  exits:
    - direction: north
      to_room: 5407  # Из лаза
    - direction: south
      to_room: 5409  # Птичий лес

# Room #5409
9:
  name: Птичий лес
  description: |2
       Сквозь густую листву прорываются солнечные лучи. Теплый ветер шелестит над
    головой. Пахнет грибами, ягодами, повсюду слышны голоса пташек. Засмотревшись
