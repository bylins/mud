    страшного, немного промочили одну ногу, оцарапали лицо, а могло быть и хуже.
    Будьте внимательнее.
  sector: kField
  exits:
    - direction: north
      to_room: 5408  # Птичий лес
    - direction: south
      to_room: 5410  # Развилка

# Room #5410
10:
  name: Развилка
  description: |2
       Лес как будто решил разделиться, на юг начинается небольшой сосновый
    высокий лесок, на восток лес понижается и сквозь поредевшие деревья видны
    пятна воды и небольшие лесные пруды.
  sector: kField
  flags:
    - kNoEntryMob
  exits:
    - direction: north
