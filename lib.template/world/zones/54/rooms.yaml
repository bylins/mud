  sector: kField
  exits:
    - direction: east
      to_room: 5414  # По заболоченной траве
    - direction: west
      to_room: 5410  # Развилка

# Room #5412
12:
  name: К глухариному току
  description: |2
       Издревле охотникам известно, что глухари любят сосновую и еловую кору, а
    открывшийся лес с высокими соснами и елями не оставляет сомнений, что здесь обитают
