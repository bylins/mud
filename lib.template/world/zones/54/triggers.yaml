  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kReceive
  script: |-2
    wait 1
    switch %object.vnum%
      case 5402
        %purge% %object%
        say - Я так давно его искал, жена говорит не возвращайся из леса,  пока не найдешь глухариное перо!
