# Room #5050
50:
  name: На тропинке
  description: |2
       Тропинка ведет вглубь леса. По ней не ездят верхом, и стараются,
    чтобы оставалось как можно меньше следов. Вот и сейчас видно, что кто-то
    заметал лесными ветками следы ног, неаккуратно оставленных на глиняном
    участке тропинки.
  sector: kField
  exits:
    - direction: north
      to_room: 5047  # По дороге
    - direction: south
      to_room: 5051  # На капище

# Room #5051
51:
  name: На капище
  description: |2
       Вот что спрятано в глубине леса, капище, святилище старых славянских богов, на
    смену которым новый князь пригласил новых богов из Византии. Но несмотря на
    навязывание новой веры, славяне остаются верны и старым богам, которые не один
    век защищали от несчастий. Капище обнесено высоким частоколом, на острие
    бревен кое-где воткнуты черепа домашних животных и зверей, принесенных в жертву
    богам. 
  sector: kInside
  flags:
    - kPeaceful
    - kForPoly
    - kForMaguses
    - kNohorse
  exits:
    - direction: north
      to_room: 5050  # На тропинке

# Room #5052
52:
  name: На лугу
  description: |2
    ___Вы попали на небольшой луг рядом с деревней. Сюда любит приходить детвора
    поиграть в свои игры. Пологий склон луга плавно уходит от деревни понижаясь
    к оврагу.
  sector: kField
  flags:
    - kPeaceful
  exits:
    - direction: north
      to_room: 5034  # В южной части деревни
      key: 0

# Room #5053
53:
  name: Склад
  description: |2
       Чего только не валяется здесь - большинство вещей разбросаны поверх дубовых
    сундуков, сами сундуки не закрываются от излишней набитости броней и оружием.
    Картину общего беспорядка дополняют какие-то кислые запахи - видимо еду они тоже
    здесь хранят.
  sector: kInside
  flags:
    - kIndoors
    - kPeaceful
    - kNoMagic
    - kNohorse
  exits:
    - direction: west
      to_room: 5010  # Центр деревни
      key: 0

# Room #5054
54:
  name: У шалаша
  description: |2
       Вы вышли к маленькой полянке. Под нависшими ветками большого дерева
    построен небольшой шалашик. Построен так, что виден он только когда чуть
    ли не упрешься в него.
  sector: kField
  flags:
    - kNoEntryMob
    - kNoMagic
  exits:
    - direction: north
      to_room: 5048  # По дороге
      key: 0

# Room #5070
70:
  name: Яма
  description: |2
    ___Ямой называлась почтовая станция, на которой вечно пьяные ямщики меняли
    лошадей во время дороги дальней. Тут же можно нанять и гонца почти в любую
    точку Руси необъятной.    
  sector: kInside
  flags:
    - kNoEntryMob
    - kIndoors
    - kPeaceful
    - kNoWeather
  exits:
    - direction: east
      to_room: 5005  # Перед постоялым двором
      key: 0
