# Room #5000
0:
  name: Комнаты отдыха
  description: |2
       Хозяин устроил здесь комнаты для отдыха. Любой желающий может остановиться
    здесь и передохнуть после дальней дороги. Светлые горницы так и приглашают
    пройти в них и растянуться на перине, на пуховой да забыться сном богатырским.
    Здесь же можно подождать своих компаньонов перед долгой дорогой, поговорить
    о дальнейших планах.
    &GСовсем малых, да не обученных так и тянет &Yвойти &Gв &Yшколу&G.&n
  sector: kCity
  flags:
