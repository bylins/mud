# Room #5033
33:
  name: В южной части деревни
  description: |2
       В южной части деревни безлюдно и тихо. Почти не видно местных жителей, 
    да и кого встретишь, те быстро отворачиваются и уходят, как будто стесняются
    что их застали в этом месте. Только почти заросшая тропа ведет вдоль домов.
    Говорят здесь живут колдуны и ведьмаки, и обычному люду сюда путь заказан, 
    можно и проклятие на всю жизнь получить, да и вовсе сгинуть.
  sector: kInside
  exits:
    - direction: east
      to_room: 5034  # В южной части деревни
    - direction: west
