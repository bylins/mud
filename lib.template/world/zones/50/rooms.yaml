# Room #5037
37:
  name: В покосившейся избе
  description: |2
    ___Покосившаяся старая изба стоит здесь на отшибе от остальных домов. Даже
    местные стараются обходить это место стороной. Только в крайнем случае
    приходят сюда, чтобы снять проклятие с родственников или себя, купить
    любовный приворот. Живет здесь ворожея, живет давно и почти не показывается
    на людях.
  sector: kInside
  flags:
    - kNoEntryMob
    - kIndoors
    - kPeaceful
    - kForMages
    - kForPaladines
  exits:
    - direction: west
      to_room: 5034  # В южной части деревни

# Room #5038
38:
  name: Тихий дом
  description: |2
    ___Вы прошли в кажущийся абсолютно пустым дом. Только иногда еле-еле слышно
    тихие шорохи и непонятные движения, как будто кто-то быстро перемещается по
    дому, а потом замирает. Неприятное, опасное место. Вы наверное знаете зачем
    сюда пришли, так что сами и думайте долго ли здесь находиться.
  sector: kInside
  flags:
    - kNoEntryMob
    - kIndoors
    - kPeaceful
    - kForThieves
    - kForAssasines
  exits:
    - direction: south
      to_room: 5036  # В южной части деревни

# Room #5039
39:
  name: Светлый дом
  description: |2
       Вот единственный дом в этой части деревни, к которому люди идут не скрывая
    своего лица. Белый дом, и снаружи и изнутри. Смотришь на него и как будто не
    сам дом белый, а как бы свечение вокруг дома белого света, поэтому даже
    ночью и в сумерки дом виден издалека.
  sector: kInside
  flags:
    - kNoEntryMob
    - kIndoors
    - kPeaceful
    - kForSorcerers
  exits:
    - direction: north
      to_room: 5036  # В южной части деревни

# Room #5040
40:
  name: К церквушке
  description: |2
       На север открылся вид на самое высокое место в деревне. На вершине холма, 
    возвышающегося над всей округой и протекающей рядом рекой, построена деревянная
    маленькая церквушка. Всего одна луковица с крестом сверху, но сделанная добротно
    и красиво церквушка по праву может считаться пристанищем божьих слуг.
  sector: kCity
  exits:
    - direction: north
      to_room: 5041  # В церкви
    - direction: south
      to_room: 5015  # Речная улица

# Room #5041
41:
  name: В церкви
  description: |2
       Внутри церкви немного темновато, так как только небольшие оконца под самой
    крышей пропускают немного света. Вдобавок немного душновато после свежего
    воздуха от запаха кадила и горящих тут и там свечек. На стенах расположены
    большие и малые иконы со святыми и великомучениками. Приятное ощущение покоя,
    защищенности и святости проникло в вашу душу.  
  sector: kInside
  flags:
    - kNoEntryMob
    - kIndoors
    - kPeaceful
    - kNoMagic
    - kForSorcerers
    - kForMono
    - kNohorse
    - kNoWeather
  exits:
    - direction: south
      to_room: 5040  # К церквушке

# Room #5042
42:
  name: Жилище гадалки
  description: |2
       Небольшой домик, без обычного большого двора и построек. Цветастые
    занавеси на окнах, чистое крыльцо и сени. Над дверью прибита подкова на
    счастье. В углу комнаты стоит блюдечко с молоком, но не для кошки, а для
    домового, чтобы был всегда сыт, не серчал, злых духов в дом не пускал,
    тишину и покой не нарушал.
  sector: kInside
  flags:
    - kNoEntryMob
    - kIndoors
    - kPeaceful
    - kForMages
    - kForSorcerers
    - kForThieves
    - kForWarriors
