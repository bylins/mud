43:
  name: К дороге
  description: |2
       Эта дорога не зря упирается в центр деревни, по ней в деревню привозят
    новый товар, увозят добытые шкуры животных и еду для продажи на ярмарке или
    базаре в ближайшем городе. На дороге видны следы копыт лошадей и колес
    телег.
  sector: kInside
  exits:
    - direction: north
      to_room: 5013  # Речная улица
      key: 0
    - direction: east
      to_room: 5044  # К дороге
    - direction: west
      to_room: 5006  # К центру деревни

