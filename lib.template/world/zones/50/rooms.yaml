# Room #5045
45:
  name: К дороге
  description: |2
       А вот и деревенские ворота, через которые дорога и скрывается в ближайшем
    лесу. Ворота из толстого дерева могут выдержать первый натиск нападающих,
    и дать возможность основной части жителей покинуть деревню и спрятаться
    в глубоком лесу.
  sector: kField
  exits:
    - direction: north
      to_room: 5044  # К дороге
      keywords: ворота
      exit_flags: 1
    - direction: east
      to_room: 5047  # По дороге

# Room #5046
46:
  name: По дороге
  description: |2
       Дорога удаляется от деревни, приближаясь к ближайшему светлому леску.
    Следы копыт лошадей и телег стали встречаться реже, видно нечасто здесь
    путешествуют и торгуют. Присмотревшись внимательно вы заметили следы не
    только лошадей и людей, но и когти большого животного, наверное, медведя,
    большие копыта, что явно принадлежит дикому кабану и множество следов
    поменьше.
  sector: kField
  exits:
    - direction: east
      to_room: 5838  # На дороге
    - direction: west
      to_room: 5049  # По дороге

# Room #5047
47:
  name: По дороге
  description: |2
       Дорога постепенно удаляется от деревни, петляя в светлом лесу.
    Вперемежку со следами копыт лошадей и телег встречаются следы
    лесных обитателей. По краям дороги плотно растут деревья. Но 
    присмотревшись к южной стороне, вы заметили небольшую тропинку,
    ведущую вглубь леса. Со стороны дороги путь на тропинку замаскирован.
  sector: kField
  exits:
    - direction: east
      to_room: 5048  # По дороге
    - direction: south
      to_room: 5050  # На тропинке
    - direction: west
      to_room: 5045  # К дороге

