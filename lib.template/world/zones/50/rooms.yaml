    - direction: west
      to_room: 5030  # Двор старейшины

# Room #5032
32:
  name: В светлой комнате
  description: |2
       Тихая светлая комната значительно меньше предыдущей, но и сюда постоянно
    заходят люди. Здесь в случае необходимости можно оставить на хранение свои
    деньги.
  sector: kCity
  flags:
