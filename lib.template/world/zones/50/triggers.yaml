# Trigger #5002
2:
  name: 'триггер на знахаре '
  attach_type: kMobTrigger
  narg: 100
  arglist: труп
  trigger_types:
    - kReceive
  script: |-2
    wait 1
    switch %object.name%
      case труп таракана
        say  Еще одним гадом меньше! Молодец, продолжай дальше, держи премию.
        %self.gold(+1)%
        дать 1 кун %actor.iname%
        mpurge %object%
      break
      case труп клопа
        say  Еще одним гадом меньше! Молодец, продолжай дальше, держи премию.
        %self.gold(+1)%
        дать 1 кун %actor.iname%
        mpurge %object%
      break
      case труп моли
        say  Еще одним гадом меньше! Молодец, продолжай дальше.
        load obj 101
        дать ломоть %actor.iname%
        mpurge %object%
      break
      case труп блохи
        say  Еще одним гадом меньше! Молодец, продолжай дальше.
        load obj 101
        дать ломоть %actor.iname%
        mpurge %object%
      break
      case труп серой мыши
        say  О, грызун, разносчик заразы! Получи премию.
        %self.gold(+5)%
        дать 5 кун %actor.iname%
        mpurge %object%
      break
      default
        say  Зачем мне это?
        eval getobject %object.name%
        if  %getobject.car% == труп
          mpurge %object%
        else
          броси %getobject.car%.%getobject.cdr%
        end
      break
    done

# Trigger #5003
3:
  name: 'триггер на охотнике '
  attach_type: kMobTrigger
  narg: 100
  arglist: труп
  trigger_types:
    - kReceive
  script: |-2
    wait 1
    switch %object.name%
      case труп белки
        say  Из белки хорошая шкурка получится, продам потом иноземцу!
        улыб
        %self.gold(+10)%
        дать 10 кун %actor.iname%
        mpurge %object%
      break
      case труп бобра
        say  Из бобра шикарная шкурка получится, продам потом иноземцу!
        %self.gold(+75)%
        дать 75 кун %actor.iname%
        mpurge %object%
      break
      case труп рыси
        say  Из рыси шикарная шкурка получится, продам потом иноземцу!
        %self.gold(+100)%
        дать 100 кун %actor.iname%
        mpurge %object%
      break
      case труп волка
        say О, ты убил%actor.g% волка! Это опасно, их целая стая!
        %self.gold(+20)%
        дать 20 кун %actor.iname%
        mpurge %object%
      break
      default
        say  Зачем мне это?
        броси all
      break
    done

# Trigger #5004
4:
  name: входнарентухая
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kGreetPCAll
  script: |-2
    wait 1
    set factor %self.people%
    while %factor%
      set pc %factor.NextInRoom%
      if (%factor.vnum% == -1) && (%factor.level%>19) && (%factor.level%<31)
        if %factor.sex%==1
          tell %factor.iname% Вырос ты уже, нечего тебе здесь штаны просиживать.
        else
          tell %factor.iname% Выросла ты уже, нечего тебе здесь юбку просиживать.
        end
        tell %factor.iname% Не пушу я тебя здесь на постой, иди в город, там где большие нужны.
        tell %factor.iname% А от вас только проблемы здесь будут.
        echoaround %factor% Хозяйка вытолкнула %factor.rname% в трактир.
        msend %factor.iname% Хозяйка вытолкнула вас в трактир.
        mteleport %factor.iname% 5001
        if %factor.sex%==1
          mat 5001 echoaround %factor% Немного взлохмоченный %factor.iname% пришел сверху.
        else
          mat 5001 echoaround %factor% Немного взлохмоченная %factor.iname% пришла сверху.
        end
      end
    end
    if %pc%
      makeuid factor %pc%
    else
      set factor 0
    end
    done

