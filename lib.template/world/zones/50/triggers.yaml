# Trigger #5010
10:
  name: Дали осколок старику
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kReceive
  script: |-2
    wait 1
    if %object.vnum% != 5050
      wait 1s
      echo %self.name% внимательно ощупал %object.vname%.
      wait 1s
      say Я не чувствую исходящего от него жара, опять какую-то безделушку мне принесли.
      wait 1s
      drop %object.name%
      взд
      halt
    end
    wait 1
    mpurge %object%
    wait 1s
    say Да, это он! Я чувствую жар его! Благодарю тебя, мой спаситель!
    wait 2s
    if (%actor.CanGetFeat(предсмертная ярость)% && !%actor.feat(предсмертная ярость)%)
      say Я хоть и слеп, а все же кое-что из воинского мастерства помню. Подойди, покажу тебе одну ухватку.
      echoaround %actor%
      mfeatturn %actor% предсмертная.ярость set
      halt
    end
    if %random.1000% < 310
      say Нечем мне тебя отблагодарить, но вот возьми эту книгу, может, ее удастся выгодно продать ?
      wait 5
      load obj 514
      дать книг .%actor.iname%
      halt
    end
    %actor.questbodrich(3)%
    eval owner %self%
    eval char %actor%
    eval questnum 5010
    eval exp 50000
    exec 203 %world.room(203)%
    detach 5010 %self%

