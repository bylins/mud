# Trigger #5018
18:
  name: Рассказ странника
  attach_type: kMobTrigger
  narg: 1
  arglist: слушаю продолжай говори готов готова
  trigger_types:
    - kSpeech
  script: |-2
    wait 1s
    say Тогда слушай. Когда-то я был богатым купцом.
    echo _- Были у меня лавки, полные добра.
    echo _- Были ладьи быстроходные, были приказчики проворные да охрана надежная.
    wait 1s
    взд
    wait 2s
    say Но как-то во хмелю сказал я, не подумавши, о Богах старых нехорошие слова.
    echo _- А Они и услышали. И наказали - стал я слепнуть день ото дня.
    echo _- Без догляду хозяйского развалилась торговля, ушло богатство.
    echo _- Волхвы сказали, что большими дарами можно искупить вину.
    echo _- И отнес я все добро на капище. Не помогло, видно не те дары Богам нужны...
    wait 1s
    say  Но как-то услышал я, что есть в этих местах семья, которая владеет редкой диковинкой.
    echo _- Скол секиры громовой, которой Перун Змея гоняет.
    echo _- Пришел я к ним, да прогнали со двора нищего калеку,
    echo _- Что я им дать могу, чем отблагодарить?
    echo _- Прошу - добудь мне драгоценный дар, уговори аль отслужи.
    echo _- Может, если бы отнес такой дар, не богатством кичась, а почтение выказывая
    echo _- Может тогда простят мне глупые слова, да от хвори избавят?
    set quest50 %actor%
    calcuid efim 5029 mob
    attach 5011 %efim%
    remote quest50 %efim%
    *attach 5010 %self%
    detach 5008 %self%
    detach 5018 %self%

