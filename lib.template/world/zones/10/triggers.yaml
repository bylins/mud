    if %obj%
      load obj 100
      attach 1021 %LoadedUid%
      exec 1021 %LoadedUid%
      %loadeduid.put(%mob%)%
      force %mob% дер %array.item(%LoadedUid.iname%,1)%
      force %mob% дер %array.item(%LoadedUid.iname%,2)%
      force %mob% дер %array.item(%LoadedUid.iname%,3)%
