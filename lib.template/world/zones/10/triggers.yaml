        force %mob% %cm% %array.item(%LoadedUid.iname%,2)% %position%
        force %mob% %cm% %array.item(%LoadedUid.iname%,3)% %position%
        force %mob% надеть все
      end
      eval pos %pos%+1
    done
    force %mob% надеть все
    set skills магия_огня магия_воды магия_воздуха магия_земли магия_жизни магия_света магия_тьмы магия_разума ошеломить удавить железный_ветер боевой_клич изгнать_нежить скрытый_удар сглазить секиры палицы_и_дубины луки короткие_лезвия длинные_лезвия двуручники перехватить_атаку лечить блокировать_щитом парировать атака_левой_рукой осторожный_стиль иное_оружие выследить спасти проникающее_оружие лидерство прикрыть заколоть богатырский_молот копья_и_рогатины точный_стиль обезоружить дополнительный_выстрел маскировка уклониться подножка ярость сбить оглушить спрятаться отравить ослепить пнуть найти украсть кулачный_бой подкрасться веерная_защита удар_левой_рукой метнуть удар_щитом натиск сразить
    foreach i %skills%
      if %actor.skill(%i%)% > 0
        eval bonus %actor.skill(%i%)%-%mob.skill(%i%)%
        %skilladd% %mob% %i% +%bonus%
      end
    done
    %mob.hitp(%actor.hitp%)%
    %mob.maxhitp(%actor.maxhitp%)%
    %mob.hitpadd(%actor.hitpadd%)%
    %mob.castsucc(%actor.castsucc%)%
    %mob.initiative(%actor.initiative%)%
    eval bonus %actor.RealStr% -%mob.RealStr%
    dgaffect %mob% сила %bonus% 720
    eval bonus %actor.RealInt% -%mob.RealInt%
    dgaffect %mob% интеллект %bonus% 720
    eval bonus %actor.RealWis% -%mob.RealWis%
    dgaffect %mob% мудрость %bonus% 720
    eval bonus %actor.RealDex% -%mob.RealDex%
    dgaffect %mob% ловкость %bonus% 720
    eval bonus %actor.RealCon% -%mob.RealCon%
    dgaffect %mob% телосложение %bonus% 720
    eval bonus %actor.RealCha% -%mob.RealCha%
    dgaffect %mob% обаяние %bonus% 720
    eval bonus %actor.RealSize% -%mob.RealSize%
    dgaffect %mob% размер %bonus% 720
    eval bonus %actor.hr%-%mob.hr%
    dgaffect %mob% попадание %bonus% 720
    eval bonus %actor.dr%-%mob.dr%
    dgaffect %mob% повреждение %bonus% 720
