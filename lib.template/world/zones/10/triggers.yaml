# Trigger #1004
4:
  name: Триггер хрустального доспеха (1092) - Прокиус
  attach_type: kObjTrigger
  narg: 100
  trigger_types:
    - kReceive
  script: |-2
    if (!%actor.canbeseen%)
      halt
    end
    if (( %actor.level% > 30 ) && (%actor.vnum% == -1))
      return 1
      halt
    end
    if ( %actor.iname% == Прокиус )
      return 1
      wait 1
      %echoaround% %actor% Лучи света весело засверкали на гранях доспеха, и вы почувствовали как этот свет ободряет и придает сил.
      %send% %actor% Лучи света весело и ярко заиграли на бесчисленных гранях доспеха.
    else
      return 0
      %echoaround% %actor% %actor.iname% попытал%actor.u% напялить доспех, но лишь ободрал%actor.u% об острые грани.
      %send% %actor% Вы попытались напялить доспех, но лишь оцарапались об острые грани хрусталя.
      eval dmg %actor.hitp%/10
      odamage %actor% %dmg%
    end

# Trigger #1005
