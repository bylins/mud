# Trigger #1001
1:
  name: Возрождение
  attach_type: kObjTrigger
  narg: 100
  trigger_types:
    - kIncomePC
  script: |-2
    eval tmp %actor.wait(22)%
    wait 2s
    %send% %actor% &WВаша смерть была очень глупой.&n
    wait 2s
    %send% %actor% &WОднако, милосердие Богов не знает границ.&n
    wait 2s
    %send% %actor% &WДуша вернулась в ваше израненное тело, которое лежит в кругу жизни.&n
    wait 2s
    %send% %actor% &WРаны на теле быстро затянулись.&n
    eval tmp %actor.hitp(%actor.maxhitp%)%
    wait 2s
    %send% %actor% &WСвежий воздух ворвался в легкие, вот он - первый вдох.&n
    eval tmp %actor.restore%
    wait 2s
    %send% %actor% &WТеперь можно снова вершить "подвиги".&n

