# Trigger #1023
23:
  name: метаем предмет
  attach_type: kObjTrigger
  narg: 3
  arglist: мет
  trigger_types:
    - kCommand
  script: |-2
    set rroom %actor.room%
    set arg1 %arg.car%
    set arg2 %array.item(%arg%,2)%
    if !%arg1% && !%arg2%
      %send% %actor% Метнуть [направление] <цель>.
      halt
    end
    if %arg1% && %arg2%
      switch %arg1.mudcommand%
        case север
        case north
          set dir %rroom.north%
          set tdir на север
          set tdir2 с юга
        break
        case юг
        case south
          set dir %rroom.south%
          set tdir на юг
          set tdir2 с севера
        break
        case запад
        case west
          set dir %rroom.west%
          set tdir на запад
          set tdir2 с востока
        break
        case восток
        case east
          set dir %rroom.east%
          set tdir на восток
          set tdir2 с запада
        break
        case вверх
        case up
          set dir %rroom.up%
          set tdir вверх
          set tdir2 снизу
        break
        case вниз
        case down
          set dir %rroom.down%
          set tdir вниз
          set tdir2 сверху
        break
        default
          %send% %actor% Непонятное направление.
          halt
        break
      done
      if %dir% < 1
        %send% %actor% В указанном направлении нет комнаты.
        halt
      end
      set dir %world.room(%dir%)%
      set str %arg2%
      %self.put(%actor.room%)%
    elseif %arg1% && !%arg2%
      eval dir %rroom%
      set str %arg1%
    end
    foreach i %dir.all%
      set name %i.iname%
      if %name.contains(%str%)% && %i% != %actor%
        eval victim %i%
        eval vexp %victim.exp%
        eval vvnum %victim.vnum%
      break
    end
    done
    if !%victim%
      %send% %actor% Вы не видите цель.
      %self.put(%actor%)%
      halt
    end
    eval mindmg %self.val1%
    eval maxdmg %self.val2%*%self.val1%
    eval dmg %number.range(%mindmg%,%maxdmg%)%+%actor.dr%
    if %actor.RealStr% > 14
      eval bonus %actor.RealStr% -14
    else
      eval bonus (%actor.RealStr%-11)/2
    end
    eval dmg %dmg% +%bonus%
    if %dmg% <= 5
      set dmsg  слегка
    elseif %dmg% <= 11
      set dmsg  легонько
    elseif %dmg% <= 26
      set dmsg
    elseif %dmg% <= 35
      set dmsg  сильно
    elseif %dmg% <= 45
      set dmsg  очень сильно
    elseif %dmg% <= 55
      set dmsg  чрезвычайно сильно
    elseif %dmg% <= 96
      set dmsg  больно
    elseif %dmg% <= 136
      set dmsg  очень больно
    elseif %dmg% <= 176
      set dmsg  чрезвычайно больно
    elseif %dmg% <= 216
      set dmsg  невыносимо больно
    elseif %dmg% <= 256
      set dmsg  жестоко
    elseif %dmg% <= 296
      set dmsg  ужасно
    elseif %dmg% <= 400
      set dmsg  убийственно
    elseif %dmg% <= 800
      set dmsg  изуверски
    else
      set dmsg  смертельно
    end
    if %dir.vnum% != %rroom.vnum%
      %send% %actor% Вы метнули %self.vname% %tdir% в %victim.vname%.
      %send% %actor% %self.iname% %dmsg% повредил%self.g% %victim.vname%.
      %echoaround% %actor% %actor.iname% метнул%actor.g% %self.vname% %tdir%.
      %send% %victim% %actor.iname% метнул%actor.g% в вас %self.vname% %tdir2%.
      %send% %victim% %self.iname% %dmsg% повредил%self.g% вас.
      oat %dir.vnum% %echoaround% %victim% Кто-то метнул в %victim.vname% %self.vname% %tdir2%.
      oat %dir.vnum% %echoaround% %victim% %self.iname%%dmsg% повредил%self.g% %victim.vname%.
    else
      %send% %actor% Вы метнули %self.vname% в %victim.vname%.
      foreach i %dir.all%
        if %i% != %actor% && %i% != %victim%
          %send% %i% %actor.iname% метнул%actor.g% %self.vname% в %victim.vname%.
        end
      done
      %send% %victim% %actor.iname% метнул%actor.g% в вас %self.vname%.
      %echoaround% %victim% %self.iname%%dmsg% повредил%self.g% %victim.vname%.
      %send% %victim% %self.iname%%dmsg% повредил%self.g% вас.
    end
    %damage% %victim% %dmg%
    %self.put(%actor%)%
    %actor.wait(2)%
    if %victim.position% == 0
      if %vexp% > %actor.MaxGainExp%
        eval exp %actor.MaxGainExp%
      else
        eval exp %vexp%
      end
      if %exp% == 0
        %send% %actor% вы не получили опыта
      else
        %send% %actor% получено опыта: %exp% единиц
      end
    end

