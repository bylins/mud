    set positions палец палец шея грудь тело голова ноги ступни кисти руки щит плечи пояс запястья запястья правая левая обе колчан
    set cmds надеть надеть надеть надеть надеть надеть надеть надеть надеть надеть надеть надеть надеть надеть надеть вооруж держ вооруж надеть
    while %pos% <= 19
      set obj %actor.eq(%pos%)%
      if %obj%
        set position %array.item(%positions%, %pos%)%
        load obj 100
        attach 1021 %LoadedUid%
        exec 1021 %LoadedUid%
        %loadeduid.put(%mob%)%
        set cm %array.item(%cmds%, %pos%)%
