# Room #1020
20:
  name: Туманное облако
  description: |2
    ___Вас со всех сторон окружает плотный серый туман. По его поверхности, будто живые,
    не спеша перекатываются ленивые волны, в которых видны серебристые искорки чего-то
    непонятного. Протянув вперед руку, невидно даже собственных ладоней. Такое
    ощущение, что находишься под толщей воды, хотя дышать тут возможно, но воздух тягуч
    и упруг как молочный кисель.
  sector: kInside
