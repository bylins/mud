  sector: kCity
  exits:
    - direction: north
      to_room: 6006  # Срединная дорога
    - direction: east
      to_room: 6043  # Дом травницы
    - direction: south
      to_room: 6003  # Центральный перекресток

# Room #6006
6:
  name: Срединная дорога
  description: |2
