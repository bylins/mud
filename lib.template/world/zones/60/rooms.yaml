# Rooms for zone 60

# Room #6000
0:
  name: В трактире
  description: |2
       В доме весьма уютно и тепло. У дальней стенки сложен небольшой очаг
    из обожженных глиняных кирпичей. Вверх ведет лестница к комнате для отдыха.
    За небольшими столиками сидят местные жители, обменивающиеся новостями и
    слухами. Приятные запахи щекочут вам нос, желудок напоминает вам, что вы
    проделали долгий путь, ноги так и просятся присесть на какой-нибудь стул.
  sector: kInside
  flags:
    - kNoEntryMob
    - kIndoors
    - kPeaceful
    - kNoMagic
    - kNohorse
    - kNoWeather
  exits:
    - direction: north
      to_room: 6001  # Перед трактиром
    - direction: up
      to_room: 6049  # Комната отдыха

# Room #6001
1:
  name: Перед трактиром
  description: |2
       Вы вышли к небольшому дому, построенному из толстых бревен. Из приоткрытой
    двери потянулись манящие запахи. Вам не терпится войти поскорее внутрь.
    Около двери стоит со скучающим видом местный вышибала. При вашем приближении
    он насторожился и недобро прищурился. Здесь не любят дебоширов.
  sector: kCity
  exits:
    - direction: east
      to_room: 6033  # У конюшни
    - direction: south
      to_room: 6000  # В трактире
    - direction: west
      to_room: 6002  # Небольшая улочка

# Room #6002
2:
  name: Небольшая улочка
  description: |2
       Вы идете по центральной улице, в отличие от других очищенной от мусора.
    На юго-востоке виднеется крепкий дом, из трубы которого поднимается
    сизый дымок. Местные жители с интересом и недоверием посматривают на вас.
  sector: kCity
  exits:
    - direction: east
      to_room: 6001  # Перед трактиром
    - direction: west
      to_room: 6003  # Центральный перекресток

# Room #6003
3:
  name: Центральный перекресток
  description: |2
