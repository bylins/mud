    глины. Вдоль стены стоит добротный массивный шкаф.
  sector: kInside
  flags:
    - kNoEntryMob
    - kIndoors
    - kPeaceful
    - kNoMagic
    - kNohorse
    - kNoWeather
    - kAlwaysLit
  exits:
    - direction: north
      to_room: 6003  # Центральный перекресток

# Room #6005
