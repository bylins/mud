    направления. На востоке виднеется добротный дом, на запад же улица ведет
    к торговой улице. Прямо перед вами на юге стоит красивый дом с массивной
    дверью.
  sector: kCity
  exits:
    - direction: north
      to_room: 6005  # Срединная дорога
    - direction: east
      to_room: 6002  # Небольшая улочка
    - direction: south
      to_room: 6004  # Гридня
    - direction: west
      to_room: 6007  # Центральная улица

# Room #6004
4:
