# Trigger #6008
8:
  name: встречает молодой следопыт
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kGreetPCAll
  script: |-2
    *встречамолодой | Mobiles | Great-All PC | 100
    tell %actor.iname% Если хочешь выбраться отсюда, могу помочь!
    tell %actor.iname% Знаю о таких дорогах, что пройдем, никто и не заметит!
    tell %actor.iname% Выведу к одной из деревень далеко на севере, у реки!
    eval needgold %actor.level%
    switch %needgold%
      case 1
      case 21
      case 31
        set what куну
      break
    break
    break
    case 2
    case 3
    case 4
    case 22
    case 23
    case 24
    case 32
    case 33
    case 34
      set what куны
    break
    break
    break
    break
    break
    break
    break
    break
    break
    default
      set what кун
    break
    done
    tell %actor.iname% Всего за %needgold% %what%!

# Trigger #6009
9:
  name: дать кун молодому следопыту
  attach_type: kMobTrigger
  narg: 1
  trigger_types:
    - kBribe
  script: |-2
    *дать20молодому | Mobiles | Bribe | 1
    if %actor.vnum% != -1
      halt
    end
    eval needgold %actor.level%
    if %amount% < %needgold%
      дать %amount% кун %actor.iname%
      tell %actor.iname% Нехорошо обманывать!
      плюн
    else
      echo Следопыт быстро заглянул под навес, кому-то что-то сказал на неизвестном языке.
      msend %actor%  Из под навеса вышел совсем молодой следопыт, почти мальчишка и повел Вас за собой.
      echoaround %actor% Из под навеса вышел совсем молодой следопыт, почти мальчишка и повел %actor.iname% за собой.
      echoaround %actor% %actor.iname% уш%actor.y% вместе с проводником.
      mteleport %actor% 5054 horse
      msend %actor% Ваше путешествие окончилось.
      echoaround %actor% %actor.iname% появил%actor.u% с проводником.
    end
