# Trigger #6004
4:
  name: входнарентухая
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kGreetPCAll
  script: |-2
    wait 1
    set factor %self.people%
    while %factor%
      set pc %factor.NextInRoom%
      if (%factor.vnum% == -1) && (%factor.level%>19) && (%factor.level%<31)
        if %factor.sex%==1
          tell %factor.iname% Вырос ты уже, нечего тебе здесь штаны просиживать.
        else
          tell %factor.iname% Выросла ты уже, нечего тебе здесь юбку просиживать.
        end
        tell %factor.iname% Не пушу я тебя здесь на постой, иди в город, там где большие нужны.
        tell %factor.iname% А от вас только проблемы здесь будут.
        echoaround %factor% Хозяйка вытолкнула %factor.rname% в трактир.
        msend %factor.iname% Хозяйка вытолкнула вас в трактир.
        mteleport %factor.iname% 6000
        if %factor.sex%==1
          mat 6000 echoaround %factor% Немного взлохмоченный %factor.iname% пришел сверху.
        else
          mat 6000 echoaround %factor% Немного взлохмаченная %factor.iname% пришла сверху.
        end
      end
    end
    if %pc%
      makeuid factor %pc%
    else
      set factor 0
    end
    done

# Trigger #6005
5:
  name: нападениежителя
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kFight
  script: |-2
    wait 1
    set name2 %actor%
    if %actor.leader%
      set name1 %actor.leader%
      if (%name1.vnum% == -1) && (%actor.vnum% != -1))
        set name2 %actor.leader%
      end
    end
    if !%name2.rentable%
      msend %name2% %self.name% закричал%self.g%: "На твоих руках кровь, выметайся отсюда."
      while %name2.hitp% > 0
        msend %name2% %self.name% СМЕРТЕЛЬHО пнул%self.g% Вас.
        wait 10
        mdamage %name2% 300
      done
      halt
    end
    г %name2.name%, у нас найдется управа на таких обидчиков!
    msend %name2% Вдруг прибежал здоровый парень и оглушил вас.
    echoaround %name2% Прибежал здоровый парень, оглушил %actor.rname% и куда-то уволок.
    wait 1
    msend %name2% Вы потеряли сознание.
    wait 1
    msend %name2.name% Вы пришли в сознание в глубокой яме от удара о землю.
    if %name2.hitp%>0
      msend %name2.name% Кто-то сверху сильно ругнулся, помянул всех ваших родственников до десятого колена.
      msend %name2.name% Кто-то сверху сказал: Посиди здесь пока не успокоишься.
      msend %name2.name% Да, если хочешь выйти говори: простите меня дурака, может и выпущу.
      mteleport %name2% 6050
      mat 6050 echoaround %name2% Решетка в яме открылась и %name2.name% упал сверху в яму.
      mat 6050 echoaround %name2% Кто-то сильно ругнулся, помянул всех родственников %name2.rname% до десятого колена.
      mat 6050 echoaround %name2% Кто-то сверху сказал:
      mat 6050 echoaround %name2% Посиди здесь пока не успокоишься.
      wait 1
      if %name2.sex%==1
        mat 6050 echoaround %name2% Да, слушай внимательно!
        mat 6050 echoaround %name2% Если хочешь выйти говори: простите меня дурака, может и выпущу.
        mat 6050 echoaround %name2% Для непонятливых, надо набирать: г простите меня дурака
        mat 6050 echoaround %name2% И выпустят скорее всего не с первого раз.
      else
        mat 6050 echoaround %name2% Да, слушай внимательно!
        mat 6050 echoaround %name2% Если хочешь выйти говори: простите меня дуру, может и выпущу.
        mat 6050 echoaround %name2% Для непонятливых, надо набирать: г простите меня дуру
        mat 6050 echoaround %name2% И выпустят скорее всего не с первого раз.
      endif
    end

# Trigger #6006
6:
  name: выходаизямы
  attach_type: kRoomTrigger
  narg: 0
  arglist: '"простите меня дурака" "простите меня дуру"'
  trigger_types:
    - kSpeech
  script: |-2
    wait 1
    if %random.4%<2
      echo Решетка в яме открылась, оттуда показалась здоровенная полубритая физиономия.
      echo Ладно, хватит хныкать, выпущу!
      echo В следующий раз думай, прежде чем жителей обижать наших!
      if %actor.hitp%>0
        wteleport %actor.iname% 6020
        wat 6020 echoaround %actor% К решетке подошел здоровый парень, открыл замок.
        wat 6020 echoaround %actor% Поднял решетку и одним движением вытащил кого-то.
        wat 6020 echoaround %actor% Снова повесил массивный замок.
        wat 6020 echoaround %actor% %actor.iname% размял кости, похоже в яме ему было неудобно.
      end
    else
      echoaround %actor% Никто не прореагировал на слова %actor.rname%.
      wsend %actor% Никто не прореагировал на ваши слова.
      wsend %actor% Наверное не очень искренне все прозвучало, повторите с чувством.
    end

