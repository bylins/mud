# Trigger #2512
12:
  name: '[o48] забрать подарок'
  attach_type: kObjTrigger
  narg: 4
  arglist: забрать
  trigger_types:
    - kCommand
  script: |-2
    if (%actor.vnum% != -1)
      halt
    end
    if ((%cmd% != забрать) || (%arg% != подарок))
      %send% %actor% Чаво-чаво?
      halt
    end
    if ((%actor.level% < 25) && (%actor.remort% < 1))
      %send% %actor% - Мал%actor.g% ты еще подарки просить.
      halt
    end
    *получаем метку года
    if (%date.month% > 6)
      eval nyear %date.year%+1
    else
      set nyear %date.year%
    end
    if (%actor.getquest(2500)% == %nyear%)
      %send% %actor% - Ты уже получал%actor.g% в этом году подарки!
      %send% %actor% - Приходи в следующем году.
      %send% %actor% &gЕлочка широко улыбнулась.&n
      halt
    end
    *подарки: 2505-2535
    eval presentvnum 2504+%random.31%
    %load% obj %presentvnum%
    set present %LoadedUID%
    %present.put(%actor%)%
    %send% %actor% &gЕлочка достала для Вас подарок..&n
    %send% %actor% - Тебе, %actor.iname%, Дед Мороз принес %present.vname% на Новый Год.
    %send% %actor% - Счастливого Нового Года, %actor.iname%!
    %echoaround% %actor% %actor.iname% развернул%actor.g% свой подарок и завизжал%actor.g% от радости!
    set buf %actor.setquest(2500 %nyear%)%
    log %actor.iname% - %present.vname%!

# Trigger #2513
13:
  name: '[o80] кинуть снежок'
  attach_type: kObjTrigger
  narg: 3
  arglist: швырнуть
  trigger_types:
    - kCommand
  script: |-2
    wait 1
    set item %arg.words(1)%
    set target %arg.words(2)%
    if ((%item% != снежок) && (%item% != снежком))
      osend %actor% Чем вы швыряетесь?
      halt
    end
    if (!%target% || (%target.realroom% != %actor.realroom%))
      osend %actor% Вы не видите цели.
      halt
    end
    %actor.wait(5)%
    osend %actor% &CВы метко запустили снежком в %target.vname%!&n
    osend %target% &C %actor.iname% метко запустил в вас снежком! Бррр! Холодно!&n
    foreach inroom %self.pc%
      if (%inroom.name% != %actor.iname%) && (%inroom.name% != %target.name%)
        osend %inroom% &C %actor.iname% запустил%actor.g% снежком в %target.vname%!&n
      end
    done
    echo &CСнежок рассыпался кучей холодных снежинок...&n
    opurge %self%

