# Triggers for zone 25

# Trigger #2500
0:
  name: вручение подарка
  attach_type: kRoomTrigger
  narg: 100
  arglist: вручитьподарки
  trigger_types:
    - kCommand
  script: |-2
    *из комнаты 2500 призываем моба который вручает подарки, пуржится и резетит зону заново
    wait 1
    unset mobpozdravitel
    calcuid mobpozdravitel 2500 mob
    if (%mobpozdravitel% && (%mobpozdravitel.position% != 7))
      wteleport %mobpozdravitel% %self.vnum%
      echo Внезапно в комнату робко вошел слуга, что-то сжимая запазухой.
      wait 1 s
      wforce %mobpozdravitel% поклон
      wait 2 s
      wforce %mobpozdravitel% аплоди .стрибог
      wait 1 s
      wforce %mobpozdravitel% дать все .стрибог
      wait 1 s
      wforce %mobpozdravitel% г ПОЗДРАВЛЯЕМ С НОВЫМ ГОДОМ!
      wait 1 s
      wforce %mobpozdravitel% кивнуть
      wait 3 s
      echo Слуга не задерживаясь отправился по другим (менее значимым, но все же необходимым) поручениям.
      wpurge %mobpozdravitel%
      %world.zreset(25)%
    else
      echo Откуда-то послышались звуки новогодних хлопушек и петард.
    end

# Trigger #2501
1:
  name: пить из кружки
  attach_type: kObjTrigger
  narg: 3
  arglist: '*'
  trigger_types:
    - kCommand
  script: |-2
    * если выполняется команда "пить" или "drink" и аргумент похож на нашу шмотку -- то выполняем
    if (%cmd.mudcommand% == пить || %cmd.mudcommand% == drink || %cmd.mudcommand% == пробовать || %cmd.mudcommand% == taste)
      if (%arg.contains(бол)% || %arg.contains(кру)%)
        osend %actor% Вы глотнули &Cсилы жизни&n из &WБольшой &YКружки &RБосса&n.
        osend %actor% Вы почувствовали прилив &Gжизненных сил&n!
        osend %actor% Приятное настроение наполнило Вас!
        osend %actor% Откуда-то Вы услышали голоса: "&RСлава и хвала отцу МАДа нашего!&n"
        if !%actor.iname%
          echoaround Стрибог выпил напиток &Cсилы жизни&n из &WБольшой &YКружки &RБосса&n.
        else
          echoaround %actor% %actor.iname% выпил%actor.g% напиток &Cсилы жизни&n из &WБольшой &YКружки &RБосса&n.
        end
        wait 1
      end
    end
    return 0

# Trigger #2502
2:
  name: пить из бутылки шампанского
  attach_type: kObjTrigger
  narg: 2
  arglist: '*'
  trigger_types:
    - kCommand
  script: |-2
    * если выполняется команда "пить" или "drink" и аргумент похож на нашу шмотку -- то выполняем
    if !%actor.iname%
      return 0
      halt
    end
    if (%cmd.mudcommand% == пить || %cmd.mudcommand% == drink || %cmd.mudcommand% == пробовать || %cmd.mudcommand% == taste)
      if (%arg.contains(бут)% || %arg.contains(шам)%)
        osend %actor% Вы выпили шампанского из &Kбу&gтылки &Kша&gмпанского&n.
        echoaround %actor% %actor.iname% выпил%actor.g% шампанского из &Kбу&gтылки &Kша&gмпанского&n.
        wait 1
        %actor.wait(2)%
      end
    end
    return 0

# Trigger #2503
3:
  name: Трясти новогоднюю елочку
  attach_type: kMobTrigger
  narg: 4
  arglist: трясти
  trigger_types:
    - kCommand
  script: |-2
    wait 1
    echoaround %actor% %actor.iname% начал%actor.g% трясти &Gвысоченную новогоднюю ёлочку&n.
    msend %actor% Вы начали трясти &Gвысоченную новогоднюю ёлочку&n.
    %actor.wait(5s)%
    wait 5
    if %random.100% < 20
      echo Внезапно &Rш&Yа&Gр&Cи&Bк &Rд&Yл&Gя &Rн&Yо&Gво&Cго&Bдн&Mей&R е&Yл&Gк&Cи&n упал с &Gвысоченной новогодней ёлочки&n!
    end

# Trigger #2504
4:
  name: Вешаем новогодний шарик на елочку
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kReceive
  script: |-2
    wait 1
    if %object.vnum% == 2504
      wait 1
      mpurge %object%
      echoaround %actor% %actor.iname% повесил%actor.g% &Rш&Yа&Gр&Cи&Bк &Rд&Yл&Gя &Rн&Yо&Gво&Cго&Bдн&Mей&R е&Yл&Gк&Cи&n на &Gвысоченную новогоднюю елочку&n.
      msend %actor% Вы повесили &Rш&Yа&Gр&Cи&Bк &Rд&Yл&Gя &Rн&Yо&Gво&Cго&Bдн&Mей&R е&Yл&Gк&Cи&n на &Gвысоченную новогоднюю елочку&n.
      * Выдача приза за сбор новогодних шариков
      eval randomnum2504 %random.1000%
      if %randomnum2504% < 10
        load obj 1144
        log &YВНИМАНИЕ: &R%actor.iname%&G получил с новогодней елки (&Wсупер-приз :)&G): &Mмоск Ясны&G
      elseif %randomnum2504% < 50
        switch %random.6%
          case 1
            load obj 1130
            log &YВНИМАНИЕ: &R%actor.iname%&G получил с новогодней елки: &Mкираса повелителя волн&G
          break
          case 2
            load obj 1131
            log &YВНИМАНИЕ: &R%actor.iname%&G получил с новогодней елки: &Mнагрудник повелителя ночи&G
          break
          case 3
            load obj 1132
            log &YВНИМАНИЕ: &R%actor.iname%&G получил с новогодней елки: &Mдоспех повелителя ветра&G
          break
          case 4
            load obj 1133
            log &YВНИМАНИЕ: &R%actor.iname%&G получил с новогодней елки: &Mамулет повелителя недр&G
          break
          case 5
            load obj 1134
            log &YВНИМАНИЕ: &R%actor.iname%&G получил с новогодней елки: &Mкираса повелителя пламени&G
          break
          case 6
            load obj 1135
            log &YВНИМАНИЕ: &R%actor.iname%&G получил с новогодней елки: &Mнагрудник повелителя солнца&G
          break
        done
      elseif %random.1000% < 300
        * бутылка шампанского + коробка с конфетами - 10% лоад
        load obj 2506
        load obj 2505
        load obj 11225
        load obj 11225
        load obj 11225
        load obj 11225
        load obj 11225
        положить все.конф коробк
        * Выдача утешительного приза
      elseif %random.10% < 5
        load obj 2508 * пельмени новгодние
      else
        load obj 11225 * конфета мишка в киеве
      end
      give all .%actor.iname%
      drop all
    else
      tell %actor.iname% Если у Вас есть &Rш&Yа&Gр&Cи&Bк &Rд&Yл&Gя &Rн&Yо&Gво&Cго&Bдн&Mей&R е&Yл&Gк&Cи&n то принесите его.
      wait 2
      drop all
    end

