# Trigger #2522
22:
  name: Раскладной чармис - снежный вихрь
  attach_type: kObjTrigger
  narg: 2
  arglist: встряхнуть
  trigger_types:
    - kCommand
  script: |-2
    wait 1
    if !%arg.contains(шар)%
      osend %actor% Что вы хотите встряхнуть?
      halt
    end
    echoaround %actor% встряхнуд%actor.g% стеклянный шар, и вокруг закружился снежный вихрь!
    osend %actor% Вы встряхнули стеклянный шар и вокруг закружился снежный вихрь!
    set charmis %self.val0%
    if ((%self.val0% == 0) || !%charmis.vnum%))
      wait 1s
      echo Вихрь быстро кружась сжался в смерч.
      wait 1s
      echo Снежный вихрь повис перед вами, и в нем медленно появались пара светящихся глаз.
      echoaround %actor% Снежный вихрь повис перед %actor.vname%
      load mob 2510
      calcuid tornado 2510 mob
      oforce %tornado% г Не работает насяльника
      %self.val0(%tornado%)%
      halt
    end
    set charmis %self.val0%
    if ((%charmis.realroom% == %charmis.realroom%) && !%charmis.leader%)
      wait 1s
      echo Снежный вихрь бешенно закружился, и рассыпался в воздухе.
      wait 1
      opurge %charmis%
      halt
    end
    if ((%charmis.realroom% == %actor.realroom%) && (%charmis.leader% == %actor%))
      wait 1s
      echoaround %actor% Снежный вихрь кружится вокруг %actor.vname%
      echo Снежный вихрь закружился вокруг вас.
      halt
    end
    if ((%charmis.realroom% == %actor.realroom%) && (%charmis.leader% != %actor%))
      wait 1s
      echo Снежный вихрь с гулом зккружился на месте.
      oforce %charmis% follow я
      wait 3
      echoaround %actor% Снежный вихрь подлетел ближе к %actor.dname%
      echo Снежный вихрь подлетел поближе к вам.
      halt
    end
    if (%charmis.realroom% != %actor.realroom%)
      wait 1s
      echoaround %charmis% Снежный вихрь вдруг взвился и растаял в воздухе.
      echo Снежный вихрб со свистом причался откуда-то, и подлетел к вам.
      oteleport %charmis% %actor.realroom%
    end

# Trigger #2523
23:
  name: '[m04] снятие персональности с предметов'
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kReceive
  script: |-2
    wait 3
    foreach thing %self.objs%
      if ((%thing.vnum% > 2549) && (%thing.vnum% <= 2573))
        if %thing.owner%
          echo %self.iname% ловко оторвал приклееный в потайном месте %thing.rname% ярлычок.
          %thing.owner(0)%
        else
          echo %self.iname% сноровисто наклеил неболшой ярлычок в потайном месте %thing.rname%.
          %thing.owner(%actor.uniq%)%
        end
      else
        echo %self.iname% хмуро поглядел на %thing.vname%.
      end
      eval tmp %thing.put(%actor%)%
      if (%thing.carriedby% == %actor%)
        msend %actor% %self.iname% тут же вернул вам %thing.vname%.
        echoaround %actor% %self.iname% вернул %actor.dname% %thing.vname%.
      else
        eval tmp %thing.put(%self.realroom%)%
        echo %self.iname% бросил %thing.vname%.
      end
      wait 3
    done

# Trigger #2524
24:
  name: '[m03] медведь трансформирует снежинки'
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kReceive
  script: |-2
    *медведь трансформирует снежинки : Mobiles : Receive : 100
    if (((%object.vnum% < 2586) || (%object.vnum% > 2589)) && (%object.vnum% != 10630))
      msend %actor% Вряд ли ему это нужно...
      return 0
      halt
    end
    wait 1
    set size0 0
    set size1 0
    set size2 0
    set size3 0
    *лоадим ранее сданные снежинки
    set i 86
    while (%i% < 90)
      if %actor.quested(25%i%)%
        set it %actor.getquest(25%i%)%
        %actor.unsetquest(25%i%)%
        while (%it% > 0)
          %load% obj 25%i%
          eval it %it%-1
        done
      end
      eval i %i%+1
    done
    *считаем все снежинки
    foreach item %self.objs%
      switch %item.vnum%
        case 2586
        case 10630
          eval size0 %size0%+1
        break
        case 2587
          eval size1 %size1%+1
        break
        case 2588
          eval size2 %size2%+1
        break
        case 2589
          eval size3 %size3%+1
        break
      done
    done
    wait 1
    *считаем сколько и каких снежинок надо залоадить
    eval amount0 %size0%/10
    eval amount1 %size1%/10
    eval amount2 %size2%/10
    eval amount3 %size3%/10
    *остальные снежинки подлежат немедленному возврату
    eval size0 %size0%-10*%amount0%
    eval size1 %size1%-10*%amount1%
    eval size2 %size2%-10*%amount2%
    eval size3 %size3%-10*%amount3%
    eval tmp %size0%+%size1%+%size2%+%size3%
    if (%tmp% > 0)
      tell %actor.iname% Снежинки принимаю только десятками!
      if (%size0% > 0)
        give %size0% крош.снеж .%actor.iname%
      end
      if (%size1% > 0)
        give %size1% мале.снеж .%actor.iname%
      end
      if (%size2% > 0)
        give %size2% небо.снеж .%actor.iname%
      end
      if (%size3% > 0)
        give %size3% прек.снеж .%actor.iname%
      end
    end
    *лишь теперь удаляем все из инвентаря
    mjunk all
    *лоадим нужные более крупные снежинки если надо
    eval tmp %amount0%+%amount1%+%amount2%+%amount3%
    if (%tmp% > 0)
      while (%amount0% > 0)
        %load% obj 2587
        echo %self.iname% слепил несколько крошечных снежинок в одну маленькую.
        eval amount0 %amount0%-1
      done
      while (%amount1% > 0)
        %load% obj 2588
        echo %self.iname% слепил несколько маленьких снежинок в одну небольшую.
        eval amount1 %amount1%-1
      done
      while (%amount2% > 0)
        %load% obj 2589
        echo %self.iname% слепил несколько небольших снежинок в одну более крупную.
        eval amount2 %amount2%-1
      done
      while (%amount3% > 0)
        %load% obj 2590
        echo %self.iname% слепил несколько средних снежинок в одну большую.
        eval amount3 %amount3%-1
      done
      echo %self.iname% почесал репу, подсчитывая что-то в уме.
      give all .%actor.iname%
      tell %actor.iname% Итак, мы в рассчёте!
      tell %actor.iname% Приноси еще!
    end

