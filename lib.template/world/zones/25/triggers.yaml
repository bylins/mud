# Trigger #2515
15:
  name: '[m05] дали волшебный лед Василю'
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kReceive
  script: |-2
    if ((%object.vnum% < 10670) || (%object.vnum% > 10672))
      msend %actor% Вряд ли ему это нужно...
      return 0
      halt
    end
    wait 7
    *считаем сданные осколки/сферы/грозди
    set debris 0
    set sphere 0
    set cluster 0
    foreach item %self.objs%
      switch %item.vnum%
        case 10670
          eval debris %debris%+1
        break
        case 10671
          eval sphere %sphere%+1
        break
        case 10672
          eval cluster %cluster%+1
        break
      done
    done
    *удаляем все из ивентаря
    mjunk all
    *говорим чару сколько чего он сдал
    wait 1
    echo %self.name% заскрипел пером по пергаменту.
    tell .%actor.iname% Итак, в этот раз ты принес%actor.q%:
    if (%debris% > 0)
      tell %actor.iname% Осколков - %debris% штук.
    end
    if (%sphere% > 0)
      tell %actor.iname% Шаров - %sphere% штук.
    end
    if (%cluster% > 0)
      tell %actor.iname% Гроздей - %cluster% штук.
    end
    tell %actor.iname% Отлично, заходи еще.
    *суммируем с числом ранее сданных предметов и записываем
    eval debris %debris%+%actor.getquest(2503)%
    eval sphere %sphere%+%actor.getquest(2504)%
    eval cluster %cluster%+%actor.getquest(2505)%
    %actor.setquest(2503 %debris%)%
    %actor.setquest(2504 %sphere%)%
    %actor.setquest(2505 %cluster%)%

# Trigger #2516
16:
  name: '[m05] озвучиваем счет'
  attach_type: kMobTrigger
  narg: 1
  arglist: счет счёт
  trigger_types:
    - kSpeech
  script: |-2
    wait 1
    eval debris %actor.getquest(2503)%
    eval sphere %actor.getquest(2504)%
    eval cluster %actor.getquest(2505)%
    if ((%debris% == 0) && (%sphere% == 0) && (%cluster% == 0))
      say У вас на счету ровным счетом ничего нет...
      halt
    end
    tell %actor.iname% На твоем счету:
    if (%debris% != 0)
      tell %actor.iname% Осколков - %debris%.
    end
    if (%sphere% != 0)
      tell %actor.iname% Шаров - %sphere%.
    end
    if (%cluster% != 0)
      tell %actor.iname% Гроздьев - %cluster%.
    end
    wait 1s

