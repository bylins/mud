        break
        case 9
          echo &RСтая крылатых летучих змеев накинулась было на корабль, но корабелы отогнали их стрелами и гарпунами.&n
        break
        case 10
          echo &CБеззвучная молния сверкнула высоко в небе.&n
        break
        case 11
