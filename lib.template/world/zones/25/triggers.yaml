        break
      done
      eval i %i%+1
      wait 10s
    done
    mdoor 2501 d room %target%
    mdoor %target% u room 2501
    load obj 2598
    calcuid ratchet %target% room
    calcuid ladder 2598 obj
    %ladder.put(%ratchet%)%
    echo Наконец вы прибыли в город %city%.
    echo %self.name% приказал спустить парус и сбросил вниз веревочную лестницу.
    attach 2509 %ratchet%
    exec 2509 %ratchet%
    орать Летучий корабль прибыл в город %city%! Поспешай-налетай!

