# Trigger #6714
14:
  name: дали жало шмелю
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kReceive
  script: |-2
    if %object.vnum%==6707
      wait 2s
      echo "Жжжжжжжж." - благодарно протянул шмель.
      wait 2s
      echo "Жжжачем мне это? Жжжж. Я жжж не прижжью себе снова жжжало!"
      mpurge %object%
      wait 5s
      echo "Жжжж. Но спасибо всежжжж."- прожужжал шмель.
      echo Шмель дунул на жало, и оно осветилось легким светом.
      wait 3s
      if %world.curobjs(6713)% < 100
        load obj 6713
        дат жало %actor.iname%
        echo "Держжжи и не жужжии."- прожужжал шмель.
      end
    end

