# Triggers for zone 67

# Trigger #6700
0:
  name: выломать камень
  attach_type: kRoomTrigger
  narg: 0
  arglist: выломать разломать ломать
  trigger_types:
    - kCommand
  script: |-2
    if !(%arg.contains(камень)%)
      wsend %actor% Что это Вы хотите выломать???
      return 0
      halt
    end
    wsend %actor% Вы выбрали валун побольше и сильно ударили по нему!
    echoaround %actor% %actor.iname% сильно ударил%actor.g% по самому большому камню ногой!
    wait 1s
    echo От одной из глыб отвалился камень с острыми краями.
    load obj 6700
    calcuid kamen 6720 room
    detach 6700 %kamen%

# Trigger #6701
1:
