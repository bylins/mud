# Trigger #6710
10:
  name: перс говорит помогу
  attach_type: kMobTrigger
  narg: 0
  arglist: помогу
  trigger_types:
    - kSpeech
  script: |-2
    wait 2s
    echo "Ну попробуй..." - грустно взревел медведь.
    echo "Дело в том, что пчелы меня закусали, не дают медом полакомиться..." - сказал медведь
    пла
    wait 2s
    echo "А все из-за того, что у ихнего друга шмеля, кто-то украл жало" - простонал медведь.
    echo "При чем тут я? Не понимаю..." - сказал медведь.
    echo "Помоги, и я тебе скажу спасибо!" - проревел медведь.
    wait 2s
    echo "Но учти, что шмеля просто так не найдешь, он от горя спрятался и сидит в улье"
    echo "Его надо выманить" - подсказал медведь.
    detach 6710 %self%

