# Trigger #6706
6:
  name: залезть в муравейник
  attach_type: kRoomTrigger
  narg: 0
  arglist: залезть лезть пролезть
  trigger_types:
    - kCommand
  script: |-2
    if !(%arg.contains(муравейник)%)
      wsend %actor% Куда это Вы хотите залезть???
      return 0
      halt
    end
    context 67
    if !(%qwestik67% == %actor.iname%)
      wsend %actor% Чтобы пролезть в муравейник надо сначала превратиться в муравья!
      return 0
      halt
    end
    if !%actor.rentable%
      wsend %actor% Кровь на ваших лапах не дает вам сделать этого!
      halt
    end
    context 67
    wsend %actor% Будучи очень маленьким, вы пролезли в муравейник.
    echoaround %actor% %actor.iname% полез%actor.q% в маленькое отверстие муравейника.
    wait 1s
    wsend %actor% Вы в душной и тесной норке.
    wteleport %actor.iname% 6774
    wat 6774 echoaround %actor% Кто-то пролез сюда сверху.
    unset %qwestik67%
    calcuid norkam 6717 room
    detach 6706 %norkam%

# Trigger #6707
7:
  name: превратиться в муравья
  attach_type: kRoomTrigger
  narg: 0
  arglist: превратиться
  trigger_types:
    - kCommand
  script: |-2
    if !(%arg.contains(муравей)%)
      wsend %actor% В кого вы хотите превратиться???
      return 0
      halt
    end
    context 67
    eval qwestik67 %actor.iname%
    calcuid norkam 6717 room
    remote qwestik67 %norkam%
    wsend %actor% Вы стали меньше букашки-таракашки. Зачем вам это!?
    echoaround %actor% %actor.iname% сказал%actor.q% магические слова и стал%actor.q% размером с букашку.
    calcuid norkam 6717 room
    detach 6707 %norkam%

