# Room #6717
17:
  name: Муравейник
  description: |2
       Вы у большого муравейника. Он представляет собой кучку трухи темного
    цвета, по которой бегаю в разные стороны муравьи. Каждый несет на какую то
    ношу на благо общего муравьиного дела. Вот и вы бы лучше занимались мирными
    заботами, чем бряцать оружием на этих мирных просторах. Вход в муравейник
    виден внизу.
  sector: kField
  flags:
    - kNoEntryMob
  exits:
    - direction: north
      to_room: 6716  # Дорожка
    - direction: east
      to_room: 6726  # Широкое поле
    - direction: south
      to_room: 6718  # Широкое поле
    - direction: west
      to_room: 6707  # Дорожка
  extra_descriptions:
    - keywords: муравейник вход
      description: |2
        Вход в муравейник внизу у вас под ногами, но только
        самый маленький человечек сможет туда пролезть.
  triggers:
    - 6706  # залезть в муравейник

