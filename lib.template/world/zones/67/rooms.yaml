    воды и кваканье лягушек - там выход к самому берегу реки. Дорога из деревни
    находится на юге.
  sector: kField
  exits:
    - direction: east
      to_room: 6784  # Во дворе
      description: Ворота
      keywords: Ворота
      exit_flags: 3
    - direction: south
      to_room: 6783  # Дорожка
    - direction: west
      to_room: 6781  # На берегу

# Room #6783
83:
