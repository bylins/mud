  sector: kInside
  flags:
    - kDarked
    - kSoundproof
    - kTunnel
    - kNoWeather
  exits:
    - direction: up
      to_room: 6771  # В норе

# Room #6778
78:
  name: В муравейнике
  description: |2
       Вы в главной трапезной норе муравейника. Здесь обычно лакомятся
    останками улиток, гусениц и букашек. Но может быть сегодня скушают и
