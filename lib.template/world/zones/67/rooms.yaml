      to_room: 6780  # По пояс в воде
    - direction: south
      to_room: 6745  # По пояс в воде
    - direction: west
      to_room: 6785  # На реке

# Room #6780
80:
  name: По пояс в воде
  description: |2
       Вы недалеко от берега, но вода вам достает уже до пояса. На севере видна
    только широкая гладь реки, а другой берег мелькает вдали тонкой ниточкой.
    В дно здесь вкопаны рогатины, предназначенные для поддержания удилищ. Выйти
    на берег можно, пойдя на восток.
  sector: kWaterSwim
  exits:
