       Старые вековые деревья растут здесь плотной стеной. Охотники не заходят
    так глубоко в эти леса, опасаясь разгневать хозяина леса - Потапа Потапыча.
    Сквозь редкие просветы между ветвями деревьев с трудом пробивается свет.
    Неприметная тропка ведет с запада на юг.
  sector: kForest
  exits:
    - direction: north
      to_room: 6766  # Дубрава
    - direction: east
      to_room: 6770  # Дубрава
    - direction: south
      to_room: 6768  # Дубрава
    - direction: west
      to_room: 6764  # Дубрава

# Room #6768
68:
  name: Дубрава
  description: |2
       Густой широколиственный лес окружает вас со всех сторон. Иногда мимо
    пробегают звери, взглянут на вас и бегут дальше - видно страшно им тут!
    Плотные заросли на юге и западе мешают разглядеть что-либо, а с востока
    доносятся странные звуки. Узенькая тропка ведет с севера на восток.
  sector: kForest
  exits:
    - direction: north
      to_room: 6767  # Дубрава
    - direction: east
      to_room: 6769  # У большого пня

# Room #6769
69:
  name: У большого пня
  description: |2
       Здесь, в густом лесу, куда редко заходит даже самый смелый охотник, живет
    большой медведь - гроза полей и лесов окрестных. Кто ни придет сюда - со всех
    он требует дань, то мясом, то плодами, то еще чем-нибудь. Огромный пень с
    большой щепой служит ему постоянным местом отдыха. Под одним из деревьев
    виден большой лаз, заваленный ветками.
  sector: kForest
  exits:
    - direction: north
      to_room: 6770  # Дубрава
    - direction: west
      to_room: 6768  # Дубрава
  extra_descriptions:
    - keywords: пень
      description: |2
        На этом пне сидит обычно медведь и играет щепой,
        чем очень пугает всю округу.
    - keywords: большой лаз берлога
      description: |2
        Вход в берлогу медведя. Он очень узкий, поэтому надо
        будет лезть в нее.

# Room #6770
70:
  name: Дубрава
  description: |2
       Густой широколиственный лес окружает вас со всех сторон. Иногда мимо
    пробегают звери, взглянут на вас и бегут дальше - видно страшно им тут!
    Плотные заросли на севере и востоке мешают разглядеть что-либо, а с юга
    доносятся странные звуки.
  sector: kForest
  exits:
    - direction: south
      to_room: 6769  # У большого пня
    - direction: west
      to_room: 6767  # Дубрава

# Room #6771
71:
  name: В норе
  description: |2
       Узкий неудобный лаз пугает вас не только плохим звериным запахом, но и
    малыми размерами. Как бы не застрять здесь навечно, чай кушаете много и
    плечи у вас широкие. Пролезть можно вниз дальше по норе или выбраться
    вновь наружу через лаз вверху.
  sector: kInside
  flags:
    - kDarked
    - kSoundproof
    - kTunnel
    - kNoWeather
  exits:
    - direction: down
      to_room: 6777  # Логово хомячка
  extra_descriptions:
    - keywords: лаз
      description: |2
        Выход из норы. Можно попытаться вылезть из норы
        по нему.
  triggers:
    - 6702  # пролезть в норку вверх

# Room #6772
72:
  name: В муравейнике
  description: |2
       В этой части муравейника хранятся запасы съестного на зиму. Трупики
    букашек так и застилают все дно норки. Негромкие звуки борьбы доносятся с
    востока - там происходит что-то странное.
  sector: kInside
  flags:
    - kDarked
    - kTunnel
    - kNoWeather
  exits:
    - direction: north
      to_room: 6775  # В муравейнике
    - direction: east
      to_room: 6778  # В муравейнике

# Room #6773
73:
  name: В муравейнике
  description: |2
      Вы в самом сердце муравейника. Здесь лежат множество белых еще деток
    и за их спокойным ростом следят несколько агрессивных муравьев. Им дан строгий
    наказ главным муравьем следить в оба глаза за сохранностью муравьиного рода.
    Вы здесь явно чужой и потому лучше идите как по добру по здорову отсюда.
  sector: kInside
  flags:
    - kDarked
    - kTunnel
    - kNoWeather
  exits:
    - direction: west
      to_room: 6776  # В муравейнике

# Room #6774
74:
  name: В муравейнике
  description: |2
       Вы в узком проходе муравейника. Одному бог понятно, как вы сюда смогли
    пролезть. Везде бегают маленькие муравьишки. Легкий свет виден вверху - там
    выход, а пролезть можно дальше на восток.
  sector: kInside
  flags:
    - kDarked
    - kNoEntryMob
    - kTunnel
    - kNoWeather
  exits:
    - direction: east
      to_room: 6775  # В муравейнике
  extra_descriptions:
    - keywords: выход
      description: |2
        Выход из муравейника вверху - надо просто
        попытаться вылезти отсюда - ведь ход такой узкий!
  triggers:
    - 6715  # вылезть из муравейника

# Room #6775
75:
