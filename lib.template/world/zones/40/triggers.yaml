# Triggers for zone 40

# Trigger #4000
0:
  name: 'триггер на скорняке '
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kReceive
  script: |-2
    wait 2
    switch %object.name%
      case труп мыши
        say  Благодарствую, ты меня выручаешь, получи плату.
        %self.gold(+1)%
        дать 1 кун %actor.iname%
        mpurge %object%
      break
      case труп норки
        say    Благодарствую, получится хорошая шкурка на шубу, получи плату.
        %self.gold(+20)%
        дать   20 кун %actor.iname%
        mpurge %object%
      break
      case труп лисы
        say    Благодарствую, получится хорошая шкурка на шубу, получи плату.
        %self.gold(+30)%
        дать   30 кун %actor.iname%
        mpurge %object%
      break
      case труп медведя
        say    Благодарствую, получится превосходный тулуп, получи плату.
        %self.gold(+80)%
        дать   80 кун %actor.iname%
        mpurge %object%
      break
      case труп зайца
        say    Благодарствую, получится хорошая шапка, получи плату.
        %self.gold(+10)%
        дать   10 кун %actor.iname%
        mpurge %object%
      break
      case труп ондатры
        say    Благодарствую, получится хороший воротник, получи плату.
        %self.gold(+40)%
        дать   40 кун %actor.iname%
        mpurge %object%
      break
      case труп бобра
        say    Благодарствую, хороший мех, получи плату.
        %self.gold(+25)%
        дать   25 кун %actor.iname%
        mpurge %object%
      break
      case труп барсука
        say    Благодарствую, хороший мех, получи плату.
        %self.gold(+25)%
        дать   25 кун %actor.iname%
        mpurge %object%
      break
      case труп выдры
        say    Благодарствую, хороший мех, получи плату.
        %self.gold(+22)%
        дать   22 кун %actor.iname%
        mpurge %object%
      break
      default
        say  Зачем мне это?
        eval getobject %object.name%
        if  %getobject.car% == труп
          mpurge %object%
        else
          броси %getobject.car%.%getobject.cdr%
        end
      break
    done

# Trigger #4001
1:
  name: 'триггер на хозяйке мельницы '
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kGreetPC
  script: |-2
    wait 1
    foreach victim %actor.group%
      if (%victim.level% < 10 && (%victim.gold% < 20) && (%victim.bank% < 20) && (%actor% != %victim%))
        msend %victim% Хозяйка сказала Вам:
        msend %victim% - Эх ты горемычн%victim.w%, голодн%victim.w% наверное, %victim.name%.
        взд
        msend %victim% - У меня для голодного всегда кус хлеба найдется...
        msend %victim% - Сейчас, подожди...
        dgcast 'насыщение' %victim.name%
      end
    done
    *интересно какой мудаг поломал списки... актор груп пуста, если группы нет :(
    if (%actor.level% < 10 && (%actor.gold% < 20) && (%actor.bank% < 20))
      msend %actor% Хозяйка сказала Вам:
      msend %actor% - Эх ты горемычн%actor.w%, голодн%actor.w% наверное, %actor.iname%.
      взд
      msend %actor% - У меня для голодного всегда кус хлеба найдется...
      msend %actor% - Сейчас, подожди...
      dgcast 'насыщение' %actor.iname%
    end

# Trigger #4002
2:
  name: входнапостой
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kGreetPCAll
  script: |-2
    wait 1
    eval factor %self.people%
    while %factor%
      eval pc %factor.NextInRoom%
      if (%factor.vnum% == -1) && (%factor.level%>19) && (%factor.level%<31)
        if %factor.sex%==1
          tell %factor.iname% Вырос ты уже, нечего тебе здесь штаны просиживать.
        else
          tell %factor.iname% Выросла ты уже, нечего тебе здесь юбку просиживать.
        end
        tell %factor.iname% Не пушу я тебя здесь на постой, иди в город, там где большие нужны.
        tell %factor.iname% А от вас только проблемы здесь будут.
        echoaround %factor% Хозяин вытолкнул %factor.vname% на улицу.
        msend %factor.iname% Хозяин вытолкнул вас на улицу.
        mteleport %factor.iname% 4014
        mteleport %factor.iname% 4014
        mteleport %factor.iname% 4014
        mteleport %factor.iname% 4014
        mteleport %factor.iname% 4014
        mteleport %factor.iname% 4014
        mteleport %factor.iname% 4014
        if %factor.sex%==1
          mat 4014 echoaround %factor% Немного взлохмаченный %factor.iname% пришел с запада.
        else
          mat 4014 echoaround %factor% Немного взлохмаченная %factor.iname% пришла с запада.
        end
      end
      if %pc% && %pc%!=%factor%
        makeuid factor %pc%
      else
        unset factor
      end
    done

# Trigger #4003
3:
  name: нападениежителя
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kFight
  script: |-2
    set name2 %actor%
    if %actor.leader%
      set name1 %actor.leader%
      if (%name1.vnum% == -1) && (%actor.vnum% != -1))
        set name2 %actor.leader%
      end
    end
    if !%name2.rentable%
      msend %name2% %self.name% закричал%self.g%: "На твоих руках кровь, выметайся отсюда."
      while %name2.hitp% > 0
        msend %name2% %self.name% СМЕРТЕЛЬHО пнул%self.g% Вас.
        wait 10
        mdamage %name2% 300
      done
      halt
    end
    г %name2.name%, у нас найдется управа на таких обидчиков!
    msend %name2% Вдруг прибежал здоровый парень и оглушил вас.
    echoaround %actor% Прибежал здоровый парень, оглушил %actor.rname% и куда-то уволок.
    wait 1
    msend %name2% Вы потеряли сознание.
    wait 1
    msend %name2% Вы пришли в сознание в глубокой яме от удара о землю.
    if %name2.hitp%>0
      msend %name2% Кто-то сверху сильно руганулся, помянул всех ваших родственников до десятого колена.
      msend %name2% Кто-то сверху сказал: Посиди здесь, пока не успокоишься.
      msend %name2% Да, если хочешь выйти говори: простите меня дурака, может и выпущу.
      mteleport %name2% 4058
      *mat 4058 echoaround %name2% Решетка в яме открылась и %name2.name% упал%name2.a% сверху в яму.
      *mat 4058 echoaround %name2% Кто-то сильно руганулся, помянул всех родственников %actor.rname% до десятого колена.
      *mat 4058 echoaround %name2% Кто-то сверху сказал:
      *mat 4058 echoaround %name2% Посиди здесь пока не успокоишься.
      *wait 1
      *if %name2.sex%==1
      *mat 4058 echoaround %name2% Да, если хочешь выйти говори: простите меня дурака, может и выпущу.
      *else
      *mat 4058 echoaround %name2% Да, если хочешь выйти говори: простите меня дуру, может и выпущу.
      *end
    end

# Trigger #4004
4:
  name: выходаизямы
  attach_type: kRoomTrigger
  narg: 0
  arglist: '"простите меня дурака" "простите меня дуру"'
  trigger_types:
    - kSpeech
  script: |-2
    wait 1
    if %random.4%<2
      echo Решетка в яме открылась, оттуда показалась здоровенная полубритая физиономия.
      echo Ладно, хватит хныкать, выпущу!
      echo В следующий раз думай, прежде чем жителей обижать наших!
      if %actor.hitp%>0
        wteleport %actor.iname% 4000
        echoaround %actor% К решетке подошел здоровый парень, открыл замок.
        echoaround %actor% Поднял решетку и одним движением вытащил кого-то.
        echoaround %actor% Снова повесил массивный замок.
        if (%actor.sex% == 1)
          echoaround %actor% %actor.iname% размял кости, похоже в яме ему было неудобно.
        else
          echoaround %actor% %actor.iname% размяла кости, похоже в яме ей было неудобно.
        end
      end
    else
      echoaround %actor% Никто не прореагировал на слова %actor.rname%.
      wsend %actor% Никто не прореагировал на ваши слова.
      wsend %actor% Наверное не очень искренне все прозвучало, повторите с чувством.
    end

