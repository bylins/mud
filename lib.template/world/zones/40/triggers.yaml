# Trigger #4006
6:
  name: ПКиллер заходит к помощникам
  attach_type: kMobTrigger
  narg: 80
  trigger_types:
    - kGreetPC
  script: |-2
    wait 1
    if %actor.clan% != null
      halt
    end
    if !%actor.agressor%
      halt
    end
    if %actor.agressor% > 4000
      if %actor.agressor% < 4099
        set agr 1
      end
    end
    if %actor.agressor% > 4300
      if %actor.agressor% < 4399
        set agr 1
      end
    end
    if %actor.agressor% > 4800
      if %actor.agressor% < 4899
        set agr 1
      end
    end
    if %agr% == 1
      if %actor.sex% == 1
        крича %actor.iname%, - вот он, убивец, хватай его! Вяжи его!
      else
        крича %actor.iname%, мерзавка, хватай ее! Вяжи ее!
      end
      крича %actor.iname% - вот он%actor.g% где, хватай, ребяты!
      mkill %actor%
    end

# Trigger #4007
7:
  name: Помощник заходик к ПКиллеру
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kIncomePC
  script: |-2
    wait 1
    if %actor.clan% != null
      halt
    end
    foreach char %self.pc%
      if %char.agressor% > 4000
        if %char.agressor% < 4099
          set target %char%
        break
      end
    end
    if %char.agressor% > 4300
      if %char.agressor% < 4399
        set target %char%
      break
    end
    end
    if %char.agressor% > 4800
      if %char.agressor% < 4899
        set target %char%
      break
    end
    end
    done
    if !%target%
      halt
    end
    if %target.sex% == 1
      крича %target.name%, - вот он, убивец, хватай его! Вяжи его!
    else
      крича %target.name%, мерзавка, хватай ее! Вяжи ее!
    end
    крича %target.name% - вот он%target.g% где, хватай, ребяты!
    появ
    mforce %target.name% трепет
    mkill %target%

