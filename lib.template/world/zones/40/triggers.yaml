      say Тебе я уже рассказывал сказку, надо и другим оставить.
      хих
      halt
    elseif ((%actor.class% == 13) && (%actor.skill(сглазить)%))
      say Тебе я уже рассказывал сказку, оставь в покое старого человека.
      вздох
      halt
    end
    set queststart 0
    switch %actor.class%
      case 2
        set queststart 14400
        if (%thiefstory% == 1)
          set queststart -1
        end
        set thiefstory 1
        worlds thiefstory
      break
      case 3
        set queststart 12200
        if (%fighterstory% == 1)
          set queststart -1
        end
        set fighterstory 1
        worlds fighterstory
      break
      case 6
        set queststart 14700
        if (%charmerstory% == 1)
          set queststart -1
        end
        set charmerstory 1
        worlds charmerstory
      break
      case 7
        set queststart 12800
        if (%defendermagestory% == 1)
          set queststart -1
        end
        set defendermagestory 1
        worlds defendermagestory
      break
      case 8
        set queststart 5900
        if (%warlockstory% == 1)
          set queststart -1
        end
        set warlockstory 1
        worlds warlockstory
      break
      case 9
        set queststart 14800
        if (%paladinestory% == 1)
          set queststart -1
        end
        set paladinestory 1
        worlds paladinestory
      break
      case 10
        set queststart 6500
        if (%hunterstory% == 1)
          set queststart -1
        end
        set hunterstory 1
        worlds hunterstory
      break
      case 11
        set queststart 14000
        if (%smithstory% == 1)
          set queststart -1
        end
        set smithstory 1
        worlds smithstory
      break
      case 13
        set queststart 12900
        if (%druidstory% == 1)
          set queststart -1
        end
        set druidstory 1
        worlds druidstory
      break
    done
    if (%queststart% > 0)
      say Сказку... Ну что же, слушай.
      switch %random.3%
        case 1
          say Во времена стародавние, в лета былинные...
        break
        case 2
          say То ли было, то ли не было, толь недавно, толь давнёшенько...
        break
