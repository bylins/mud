# Trigger #4046
46:
  name: приветствуем игрока и предлагаем сыграть
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kGreetPCAll
  script: |-2
    wait 2
    unset bet_change
    detach 4041 %self%
    if %actor.remort% == 0 && %actor.level% < 25
      гов Ты еще слишком неопытен, чтоб играть в этом казино.
      %send% %actor% %self.iname% вышвырнул вас прочь отсюда.
      %teleport% %actor% 4004
      %echoaround% %actor% С дикими воплями   %actor.iname% прилетел%actor.g% снизу.
      halt
    end
    if %actor.remort% <= 5
      eval casino_level 1
      eval bet_step 20000
    elseif %actor.remort% <= 10
      eval casino_level 2
      eval bet_step 100000
    elseif %actor.remort% <= 15
      eval casino_level 3
      eval bet_step 200000
    elseif %actor.remort% <= 20
      eval casino_level 4
      eval bet_step 300000
    elseif %actor.remort% <= 25
      eval casino_level 5
      eval bet_step 600000
    else
      eval casino_level 6
      eval bet_step 1000000
    end
    global casino_level
    global bet_step
    eval bet_level %random.5%
    global bet_level
    eval bet %bet_step%*%bet_level%
    global bet
    if %actor.sex% == 1
      гов Здравствуй, добрый путник.
    elseif %actor.sex% == 2
      гов Здравствуй, добрая путница.
    end
    wait 1s
    switch %casino_level%
      case 1
        гов А ты совсем еще новичок. Ну что ж, давай сыграем!
      break
      case 2
        гов Вижу немного опыта ты поднабрался. Давай значит играть серьезнее.
      break
      case 3
        гов Вижу, что ты давно уже не зеленый новичок,  буду играть с тобой в полсилы.
      break
      case 4
        гов Вижу, ты уже многому научился. Буду значит играть с тобой по-взрослому.
      break
      case 5
        гов Вижу, что ты уже очень опытен, будем играть по-крупному.
      break
      case 6
        гов Великий искатель приключений пожаловал ко мне, буду играть с тобой в полную силу.
      break
    done
    wait 2s
    гов У меня тут ящичек завалялся...
    wait 1s
    дум
    wait 1s
    гов Я отдам тебе то, что лежит внутри него, если ты сыграешь со мной и победишь.
    wait 2s
    гов Но участие не бесплатное, тебе оно обойдется в %bet% кун.
    wait 2s
    гов Правила игры ты можешь прочесть на табличке.
    wait 2s
    гов А если ставка кажется слишком низкой или высокой для тебя, то ты можешь попросить ее повысить или пониззить, сказав мне об этом.
    wait 1s
    гов Вот только сделать это ты сможешь только единожды.
    wait 2s
    гов Если ставка тебя устроит, то скажи мне о том, что мы играем.
    ждать
    attach 4047 %self%

# Trigger #4047
47:
  name: игрок говорит что-то перед началом игры
  attach_type: kMobTrigger
  narg: 100
  arglist: '*'
  trigger_types:
    - kSpeech
  script: |-2
    if %speech% == понизить
      if %bet_change%
        гов Ты уже изменял%actor.g% ставку, больше этого сделать нельзя
        halt
      end
      if %bet_level% == 1
        гов Ставка сейчас и так минимальна.
        halt
      end
      eval bet_level %bet_level%-1
      global bet_level
      eval bet %bet_step%*%bet_level%
      global bet
      гов Хорошо, я понижаю ставку, и теперь она составляет %bet% кун.
      eval bet_change 1
      global bet_change
    elseif %speech% == повысить
      if %bet_change%
        гов Ты уже изменял%actor.g% ставку, больше этого сделать нельзя.
        halt
      end
      if %bet_level% == 5
        гов Ставка сейчас и так максимальна.
        halt
      end
      eval bet_level %bet_level%+1
      global bet_level
      eval bet %bet_step%*%bet_level%
      global bet
      гов Хорошо, я повышаю ставку, и теперь она составляет %bet% кун.
      eval bet_change 1
      global bet_change
    elseif %speech% == играем
      if %actor.gold% < %bet%
        гов Да у тебя ведь не хватает денег, чтоб со мной сыграть. Меня не проведешь!
      else
        %send% %actor% Вы передали %bet% кун %self.dname%.
        %actor.gold(-%bet%)%
        eval player %actor.iname%
        global player
        context 40
        eval bets %bets%+%bet%
        worlds bets
        exec 4040 %self%
        run 4048 %self%
      end
    else
      гов Не отвлекайся: ты хочешь ставку повысить, понизить или может уже играем?
    end

