  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kAuto
  script: |-2
    context 0
    detach 4047 %self%
    while %player%
      charuidall char %player%
      if %char.linkdrop%
        %char.gold(+%bet%)%
        %char.room(4004)%
        unset player_score
        unset deck
        unset bet
        unset bet_step
        unset bet_level
        unset bet_change
        unset casino_level
        detach 4041 %self%
        unset player
      end
      wait 1s
    done

# Trigger #4049
49:
  name: смотрим статистику
  attach_type: kObjTrigger
  narg: 4
  arglist: '*'
  trigger_types:
    - kCommand
  script: |-2
    context 40
    if %cmd.mudcommand% == смотреть || %cmd.mudcommand% == осмотреть || %cmd.mudcommand% == читать
      if %arg.car% == д || %arg.car% == до || %arg.car% == дос || %arg.car% == доск || %arg.car% == доска
        if !%winnings%
          eval winnings 0
          worlds winnings
        end
        if !%losses%
          eval losses 0
          worlds losses
        end
        if !%bets%
          eval bets 0
          worlds bets
        end
        %send% %actor% Всего потрачено денег в казино: %bets% кун.
        %send% %actor% Всего побед в казино: %winnings%.
        %send% %actor% Всего поражений в казино: %losses%.
      else
        return 0
      end
    else
      return 0
    end

