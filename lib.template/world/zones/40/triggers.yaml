# Trigger #4099
99:
  name: Открытие шкатулки
  attach_type: kObjTrigger
  narg: 100
  trigger_types:
    - kKill
  script: |-2
    return 0
    %send% %actor% Вы отперли и тотчас же открыли %self.vname%.
    %echoaround% %actor%   %actor.iname% отпер%actor.q% и тотчас же открыл%actor.q% %self.vname%.
    %echo% Где-то далеко наверху раздалась звонкая музыка.
    eval vnum %number.range(3400,3599)%
    %load% obj %vnum%
    %send% %actor% В шкатулке вы нашли %LoadedUid.vname%.
    %loadeduid.put(%actor%)%
    if %random.100% <= 30
      %send% %actor% Из шкатулки в руки вам прыгнула свинья-копилка.
      %echoaround% %actor% Из шкатулки в руки   %actor.rname% прыгнула свинья-копилка.
      %load% obj 4090
      %loadeduid.put(%actor%)%
    end
    foreach i %actor.objs%
      if %i.vnum% == 4094
        %purge% %i%
      break
    end
    done
    %purge% %self%
