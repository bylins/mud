      if %actor.haveobj(4009)%
        msend %actor% "А коли наскучит сказка, зачитай последнюю страницу чтобы вернуться." - послышался шепот сказочника.
      else
        wait 1
        %purge% %page%
      end
    elseif (%queststart% < 0)
      wait 1s
