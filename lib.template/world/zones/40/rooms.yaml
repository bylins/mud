# Room #4019
19:
  name: Лавка ремесленника
  description: |2
       Богата земля русская самородками умелыми. Посреди избы стоит цвет 
    вальяжный, самоцветными каменьями выложенный. На лавках и стенах разложены 
    и развешаны вещицы самодельные, и для работы, и для увеселения пригожие. А 
    сами стены, да беседы, даже обдверина украшены узором чудным - тут и птица
    райская, и рыба дивная - глаз не отвесть. 
  sector: kCity
  flags:
    - kIndoors
    - kPeaceful
    - kNohorse
  exits:
    - direction: west
      to_room: 4018  # Мастеровая улица

# Room #4020
20:
  name: Скаковая улица
  description: |2
       Расступись, голытьба, едет по улице бравый молодец - то ли воин-богатырь 
    новоявленный, то ли посыльный к князю красному, то ли гонец от самого
    светлейшего. А коль желаешь и сам податься князю в услужение - велико ли 
    дело - ступай по этой улице и иди, под ноги глядючи, и будь дорога твоя
    чистой скатерочкой, ежель язык подвешен умело - и попадешь вскорости в град
    стольный, Киевом нареченный. К востоку расположена хижина охотника.
  sector: kCity
  exits:
    - direction: north
      to_room: 4014  # Базарная площадь
    - direction: east
      to_room: 4002  # Хижина охотника
    - direction: south
      to_room: 4021  # Скаковая улица

