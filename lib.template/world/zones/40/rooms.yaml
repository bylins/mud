# Room #4002
2:
  name: Хижина охотника
  description: |2
       ___Вся хижина состоит из одной комнаты. На расположенных вдоль стен лавках
    постелены звериные шкуры, такие же шкуры, только чуть посвежее, лежат и на
    кровати с пологом, где, по-видимому, спит хозяин. В дальнем конце комнаты
    находится громоздкая каменная печь, в которой тлеют несколько углей.  
  sector: kCity
