# Room #4017
17:
  name: Мастеровая улица
  description: |2
       Как бают люди - жил здесь когда-то Васька Кривой - знатный был умелец по
    кузнечной части. Что коня подковать, что кинжалище справить - все спорилось
    в его руках. С тех пор и повелось - кузнецам, да и прочему мастеровому
    люду селиться в этих местах - авось и улыбнется кому Васькина удача.
    С юга доносится стук кузнечного молота.
  sector: kCity
  exits:
    - direction: north
      to_room: 4062  # Церковь
    - direction: east
      to_room: 4018  # Мастеровая улица
    - direction: south
      to_room: 4030  # Кузня
