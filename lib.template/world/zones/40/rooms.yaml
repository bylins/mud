    в зимнее время скот, чтобы не замерз в лютую стужу, здесь же стоят несколько
    полок с утварью и разложен очаг. Чуть пониже матицы прорублен дымоход.
    Верхняя - середа, где летом спят бабы с детишками, а зимой здесь собирается
    вся семья. 
