# Room #4023
23:
  name: Бабичья улица
  description: |2
       Далеко разнесла людская молва весть о бабке Параскеве, обзывая и волхвицей,
    и вещуньей. Да и то правда - кто еще, окромя нее, сможет и рану затянуть,
