# Rooms for zone 55

# Room #5500
0:
  name: В лесу
  description: |2
    Светлый лес, состоящий в основном из берез и осин, окружил вас. Иногда
    попадаются свежесрубленные пеньки, что указывает на близость человеческого
    жилья. Вдалеке громко прокричал петух.
  sector: kField
  exits:
    - direction: north
      to_room: 5502  # На лугу
    - direction: east
      to_room: 5501  # Дорога на хутор

# Room #5501
1:
  name: Дорога на хутор
  description: |2
       Вы вышли из леса и попали на неприметную дорогу. По ней нечасто ходят и
    тем более ездят, но поддерживают в необходимом для использования состоянии.
    Вдали на севере видны деревянные постройки. Оттуда раздаются рабочие звуки
    и тянет запахом жилища.
  sector: kField
  flags:
    - kNoEntryMob
  exits:
    - direction: north
      to_room: 5503  # Дорога на хутор
    - direction: south
      to_room: 5226  # По лесной дороге
    - direction: west
      to_room: 5500  # В лесу

# Room #5502
2:
  name: На лугу
  description: |2
       Большой луг начинается от леса и заканчивается у хутора. Здесь скорее
    всего пасут хуторяне скот, трава густая и сочная. На земле большие и 
    маленькие следы лежки животных. Встречаются характерные метки от коров и
    овечек, лучше на них не наступать.
  sector: kField
  exits:
    - direction: north
      to_room: 5505  # Перед хутором
    - direction: east
      to_room: 5503  # Дорога на хутор
    - direction: south
      to_room: 5500  # В лесу

# Room #5503
3:
  name: Дорога на хутор
  description: |2
       Дорога стала все более отчетливой. На север показались деревянные постройки,
    окруженные высоким забором. Оттуда раздаются звуки домашних животных и работы
    людей. Вокруг веет запахом растопленной печки.
  sector: kField
  exits:
    - direction: north
      to_room: 5506  # Ворота на хутор
    - direction: east
      to_room: 5504  # На лугу
    - direction: south
      to_room: 5501  # Дорога на хутор
    - direction: west
      to_room: 5502  # На лугу

# Room #5504
