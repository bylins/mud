    ограде, скорее всего здесь место проживания овечек. Сверху над овцами
    устроен насест для кур. Насест отделен настилом. чтобы куры и овцы не
    беспокоили друг друга.
  sector: kCity
  flags:
    - kNoWeather
  exits:
    - direction: south
      to_room: 5513  # На скотном дворе

