# Room #5518
18:
  name: Перед домом
  description: |2
       Широкий двор упирается в дом, с запада остается огород, на восток постройки
    скотного двора. Под ногами земля сплошь выстлана гладко тесаными бревнами,
    среди которых встречаются свежие, недавно заменившие прогнивший настил.
    На север ведет крыльцо в огромный дом, построенный на проживание больше
    десятка людей даже с семьями.
  sector: kCity
  exits:
    - direction: north
      to_room: 5531  # Вход в дом
    - direction: east
      to_room: 5519  # Во дворе
    - direction: south
