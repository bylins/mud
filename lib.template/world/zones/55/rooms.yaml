    - direction: west
      to_room: 5517  # На огороде

# Room #5519
19:
  name: Во дворе
  description: |2
       Вы прошли по деревянному настилу вглубь двора и осмотрелись. Вокруг все
    прибрано и убрано. Хозяин следит за своим добром, дрова аккуратно сложены
    и накрыты навесом от дождя и снега. Части деревянного плуга тщательно
    обмотаны холстиной и стоят в сарае.
  sector: kCity
  exits:
    - direction: east
      to_room: 5520  # Во дворе
    - direction: south
      to_room: 5511  # К скотному двору
    - direction: west
      to_room: 5518  # Перед домом

# Room #5520
20:
  name: Во дворе
  description: |2
       С этого места весь двор виден как на ладони. Крепкие вороты, открывающие
    путь на хутор, низкая ограда, отделяющая двор от огорода. За спиной с одной
    стороны крепкая высокая стена дома. с другой стороны стенка скотного двора,
    с характерным запахом идущим оттуда и звуками животных.
  sector: kCity
  exits:
    - direction: south
      to_room: 5512  # Перед скотным двором
    - direction: west
      to_room: 5519  # Во дворе

# Room #5521
21:
