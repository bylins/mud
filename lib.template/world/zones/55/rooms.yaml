# Room #5508
8:
  name: Во дворе
  description: |2
       Угол двора закрыт с двух сторон высоким крепким внешним забором.
    На север открывается вид на огород, на восток весь двор как на ладони.
  sector: kCity
  exits:
    - direction: north
      to_room: 5516  # На огороде
    - direction: east
      to_room: 5509  # Во дворе

# Room #5509
9:
  name: Во дворе
  description: |2
       Здесь перед забором сделано высокое возвышение, позволяющие прямо из
    двора подняться и посмотреть, что творится перед воротами, не открывая их.
    А при желании и отпугнуть непрошеных гостей бросив камни или стрельнув
    из лука.
  sector: kCity
  exits:
    - direction: north
      to_room: 5517  # На огороде
    - direction: east
      to_room: 5510  # Во дворе
    - direction: west
      to_room: 5508  # Во дворе

# Room #5510
10:
  name: Во дворе
  description: |2
       Вы прошли во двор хутора. Открылся широкий двор, с левой стороны который
    упирается в огород с различными посадками, а справа в скотный двор с животными.
    Вперед двор идет к большому хуторскому дому. Кроме дорожки справа вдоль забора
    и, конечно, огорода, земли под ногами нет, все сплошь выстлано гладко тесанными
    бревнами.
  sector: kCity
  exits:
    - direction: north
      to_room: 5518  # Перед домом
    - direction: east
      to_room: 5511  # К скотному двору
    - direction: south
      to_room: 5506  # Ворота на хутор
      keywords: ворота
      exit_flags: 3
    - direction: west
      to_room: 5509  # Во дворе

# Room #5511
11:
  name: К скотному двору
  description: |2
       На восток от входа на хутор всю землю устилают следы копыт. Здесь и
    следы крупных животных, наверное коров и небольших, скорее всего овец 
    или свиней. Надо внимательно смотреть под ноги, а то можно и попасть
    на большую мину, оставленную коровой или вляпаться в нечто поменьше, но
    с еще более насыщенным ароматом. 
  sector: kCity
  exits:
    - direction: north
      to_room: 5519  # Во дворе
    - direction: east
      to_room: 5512  # Перед скотным двором
    - direction: west
      to_room: 5510  # Во дворе

# Room #5512
12:
  name: Перед скотным двором
  description: |2
       Следы в первую очередь копыт устилают всю землю перед входом в скотный
