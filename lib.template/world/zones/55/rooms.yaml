# Room #5505
5:
  name: Перед хутором
  description: |2
       Высокий забор ограждает хутор со всех сторон. Из-за забора тянет теплом
    человеческого жилища и запахом горячей еды. Вот замычала корова, заблеяли
    овечки и закукарекал петух.
  sector: kField
  exits:
    - direction: east
      to_room: 5506  # Ворота на хутор
    - direction: south
      to_room: 5502  # На лугу

# Room #5506
6:
  name: Ворота на хутор
  description: |2
       Дорога вывела к высокому забору с крепкими воротами. Из-за забора тянет
    теплом человеческого жилища и запахом горячей еды. Вот замычала корова,
    заблеяли овечки и закукарекал петух.
  sector: kField
  flags:
    - kNoEntryMob
  exits:
    - direction: north
      to_room: 5510  # Во дворе
