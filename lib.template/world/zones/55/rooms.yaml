# Room #5548
48:
  name: На дереве
  description: |2
       Взобравшись на срединные крепкие сучки дерева вы обосновались на твердой
    опоре и решили осмотреться. С высоты дерева виден весь двор хутора и можно
    немного заглянуть в окна второго этажа. Но как вы не напрягали зрение, ничего
    интересного не увидели. Жаль. Надо теперь или спускаться или подниматься 
    наверх, все-таки вы не птица сидеть долго на суку.
  sector: kCity
  flags:
    - kNohorse
  exits:
    - direction: up
      to_room: 5549  # На дереве
    - direction: down
      to_room: 5528  # У дерева

# Room #5549
49:
  name: На дереве
  description: |2
    Ну куда меня занесло, на самые верхние сучки дерева. Да отсюда упасть и
    удариться о землю делать нечего и притом ударится нехило. Конечно, вид на весь
    хутор и окружающий лес отсюда просто великолепный, но надо быть аккуратнее и
    долго здесь не задерживаться.  
  sector: kCity
  exits:
    - direction: down
      to_room: 5548  # На дереве
