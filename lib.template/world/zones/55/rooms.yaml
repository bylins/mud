  name: В доме
  description: |2
       Крепкий дом построен из толстенных бревен в обхват взрослого человека.
    Не совсем ровные углы, по минимуму обработки, дом внушает в первую очередь
    уверенность в крепости и надежности. Узкие окна, чтобы ни человек, ни зверь
    не смог пролезть пропускают немного света. Низкие потолки, чтобы меньше
    обогревать в стужу.
  sector: kCity
  flags:
    - kNoMagic
    - kForMages
    - kForSorcerers
    - kForPaladines
    - kForMaguses
    - kNoWeather
  exits:
    - direction: east
      to_room: 5534  # Комната хозяина
    - direction: south
      to_room: 5532  # В доме

# Room #5534
34:
  name: Комната хозяина
  description: |2
       Крепкий стол посередине и высокий стул, вот что в первую очередь бросается
    в глаза. Шкура огромного медведя с оскаленной пастью накрывает стул так, что
    голова медведя оказывается выше спинки. В углу комнаты стоит большой кованный
    сундук. Толстые полосы железа скрепляют сундук и гарантируют защиту содержимого
    от лихих людей.
  sector: kCity
  flags:
    - kForWarriors
    - kForAssasines
    - kForGuards
    - kForRangers
    - kForge
    - kForMerchants
    - kNoWeather
  exits:
    - direction: south
      to_room: 5527  # В доме
    - direction: west
      to_room: 5533  # В доме

# Room #5535
35:
  name: В доме
  description: |2
       Вы прошли дальше в дом и попали в темный коридор, ведущий в жилые
    помещения. Трудно что-либо рассмотреть под ногами, кроме инструмента,
    лежащего в углу, и о который вы только что зацепились ногами и подняли
    страшный грохот.
  sector: kCity
  flags:
    - kDarked
    - kNoWeather
  exits:
    - direction: east
      to_room: 5538  # На полатях
    - direction: west
      to_room: 5531  # Вход в дом

