# Trigger #5507
7:
  name: дали хозяину
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kReceive
  script: |-2
    wait 1
    switch %object.vnum%
      case 5051
        wait 1
        mpurge %object%
        %actor.setquest(5000)%
        emot взглянул на вас и принялся внимательно читать письмо.
        wait 1s
        say Спасибо, что принес весточку от родича. Давно я к ним не хаживал.
        взд
        echo  - Тогда буду считать твою службу исполненной!
        say Что-то ноги отниматься стали. Знахарь наш какое-то зелье готовит, оно вроде и помогает...
        echo _- Да только он сам признается - не будет в зелье силы без нужных добавок.
        echo _- А найти их он не может, стар уже по лесам да полям бегать.
        wait 2
        say Вот что, родич пишет, что ты работу подрядился выполнить?
        echo _- Значит и найди их.
        echo _- Принеси мне уши старой лисы, перепелиные перья, да сало барсучье.
        echo _- Тогда буду считать твою службу исполненой!
      break
      *перья
      case 5414
        wait 1
        mpurge %object%
        say Хм... как раз та вещь, которую знахарь просил...
        if !%actor.quested(5000)%
          say Я тебе не поручал ее искать, но все равно благодарствую
          halt
        end
        %actor.setquest(5001)%
        if %actor.quested(5001)% && %actor.quested(5002)% && %actor.quested(5003)%
          set questor5501 %actor%
          global questor5501
          exec 5508 %self%
          halt
        end
        say ну что же, благодарствую... Но еще кой-чего не хватает - сходи поищи.
      break
      *уши
      case 4713
        wait 1
        mpurge %object%
        say Хм... как раз та вещь, которую знахарь просил...
        if !%actor.quested(5000)%
          say Я тебе не поручал ее искать, но все равно благодарствую
          halt
        end
        %actor.setquest(5002)%
        if %actor.quested(5001)% && %actor.quested(5002)% && %actor.quested(5003)%
          set questor5501 %actor%
          global questor5501
          exec 5508 %self%
          halt
        end
        say ну что же, благодарствую... Но еще кой-чего не хватает - сходи поищи.
      break
      *сало
      case 5517
        wait 1
        mpurge %object%
        say Хм... как раз та вещь, которую знахарь просил...
        if !%actor.quested(5000)%
          say Я тебе не поручал ее искать, но все равно благодарствую
          halt
        end
        %actor.setquest(5003)%
        if %actor.quested(5001)% && %actor.quested(5002)% && %actor.quested(5003)%
          set questor5501 %actor%
          global questor5501
          exec 5508 %self%
          halt
        end
        say ну что же, благодарствую... Но еще кой-чего не хватает - сходи поищи.
      break
      case 5508
        wait 1
        mpurge %object%
        if %exist.obj(5514)%
          calcuid vobj 5514 obj
          снять %vobj.name%
        end
        *mpurge %vobj%
        wait 1s
        say Молодец! Наконец-то нашлась на них управа.
        say Надеюсь они не вернутся?
        echo Хозяин глубокомысленно посмотрел на вашу одежду, всю в пятнах крови.
        say Спасибо, ты выручил нас.
        echo Хозяин отошел к сундуку, открыл его.
        switch %random.6%
          case 1
            if %world.curobjs(5503)% < 4
              load obj 5503
              дать меч %actor.iname%
            else
              %self.gold(+300)%
              дать 300 кун %actor.iname%
            end
          break
          case 2
            if %world.curobjs(5504)% < 2
              load obj 5504
              дать доспехи %actor.iname%
            else
              %self.gold(+300)%
              дать 300 кун %actor.iname%
            end
          break
          case 3
            if %world.curobjs(512)% < %world.maxobj(512)%
              load obj 512
              дать книга %actor.iname%
            else
              %self.gold(+300)%
              дать 300 кун %actor.iname%
            end
          break
          case 4
            if %world.curobjs(500)% < %world.maxobj(500)%
              load obj 500
              дать книга %actor.iname%
            else
              %self.gold(+300)%
              дать 300 кун %actor.iname%
            end
          break
          case 5
            if %world.curobjs(200)% < %world.maxobj(200)%
              load obj 200
              дать рун %actor.iname%
            else
              %self.gold(+300)%
              дать 300 кун %actor.iname%
            end
          break
          default
            load obj 16023
            дать чекушк %actor.iname%
          break
        done
        %actor.questbodrich(5)%
        say Это все, чем я смогу тебя отблагодарить, так что извини.
      break
      default
        eval getobject %object.name%
        drop %getobject.car%.%getobject.cdr%
      break
    done

# Trigger #5508
8:
  name: Хозяин дает письмо
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kAuto
  script: |-2
    wait 1
    say Вот, теперь знахарь сварит сильное зелье, авось скоро сам племяшку увижу!
    echo _- А пока на вот, отнеси им.
    emot потянулся к сундуку и достал из него маленький клочок бересты
    load obj 5518
    дать вест .%questor5501.name%
    drop вест
