      echo &WИз &MС&Gу&Bм&Yк&Cи &Wс &Bвеселыми котятами &Wраздалось &Rжалобное мяуканье&n.
      halt
    end
    *одели сумку-тик
    osend %actor% &WИз &MС&Gу&Bм&Yк&Cи &Wс &Bвеселыми котятами &Wвыглянул %word% котёнок&n &Wи, &Bвесело захихикав&n, &Wпощекотал Вам ухо языком&n.
    osend %actor% &WВы погладили котёнка и ласково затолкали его обратно&n.
    echoaround %actor% &WИз &MС&Gу&Bм&Yк&Cи &Wс &Bвеселыми котятами &Wвыглянул %word% котёнок &Wи, &Bвесело захихикав&n, &Wпрошептал что-то на ухо %actor.dname%&n.
