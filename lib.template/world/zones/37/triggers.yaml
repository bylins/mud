# Trigger #3708
8:
  name: Именной стаф - Херуба
  attach_type: kObjTrigger
  narg: 100
  trigger_types:
    - kGreet
    - kReceive
    - kDamage
  script: |-2
    if ((%actor.level% > 30) && (%actor.vnum% == -1))
      halt
    end
    if %actor.iname% != Херуба
      otransform 3708
      osend %actor% Поверхность &cзеркала&n затуманилась и в нем Вы увидели страшных чудовищ! В ужасе Вы отпрянули!
      return 0
      halt
    else
      wait 1
      if %random.num(10)% > 8
        osend %actor% &cБольшое пребольшое зеркало&n блеснуло в лучах солнца.
        echoaround %actor% Отражение %actor.rname% в большом пребольшом зеркале скорчило Вам гримасу.
      else
        set selfnum 0
        set num 0
        foreach i %self.pc%
          eval num %num%+1
        done
        set ranofself %random.num(%num%)%
        foreach n %self.pc%
          eval selfnum %selfnum%+1
          if %ranofself% == %selfnum%
            set char %n%
          break
        end
      done
      if %char.name% != %actor.iname%
        echoaround %char% %char.iname% ослеплен%char.g% отблеском солнца в &cбольшом пребольшом зеркале&n, которое зачем-то носит с собой %actor.iname%.
        osend %char% Луч солнца, отраженный в &cбольшом пребольшом зеркале&n %actor.rname%, ослепил вас!
      else
        echoaround %actor% %actor.iname% начал%actor.g% прихорашиваться перед &cбольшим пребольшим зеркалом&n.
        osend %actor% Вы начали прихорашиваться перед &cбольшим пребольшим зеркалом&n.
      end
    end
    end

