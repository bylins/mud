# Trigger #3713
13:
  name: Именной стафф - Татиана
  attach_type: kObjTrigger
  narg: 100
  trigger_types:
    - kGreet
    - kReceive
    - kHitPercent
    - kDamage
  script: |-2
    if ((%actor.level% > 30) && (%actor.vnum% == -1))
      halt
    end
    if %actor% && ((%actor.iname% != Татиана) && (%actor.iname% != Ордан) && (%actor.iname% != Ольша) && (%actor.iname% != Фока))
      osend %actor%  __Взяв в руки &YЛукошко&n Вы заметили &Wбелый флажок&n с надписью: "Вернуть по
      osend %actor%  _адресу: МПМ Былины, замок ДСС, Татиана."
      echoaround %actor%  Из &YЛукошка&n выпал &Wбелый флажок&n с надписью: 'Вернуть по адресу: МПМ Былины, замок ДСС, Татиана.'
      return 0
      halt
    end
    set master %self.WornBy%
    wait 1
    *срабатывает только при взятии сумки
    if (%self.carriedby% && %actor% && !%master%)
      osend %actor% &YЛукошко&n распахнулось, слегка непонятное существо
      osend %actor% __(а это был местный &WСолнечный кролик&n) вцепилось Вам в шею.
      echoaround %actor% &YЛукошко&n распахнулось, слегка непонятное существо
      echoaround %actor%   (а это был местный &WСолнечный кролик&n) вцепилось в шею %actor.dname%.
      halt
    end
    *при снятии сумки
    if (!%self.WornBy% && %actor% && %self.carriedby% && %master%)
      echo _&YЛукошко&n недовольно фыркнуло.
      halt
    end
    *при надевании сумки и по тику
    echo _&WСолнечный кролик&n выглянул из &YЛукошка&n и весело захлопал стремными ушами!

