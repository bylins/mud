# Trigger #3700
0:
  name: Именной стафф - Ронари
  attach_type: kObjTrigger
  narg: 100
  trigger_types:
    - kGreet
    - kReceive
    - kDamage
  script: |-2
    if (%actor.level% > 30 ) && (%actor.vnum% == -1 )
      halt
    end
    if ((%actor.iname% != Ронари) && (%actor.iname% != Бридт) && (%actor.iname% != Хэйсар))
      osend %actor% _Рот выковырял &Kгрязь&n из &Wзуба&n и кинул ее в Вас!
      return 0
      halt
    else
      wait 1
      echo _&rРот&n начал интенсивно работать.
    end

