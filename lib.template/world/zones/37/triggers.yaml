# Trigger #3776
76:
  name: Именной стаф - Младин
  attach_type: kObjTrigger
  narg: 100
  trigger_types:
    - kDeath
    - kGreet
    - kReceive
    - kHitPercent
    - kDamage
  script: |-2
    if ((%actor.level% > 30) && (%actor.vnum% == -1))
      halt
    end
    switch %random.8%
      case 1
        set word &GЗеленый&n
      break
      case 2
        set word &RКрасный&n
      break
      case 3
        set word &BСиний&n
      break
      case 4
        set word &WБелый&n
      break
      case 5
        set word &YЖелтый&n
      break
      case 6
        set word &CГолубой&n
      break
      case 7
        set word &KСерый&n
      break
      case 8
        set word &MПурпурный&n
    done
    if ((%actor.iname% != Младин) && (%actor.iname% != Алина) && (%actor.iname% != Огонек) && (%actor.iname% != Лавале) && (%actor.iname% != Лакидар))
      otransform 3776
      osend %actor% &WИз &MС&Gу&Bм&Yк&Cи &Wс &Bвеселыми котятами &Wвыбрался &Bвесело хихикающий&n %word% котёнок.
      osend %actor% &Wобойдя Вас по кругу, котёнок &Mулыбнулся &Wи не прекращая &Bхихикать &Wзалез обратно в &MС&Gу&Bм&Yк&Cу&n.
      echoaround %actor% &WИз &MС&Gу&Bм&Yк&Cи &Wс &Bвеселыми котятами &Wвыбрался &Bвесело хихикающий&n %word% котёнок.
      echoaround %actor% &Wобойдя %actor.vname% по кругу, котёнок &Mулыбнулся &Wи не прекращая &Bхихикать залез обратно в &MС&Gу&Bм&Yк&Cу&n.
      return 0
      halt
    end
    set master %self.WornBy%
    wait 1
    *взяли сумку
    if (%self.carriedby% && %actor% && !%master%)
      osend %actor% %word% котёнок &Wвысунул голову из &MС&Gу&Bм&Yк&Cи &Wи&n радостно замурлыкал увидев Вас.
      echoaround %actor% %word% котёнок &Wвысунул голову из &MС&Gу&Bм&Yк&Cи &Wи&n радостно замурлыкал увидев %actor.vname%.
      halt
    end
    *сняли сумку
