      to_room: 5304  # Неприметная тропа
    - direction: south
      to_room: 5301  # Шалаш
      keywords: шалаш
      exit_flags: 3

# Room #5304
4:
  name: Неприметная тропа
  description: |2
       Маленькая неприметная тропа образовалась в лесочке. Помятая трава,
    сломанные ветки деревьев на высоте полутора сажен, явно указывают на
    людей, но небольшого роста или детей.
  sector: kField
  exits:
    - direction: east
      to_room: 5302  # На тропинке
    - direction: west
      to_room: 5303  # У шалаша

# Room #5305
5:
  name: Тропинка к опушке
  description: |2
