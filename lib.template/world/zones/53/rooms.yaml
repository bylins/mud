# Rooms for zone 53

# Room #5300
0:
  name: К опушке
  description: |2
       От лесной дороги ответвляется небольшая тропинка к лесной опушке. Сюда
    не боятся отпускать самых малых детей, чтобы ягоды и грибы собирали, изучали
    родной лес.
  sector: kField
  flags:
    - kNoEntryMob
  exits:
    - direction: north
      to_room: 5302  # На тропинке
    - direction: south
      to_room: 5214  # Прилесок

# Room #5301
1:
  name: Шалаш
  description: |2
       Искусно сложенный из ивовых прутьев шалаш хорошо защищает от ветра
    и дождя. Похоже, деревенские детишки любят здесь устраивать посиделки и
    проводить время.
  sector: kField
  flags:
    - kNoEntryMob
    - kIndoors
    - kPeaceful
    - kForMages
    - kForSorcerers
    - kForThieves
    - kForWarriors
    - kForAssasines
    - kForGuards
    - kForPaladines
    - kForRangers
    - kForPoly
    - kForge
    - kForMerchants
    - kForMaguses
    - kNohorse
    - kNoWeather
  exits:
    - direction: north
      to_room: 5303  # У шалаша
      keywords: шалаш
      exit_flags: 3

# Room #5302
2:
  name: На тропинке
  description: |2
       Тропинка ведет к светлой опушке. Сюда обычно заходят дети и женщины за
    ягодами и грибами.
  sector: kField
  exits:
    - direction: north
      to_room: 5305  # Тропинка к опушке
    - direction: south
      to_room: 5300  # К опушке
    - direction: west
      to_room: 5304  # Неприметная тропа

# Room #5303
3:
  name: У шалаша
  description: |2
       Маленькая неприметная тропка привела к шалашу. Шалаш маленький и не сразу
    заметен на фоне окружающей листвы.
  sector: kField
  flags:
    - kNoEntryMob
  exits:
