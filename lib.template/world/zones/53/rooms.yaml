  sector: kField
  flags:
    - kNoEntryMob
  exits:
    - direction: north
      to_room: 5306  # Опушка
    - direction: south
      to_room: 5302  # На тропинке

# Room #5306
6:
  name: Опушка
  description: |2
       Красивая опушка открывается вашему взору. Летом здесь вовсю буйствуют цветы,
    кружит голову запах ягод и грибов. Зимой тишина и скрип снега под ногами, следы
