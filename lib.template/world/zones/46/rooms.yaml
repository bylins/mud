# Room #4626
26:
  name: Одиноко стоящая сосна
  description: |2
    ___Вместе с окрестным лесом широкая поляна изгибается вниз, вниз, как изогнутый
    щит, и падает, поглощенная лесистым яром. У самого обрыва, сторожем стоит
    одинокая сосна. Распустив корни поверху, главный она посылает вниз, как
    продолженье себя под землей. И бурелом, ломая остальные деревья, не может ее
