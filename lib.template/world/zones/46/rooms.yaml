# Room #4638
38:
  name: Темный лес
  description: |2
    ___Ели стоят - вверх посмотришь - шапка с головы сама падает. Под каждой елью
    круговое углубленье, сидит ель, как в лунке, потому что сама под себя хвою не
    роняет, не доходит хвоя через сучья. Тихо. Ветер поверху шуршит, а вниз тоже
    не может пробраться, и шуршанье его по вершинам вниз падает не в голос, а
    шепотом. <summerday>R Ели стоят - вверх посмотришь - шапка с головы сама
    падает. Хвоя на аршин лежит и под ногой пружинит, как тетива. Под каждой елью
    круговое углубленье, сидит ель, как в лунке, потому что сама под себя хвою не
    роняет, не доходит хвоя через сучья. Пусто внизу, солнце не дотянется, ничего
    не растет, кое-где гриб увидишь или кустик костяники. Тихо. Ветер поверху
    шуршит, а вниз тоже не может пробраться, и шуршанье его по вершинам вниз падает
