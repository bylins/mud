# Trigger #203
3:
  name: начисление опыта за квесты
  attach_type: kRoomTrigger
  narg: 100
  trigger_types:
    - kAuto
  script: |-2
    *вызываемый триггер прикреплен к комнате 203
    *вызываемый триггер ограничивает получение опыта за указанный квест временным интервалом
    *в вызывающем триггере необходимо указать переменные, описанные ниже
    *owner: владелец вызывающего триггера, обычно self
    *char: кому начислить опыт, обычно actor
    *questnum: номер квеста, для которого начислить опыт
    *exp: количество выдаваемого опыта
    *через сколько секунд давать опыт за этот квест в следующий раз
    set kooldown 21600
    if !%owner%
      log При вызове не определено значение owner!
      halt
    end
    if %what.is(%owner%)% == 0
      log При вызове значение owner =%owner% не является uid комнаты, объекта или моба!
      halt
    end
    if !%questnum%
      log При вызове из %what.is(%owner%)% vnum =%owner.vnum% не указано значение questnum!
      halt
    end
    if %questnum% < 1
      log При вызове из %what.is(%owner%)% vnum =%owner.vnum% значение questnum =%questnum% < 1!
      halt
    end
    eval zone_num %questnum%/100
    eval dif %questnum% - (%zone_num%*100)
    set orig %world.isDungeon(%zone_num%)%
    if %orig%
      set questnum %orig%%dif%
    end
    if !%char%
      log При вызове из %what.is(%owner%)% vnum =%owner.vnum% не указано значение char!
      halt
    end
    if %what.is(%char%)% != char
      log При вызове из %what.is(%owner%)% vnum =%owner.vnum% значение в char =%char% не является uid персонажа!
      halt
    end
    if !%exp%
      log При вызове из %what.is(%owner%)% vnum =%owner.vnum% не указано значение exp!
      halt
    end
    if %exp% < 1
      log При вызове из %what.is(%owner%)% vnum =%owner.vnum% значение exp =%exp% < 1!
      halt
    end
    eval max_exp (%char.MaxGainExp%/2)*(10+%char.remort%)
    if %exp% > %max_exp%
      log При вызове из %what.is(%owner%)% vnum =%owner.vnum% в квесте %questnum% exp =%exp% > половины текущего уровня чара %char.iname% =%max_exp%!
      eval exp %max_exp%
    end
    set list %char.getquest(203)%
    if %list%
      set quest_index %array.find(%list%, %questnum%)%
    end
    if %quest_index%
      eval time_index %quest_index%+1
      set time %array.item(%list%,%time_index%)%
      eval time2 %date.unix%-%time%
      if %time2% <= %kooldown%
        send %char% Недавно вы уже получали опыт за выполнение этого задания.
        halt
      end
      set list %array.remove(%list%, %time_index%)%
      set list %array.remove(%list%, %quest_index%)%
      set list %list.trim%
    end
    %send% %char% За выполнение задания вы получили %exp% опыта!
    log При вызове из %what.is(%owner%)% vnum =%owner.vnum% начисляем чару %char.iname% %exp% опыта в квесте %questnum%!
    while %exp% > 0
      if %char.MaxGainExp% < %exp%
        eval gain_exp %char.MaxGainExp%
      else
        eval gain_exp %exp%
      end
      %char.exp(+%gain_exp%)%
      eval exp %exp%-%gain_exp%
    done
    set list %list% %questnum% %date.unix%
    set list %list.trim%
    %char.setquest(203 @%list%)%

