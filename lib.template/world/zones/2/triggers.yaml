# Triggers for zone 2

# Trigger #200
0:
  name: 'Процедура загрузки случайного предмета из списка (параметры: listvnum - список, miw - максвмире)'
  attach_type: kRoomTrigger
  narg: 100
  trigger_types:
    - kAuto
  script: |-2
    set checkofnum
    foreach check %listvnum%
      if %world.curobjs(%check%)% < %miw%
        set checkofnum %checkofnum% %check%
      end
    done
    eval rnd %checkofnum.words%
    if %rnd% > 0
      eval loaditem %array.item(%checkofnum%, %random.num(%rnd%)%)%
      %load% obj %loaditem%
    else
      %echo% Бананы кончились...
    end

# Trigger #201
1:
  name: Процедура загрузки случайного предмета из списка
  attach_type: kRoomTrigger
  narg: 100
  trigger_types:
    - kAuto
  script: |-2
    *параметр listvnum - список внумов предметов
    *вернет loaditem - внум выбранного доступного для загрузки предмета
    if !%owner%
      log При вызове не определено значение owner!
      halt
    end
    rdelete loaditem %owner%
    set checkofnum
    foreach check %listvnum%
      if %world.CanBeLoaded(%check%)%
        if %world.maxobjs(%check%)% < 1000
          *log %check% в лоаде, curobjs =%world.curobjs(%check%)%, maxobjs =%world.maxobjs(%check%)%
        end
        set checkofnum %checkofnum% %check%
      end
    done
    set checkofnum %checkofnum.trim%
    eval rnd %array.item(%checkofnum%)%
    if %rnd% > 0
      eval loaditem %array.item(%checkofnum%, %random.num(%rnd%)%)%
      if %loaditem%
        remote loaditem %owner%
      end
    end

# Trigger #202
2:
