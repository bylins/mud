        set list %array.remove(%list%, %i%)%
        set list %array.remove(%list%, %i%)%
        set list %list.trim%
        set size %array.item(%list%)%
      else
        eval i %i% + 2
      end
    done
    %char.setquest(207 @%list%)%

# Trigger #217
17:
  name: чармис не умирает в данже
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kDamage
  script: |-2
    eval zone %self.realroom%/100
    if %zone% < 30000
      detach 217 %self%
      halt
    end
    context %zone%
    if %dungeon_entrance%
      set entrance %dungeon_entrance%
