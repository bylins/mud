# Trigger #218
18:
  name: проверяем количество мобов в зоне
  attach_type: kMobTrigger
  narg: 100
  arglist: гдемобы
  trigger_types:
    - kCommand
  script: |-2
    eval current_zone %self.realroom% / 100
    if %current_zone% < 30000
      send %actor% Сначала войдите в данж.
      halt
    end
    context %current_zone%
    set zones %current_zone%
    if %dungeon_complex%
      set zones %zones% %dungeon_complex.cdr%
    end
    set n 1
    foreach zone %zones%
      set mobs %world.zonenpc(%zone%)%
      set mobs_size %array.item(%mobs%)%
      if %mobs_size% < 1
        continue
      end
      set i 0
      while %i% < %mobs_size%
        eval i %i% + 1
        set mob %array.item(%mobs%, %i%)%
        if %mob.vnum% < 3000000 || %mob.mobflag(!убить)% || %mob.mobflag(!сражается)% || %mob.mobflag(появл.зимой)% || %mob.mobflag(появл.весной)% || %mob.mobflag(появл.летом)% || %mob.mobflag(появл.осенью)% || %mob.mobflag(появл.полнолуние)%
          continue
        end
        set mobroom %mob.room%
        if (%mobroom.flag(мирная)% || %mobroom.flag(нельзя атаковать)%) && %mob.mobflag(!ходит)%
          continue
        end
        send %actor% %n%. %mob.iname% (%mob.vnum%) в комнате %mobroom.name% (%mobroom.vnum%).
        eval n %n%+1
      done
      wait 1
    done
    if %n% == 1
      send %actor% Все соперники повержены.
    end
