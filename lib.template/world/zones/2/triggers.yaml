      сказ %actor.iname% Да добавить не забудь, хочется тебе очень легко, легко, обычно, сложно, очень сложно или невозможно.
    else
      сказ %actor.iname% Да добавить не забудь, хочется тебе легко, обычно, сложно или невозможно.
    end
    сказ %actor.iname% Иначе сложность прогулки я выберу сам.

# Trigger #214
14:
  name: желаем пройти в данж
  attach_type: kMobTrigger
  narg: 100
  arglist: '*'
  trigger_types:
    - kSpeech
  script: |-2
    set word %speech.car%
    if %word% == готово || %word% == сделано || %word% == да
      run 215 %self%
    end
    if %word% != хочу && %word% != желаю
      halt
    end
    context 2
    if %date.unix% == %timestamp%
      сказ %actor.iname% Не видишь что ли? Занят я!
      руг
      halt
    end
    %actor.wait(1)%
    set dwords %speech.cdr%
    eval zone_num %self.realroom%/100
    if %world.isDungeon(%zone_num%)%
      halt
    end
    set timestamp %date.unix%
    global timestamp
    set pc %actor.iname%
    if %dungeons%
      set name_index %array.find(%dungeons%, %pc%)%
    end
    if !%name_index%
      eval kd %date.unix% - %actor.getquest(208)%
      if %kd% < 30
        сказ %pc% Погуляй пока, потом подойдёшь.
        halt
      end
      set LoadMob 1
      set owner %self%
      set char %actor%
      if %self.vnum% == 116
        if %dwords% == очень легко
          set difficulty -2
        elseif %dwords% == легко
          set difficulty -1
        elseif %dwords% == обычно
          set difficulty 0
        elseif %dwords% == сложно
          set difficulty 1
        elseif %dwords% == очень сложно
          set difficulty 2
        elseif %dwords% == невозможно
          set difficulty 3
        else
          set difficulty %number.range(-2, 3)%
        end
      else
        if %dwords% == легко
          set difficulty 1
        elseif %dwords% == обычно
          set difficulty 2
        elseif %dwords% == сложно
          set difficulty 3
        elseif %dwords% == невозможно
          set difficulty 4
        end
      end
      *eval dungeon %self.realroom%/100
      set time 120
      if %self.vnum% == 116
        set recalc 1
      end
      exec 207 %world.room(203)%
    end
    wait 1s
    if %dungeons%
      set name_index %array.find(%dungeons%, %pc%)%
    end
    if %name_index%
      сказ %pc% Ну пойдём, коль не шутишь, тут недалеко.
      eval zone_index %name_index%+1
      set zone %array.item(%dungeons%, %zone_index%)%
      context %zone%
      set entrance %dungeon_entrance%
      set group %actor.group%
      if !%group%
        set group %actor%
      end
      echo тестовое сообщение, список группы :
      foreach i %group%
        syslog в группе состоит '%i.name%'
        echo '%i.name%'
      done
      echo - если не совпадает сообщите Стрибу еще список по UID %group%
      foreach i %group%
        load obj 1341
        дать свиток.возврата .%i.iname%
        echoaround %i% %i.iname% утопал%i.g% в неизвестном направлении.
        syslog entrance == '%entrance%'
        teleport %i% %entrance% horse
      done
      %actor.setquest(208 %date.unix%)%
      сказ %pc% Не забудь сказать, что всё готово, как вернешься.
      if %LoadMob%
        at %entrance% load mob %self.vnum%
      end
    end

# Trigger #215
15:
  name: закрываем данж у моба
  attach_type: kMobTrigger
  narg: 100
  trigger_types:
    - kAuto
  script: |-2
    %actor.wait(1)%
    context 2
    if %dungeons%
      set pc %actor.iname%
      set name_index %array.find(%dungeons%, %pc%)%
    end
    if !%name_index%
      halt
    end
    eval zone_index %name_index%+1
    set dungeon %array.item(%dungeons%, %zone_index%)%
    eval current_zone %self.realroom%/100
    if !%world.isdungeon(%dungeon%)%
      halt
    end
    хлоп
    сказ %pc% Вот и замечательно! Давай посмотрим, хорошо ли ты справил%actor.u%.
    дум
    context %dungeon%
    set i 0
    while !%dungeon_calc_enemies_started%
      wait 1
      eval i %i%+1
      if %i% == 500
        set i 0
      break
    end
    done
    чес
    wait 1
    while !%dungeon_calc_enemies_finished%
      wait 1
      eval i %i% + 1
      if %i% == 500
      break
    end
    done
    if %self.realroom% != %actor.realroom%
      halt
    end
    eval killed_enemies %dungeon_enemies_max% - %dungeon_enemies_current%
    eval killed_bosses %dungeon_bosses_max% - %dungeon_bosses_current%
    eval time_total %date.unix% - %dungeon_toc%
    eval hours %time_total%/3600
    eval minutes (%time_total% - (%hours% * 3600)) / 60
    eval seconds (%time_total% - (%hours% * 3600)) - (%minutes% * 60)
    if %hours% < 10
      set hours 0%hours%
    end
    if %minutes% < 10
      set minutes 0%minutes%
    end
    if %seconds% < 10
      set seconds 0%seconds%
    end
    send %actor% Время прохождения: %hours%:%minutes%:%seconds%.
    send %actor% Убито соперников: %killed_enemies%/%dungeon_enemies_max%.
    if %dungeon_bosses_max% > 0
      send %actor% Из них боссов: %killed_bosses%/%dungeon_bosses_max%
    end
    wait 1
    сказ %pc% Ладно, ступай...
    set zones %dungeon%
    if %dungeon_complex%
      set zones %zones% %dungeon_complex.cdr%
    end
    foreach zone %zones%
      foreach i %world.zoneChar(%zone%)%
        send %i% %self.iname% отвесил%self.g% вам хорошего пинка, и...
        teleport %i% %dungeon_exit%
        at %dungeon_exit% echoaround %i% %i.iname% внезапно упал%i.g% с небес.
      done
    done
    context 2
    set owner %self%
    set char %actor%
    set DeleteDungeon 1
    exec 209 %world.room(203)%

# Trigger #216
16:
  name: очистка квеста 207
  attach_type: kRoomTrigger
  narg: 100
  trigger_types:
    - kAuto
  script: |-2
    context 2
    *очищаем старые записи об открытых данжах
    *вспомогательная процедура для триггера 207
    set list %char.getquest(207)%
    set i 1
    set size %array.item(%list%)%
    while %i% < %size%
      eval j %i% + 1
      set toc %array.item(%list%, %j%)%
