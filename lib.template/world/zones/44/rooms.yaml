# Rooms for zone 44

# Room #4400
0:
  name: Посыльная дорога
  description: |2
    ___Лесная дорога то расширится, то сузится так, что два коня рядом едва
    проходят. Жилистые корни, крепкие, как костяные пальцы, сплетаются на
    виду, живые, хоть и обнаженные от земляной одежки. Кое-где можно заметить
    след колеса - кора сорвана, древесина гладка, будто отполирована, и на ней
    темный узел - сустав. На западе, у самой земли, несколько веток надломлено,
    причем совсем недавно.
  sector: kField
  exits:
    - direction: north
      to_room: 4213  # Посыльная дорога
    - direction: east
      to_room: 4416  # Среди вековых деревьев
      exit_flags: 16
    - direction: south
      to_room: 4401  # Посыльная дорога
    - direction: west
      to_room: 4448  # На опушке

