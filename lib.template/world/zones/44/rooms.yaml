# Room #4427
27:
  name: Поляна
  description: |2
    ___Деревья обрамляют поляну ровной стеной, сразу обличая руку человека.
    На северном краю поляны поднимается холм, круто и полумесяцем срезанный
    со сторон, открытых к поляне. К срезу холма пристроен неширокий навес,
    опиравшийся спереди на бревенчатые столбы. Этот особенный дом, без передней
    стены, узкий и длинный, изогнутый, как бы ушедший под холм, годится людям
    только как временный приют, ибо люди здесь не хозяева, а лишь гости.
    Потому-то и называются священные места славян, погостами. Хозяева же и
    владыки здесь - боги.
  sector: kField
  exits:
    - direction: north
      to_room: 4439  # Погост
