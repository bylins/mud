# Room #4415
15:
  name: Среди вековых деревьев
  description: |2
    ___Башни деревьев кажутся поставленными нарочно, рукой архитектора. Могучи
    дерева. Глянешь вверх, и кажется, что корявые ветви деревьев лезут в самое
    небо.
    <springday> Трепещущие листья окаймляют разрывы в вершинах деревьев, над ними бегут
    серые тучи.
    <springday>
    <springnight> Трепещущие листья окаймляют разрывы в вершинах деревьев, над ними бегут
    серые тучи.
    <springnight>
    <summerday> Трепещущие листья окаймляют разрывы в вершинах деревьев, над ними бегут
    серые тучи.
    <summerday>
    <summernight> Трепещущие листья окаймляют разрывы в вершинах деревьев, над ними бегут
    серые тучи.
    <summernight>
  sector: kForest
  exits:
    - direction: north
      to_room: 4416  # Среди вековых деревьев
    - direction: east
      to_room: 4417  # Среди вековых деревьев

