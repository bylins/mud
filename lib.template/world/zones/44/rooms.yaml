# Room #4422
22:
  name: На опушке
  description: |2
       Лес подобрался к обрыву и замер. Дальше - широкая водная гладь. А вдоль
    опушки струится едва заметная тропочка - заброшенная и малохоженая
    уже не первый год.
    <springday> Листья подорожника и низенькая муравка, которые любят селиться на
    человечьем следу, вольно расплылись, занимая местами всю тропочку,-
    скрыть хотят, а тем самым выдают.
    <springday>
    <springnight> Листья подорожника и низенькая муравка, которые любят селиться на
    человечьем следу, вольно расплылись, занимая местами всю тропочку,-
    скрыть хотят, а тем самым выдают.
    <springnight>
    <summerday> Листья подорожника и низенькая муравка, которые любят селиться на
    человечьем следу, вольно расплылись, занимая местами всю тропочку,-
