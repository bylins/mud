# Room #4423
23:
  name: На опушке
  description: |2
       Опушка была окаймлена густыми зарослями ольхи, клена, бересклета. Но царят
    здесь липы. Одна - многоствольная, громадная, древняя, но еще полная
    силы - гордо возвышается над своими сородичами.
    <summerday> Другие липы уже отцвели, а эта еще щедро манила медовым ароматом. Черные
    пчелы густо гудели, на миг замирали в цветке и опять ненасытно искали.
    Тяжелые, мохнатые, злые, они жили, ко всему безразличные, кроме своей
    собственной цели, как само дерево, как земля, как небо, как туча на небе.
    <summerday>
    <summernight> Другие липы уже отцвели, а эта еще щедро манила медовым ароматом.
    <summernight>
  sector: kForest
  exits:
    - direction: north
      to_room: 4404  # Посыльная дорога
    - direction: east
      to_room: 4424  # На опушке
    - direction: south
      to_room: 4440  # Родник
    - direction: west
      to_room: 4422  # На опушке

