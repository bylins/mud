# Room #4439
39:
  name: Погост
  description: |2
    ___Повелители славянской небесной тверди стоят полукружием, спиной к холму
    и лицом на восток. Они не хотят тесноты, им не нужны крыши, они любят
    вольный воздух. В середине - Сварог-Дажбог высотой в три сажени, рядом
    с ним - Хорс. По правой их руке - семь навьих - пращуров славянских, по
    левой - семь женщин-прабабок. То радуницы-роданицы, боги-души виды, лесов,
    легкого воздуха. Все боги глядят на восход солнца, и все они добрые, злых
    среди них нет и не бывало. Боги добры и дивно-прекрасны.
  sector: kForest
  flags:
    - kForPoly
  exits:
    - direction: east
      to_room: 4438  # Поляна
    - direction: south
      to_room: 4427  # Поляна

# Room #4440
40:
  name: Родник
  description: |2
    ___Пробился из земли росточек живой и будто бы слабый, как почка. Из глубин земли
    трепещет струечка в чашке песка. Мелко. Живой воды едва в горсть наберешь,
    можно горстью всю выплескать. Кто-то свалил дерево, размерил бревно, рассек на
    коротыши по размеру, зарубил концы в лапу, чтобы держались, и врыл в землю
    малый сруб, верхний венец подняв над землею. Сделался ключик заключенным.  
  sector: kForest
  exits:
    - direction: north
      to_room: 4423  # На опушке
    - direction: east
      to_room: 4441  # У дома

# Room #4441
41:
  name: У дома
  description: |2
    ___Небольшой домик кажется скорее сараем - очень широкий, но глубины всего
    шагов пять. Три стены из жердей и плетенки, забросанных глиной. Четвертой,
    задней стеной служит подрезанный обрыв, и, чтоб не текла земля, хозяин закрыл
    ее чем придется - корьем, горбылями и той же ивовой плетенкой.
  sector: kInside
  flags:
